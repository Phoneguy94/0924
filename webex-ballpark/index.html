<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="style.css">
  <title>Webex Ballpark Dashboard</title>
</head>
<body>
  <h1 id="title">Loading...</h1>
  <h2 id="subtitle"></h2>
  <p id="interval"></p>

  <hr>

  <div class="metric">
    <div class="metric-label">Calls Presented</div>
    <div class="metric-value" id="callsPresented"></div>
</div>

  <div class="metric">
    <div class="metric-label">Calls Handled</div>
    <div class="metric-value" id="callsHandled"></div>
</div>

  <h3>Avg Queue Time</h3>
  <div id="avgQueueTime"></div>

  <h3>Service Level</h3>
  <div id="serviceLevel"></div>

  <hr>

  <p><strong>Source:</strong> <span id="source"></span></p>
  <p><strong>Refresh Mode:</strong> <span id="refreshMode"></span></p>

  <script src="app.js"></script>
</body>
</html>
