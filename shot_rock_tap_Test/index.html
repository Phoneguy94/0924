<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
<title>Shot Rock · Measure V6</title>
<style>
  :root{
    --bg:#0b1014;--panel:#121a23;--panel2:#17202b;--ink:#eef4fb;--muted:#9fb2c6;
    --line:#26333f;--green:#2fe06a;--gold:#ffd23d;--red:#ff4d4d;--blue:#4da3ff;
    --warn:#ffb02e;--ok:#2fe06a;--btn:#1a2532;--btnline:#3a4b61;--challenge:#b98bff;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0}
  body{background:var(--bg);color:var(--ink);font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;font-size:15px}
  header{padding:12px 16px;border-bottom:1px solid var(--line);background:#0d141c;position:sticky;top:0;z-index:5}
  h1{font-size:17px;margin:0 0 3px;letter-spacing:.2px}
  .sub{color:var(--muted);font-size:12.5px;line-height:1.35}
  .bar{display:flex;gap:7px;flex-wrap:wrap;padding:10px 16px;background:var(--panel);border-bottom:1px solid var(--line)}
  button,label.file{border:1px solid var(--btnline);background:var(--btn);color:var(--ink);
    padding:10px 13px;border-radius:10px;font-weight:650;font-size:14px;cursor:pointer;line-height:1}
  button:active{transform:translateY(1px)}
  button.active{background:#143a23;border-color:#2dd66a;color:#bdf6cf}
  button.challenge.active{background:#2c1f44;border-color:var(--challenge);color:#e3d2ff}
  .danger{background:#3a1b1b;border-color:#7c3333}
  input[type=file]{display:none}
  .info{padding:11px 16px;color:var(--muted);font-size:13.5px;line-height:1.4;border-bottom:1px solid var(--line);background:#0d141c}
  .info b{color:var(--ink)}
  .wrap{padding:10px}
  .canvasWrap{width:100%;max-height:66vh;overflow:hidden;border:1px solid var(--line);border-radius:12px;background:#05080b;position:relative;touch-action:none}
  canvas{display:block;position:absolute;left:0;top:0;transform-origin:0 0;touch-action:none}
  .zoomHint{position:absolute;right:10px;bottom:10px;background:rgba(10,16,22,.82);border:1px solid var(--line);border-radius:8px;padding:5px 9px;font-size:11.5px;color:var(--muted);pointer-events:none}
  .results{padding:0 16px 28px}
  .verdict{font-size:18px;margin:14px 2px 4px;font-weight:800;line-height:1.25}
  .verdict.win .who{color:var(--gold)}
  .verdict.tooclose{color:var(--warn)}
  .verdictsub{font-size:12.5px;color:var(--muted);margin:0 2px 8px}
  table{width:100%;border-collapse:collapse;background:var(--panel);border:1px solid var(--line);border-radius:12px;overflow:hidden;font-size:14px;margin-top:6px}
  th,td{padding:9px 10px;border-bottom:1px solid var(--line);text-align:left}
  th{color:#cfe1f5;background:var(--panel2);font-size:12.5px;letter-spacing:.3px}
  tr:last-child td{border-bottom:0}
  .pill{display:inline-block;border:1px solid #405267;border-radius:999px;padding:2px 9px;font-weight:650;font-size:12.5px}
  .pill.Red{border-color:#7c3636;background:#3a1b1b;color:#ff9b9b}
  .pill.Yellow{border-color:#7c6f2f;background:#33300f;color:#ffe98a}
  .pill.Stone{border-color:#3f5167;background:#1a2532;color:#bcd3ec}
  .small{font-size:12px;color:var(--muted)}
  .conf{font-variant-numeric:tabular-nums;white-space:nowrap}
  .confbar{display:inline-block;height:6px;border-radius:3px;background:#2a3744;width:42px;vertical-align:middle;margin-right:7px;overflow:hidden}
  .confbar > i{display:block;height:100%;border-radius:3px}
  .logrow{display:flex;gap:7px;flex-wrap:wrap;align-items:center;margin-top:12px}
  .logrow .spacer{flex:1}
  .glabel{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;width:100%;margin:2px 0 -2px}
  .flagbtn.happy.on{background:#143a23;border-color:var(--ok);color:#bdf6cf}
  .flagbtn.err.on{background:#3a2210;border-color:var(--warn);color:#ffd9a0}
  .pinbadge{display:inline-block;font-size:11.5px;padding:2px 8px;border-radius:999px;border:1px solid var(--line);color:var(--muted);margin-left:6px;vertical-align:middle}
  .pinbadge.auto{border-color:#2a6b46;color:#7ee3a6}
  .pinbadge.snap{border-color:#3a5c86;color:#9cc6ff}
  .pinbadge.manual{border-color:#7a5a2a;color:#ffce82}
  .hint{padding:9px 14px;margin:0 16px 12px;border:1px dashed #3a4b61;border-radius:10px;color:var(--muted);font-size:12.5px;line-height:1.4;background:#0e1620}
  .toast{position:fixed;left:50%;bottom:22px;transform:translateX(-50%);background:#14202c;border:1px solid var(--btnline);color:var(--ink);padding:11px 16px;border-radius:11px;font-size:13.5px;z-index:30;box-shadow:0 8px 30px rgba(0,0,0,.5);opacity:0;transition:opacity .2s,transform .2s;pointer-events:none;max-width:88vw;text-align:center}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(-4px)}
  .seg{display:flex;border:1px solid var(--btnline);border-radius:10px;overflow:hidden}
  .seg button{border:0;border-radius:0;border-right:1px solid var(--btnline)}
  .seg button:last-child{border-right:0}
  /* Challenge panel */
  .challengePanel{margin-top:14px;border:1px solid var(--challenge);border-radius:12px;background:#160f25;overflow:hidden}
  .challengePanel h3{margin:0;padding:10px 14px;font-size:13px;letter-spacing:.4px;text-transform:uppercase;color:#e3d2ff;background:#1f1633;border-bottom:1px solid #3a2c54}
  .steps{padding:12px 14px;font-size:13px;line-height:1.5}
  .steps .step{margin-bottom:9px;padding-left:22px;position:relative}
  .steps .step::before{content:attr(data-n);position:absolute;left:0;top:0;width:16px;height:16px;border-radius:50%;background:#2c1f44;border:1px solid var(--challenge);color:#e3d2ff;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center}
  .steps b{color:var(--ink)}
  .steps .ok{color:var(--ok)} .steps .warnt{color:var(--warn)}
  .bandwrap{margin:10px 0 2px;padding:10px 12px;background:#120c1f;border:1px solid #3a2c54;border-radius:10px}
  .bandbar{position:relative;height:26px;margin-top:8px}
  .bandbar .track{position:absolute;left:0;right:0;top:11px;height:4px;background:#2a3744;border-radius:2px}
  .bandbar .gap{position:absolute;top:7px;height:12px;border-radius:3px;background:rgba(120,220,150,.35);border:1px solid var(--ok)}
  .bandbar .unc{position:absolute;top:9px;height:8px;border-radius:3px;background:rgba(255,176,46,.35);border:1px solid var(--warn)}
  .bandbar .lbl{position:absolute;font-size:10px;color:var(--muted);top:-2px}
</style>
</head>
<body>
<header>
  <h1>Shot Rock · Measure V6</h1>
  <div class="sub">Pin sets from the rings → double-tap each stone → it calls the shot, or tells you it's too close. Pinch to zoom.</div>
</header>

<div class="bar">
  <label class="file">Load Photo<input id="file" type="file" accept="image/*"></label>
  <div class="seg">
    <button id="modeStone" class="active">Tap Stones</button>
    <button id="modePin">Move Pin</button>
    <button id="modeSnap">Ring-Snap</button>
  </div>
  <button id="snapFitTop" style="display:none;border-color:#9cc6ff;background:#16263a;color:#cfe6ff">Fit Ring → Pin (0)</button>
  <button id="modeChallenge" class="challenge">Challenge Mode</button>
  <button id="verifyScale">Verify Scale</button>
  <button id="undo">Undo</button>
  <button id="clear" class="danger">Clear</button>
</div>

<div class="info" id="status">Load a curling photo to begin.</div>
<div class="hint" id="hint" style="display:none"></div>

<div class="wrap"><div class="canvasWrap" id="canvasWrap"><canvas id="cv"></canvas><div class="zoomHint" id="zoomHint">pinch = zoom · drag = pan · double-tap = place</div></div></div>

<div class="results" id="results"></div>
<div class="toast" id="toast"></div>

<script>
/* ============================================================
   Shot Rock · Measure V6 — single file, pure JS, no libs
   Goal: call the closest rock with 100% confidence on every
   call it MAKES, by declining ties to the stick. Plus an
   inspectable Challenge Mode and a ring self-check.
   Engine (pin-from-rings, eigensolver) validated in lab.
   ============================================================ */

const canvas=document.getElementById('cv');
const ctx=canvas.getContext('2d',{willReadFrequently:true});
const fileInput=document.getElementById('file');
const statusEl=document.getElementById('status');
const hintEl=document.getElementById('hint');
const resultsEl=document.getElementById('results');
const wrapEl=document.getElementById('canvasWrap');
const zoomHintEl=document.getElementById('zoomHint');

let img=null,imgData=null,mode='stone';
let pin=null;               // {x,y,method,conf,sigmaPx}
let stones=[];
let snapPts=[];
let session=0;
let ringFit=null;           // {x,y,r,MA,ma,which}
let scaleCmPerPx=null;
let tiltFrac=0;             // from ring eccentricity
let challenge=false;
let verifyMode=false;

const STONE_DIAMETER_CM=29.2;
const RING_CM={ '4ft':121.92,'8ft':243.84,'12ft':365.76 };
const RING_EDGE_IN={ '4ft':24,'8ft':48,'12ft':72 }; // radius in inches = edge distance from pin
const STRICT_K=1.5;         // gap must exceed K * combined uncertainty to call

/* view transform (pinch/pan) */
let view={scale:1,minScale:1,tx:0,ty:0};

/* ---- utils ---- */
function clamp(v,a,b){return Math.max(a,Math.min(b,v));}
function dist(ax,ay,bx,by){return Math.hypot(ax-bx,ay-by);}
function rgbToHsv(r,g,b){r/=255;g/=255;b/=255;let mx=Math.max(r,g,b),mn=Math.min(r,g,b),d=mx-mn,h=0,s=mx?d/mx:0,v=mx;
  if(d){switch(mx){case r:h=(g-b)/d+(g<b?6:0);break;case g:h=(b-r)/d+2;break;case b:h=(r-g)/d+4;break;}h/=6;}return [h,s,v];}
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2200);}
function setHint(h){if(!h){hintEl.style.display='none';return;}hintEl.style.display='block';hintEl.innerHTML=h;}

/* ---- image -> canvas pixel coords from a screen event, through view transform ---- */
function evtToImg(e){
  const rect=canvas.getBoundingClientRect();
  // rect already reflects CSS transform; map back to canvas pixel space
  const sx=(e.clientX-rect.left)/rect.width*canvas.width;
  const sy=(e.clientY-rect.top)/rect.height*canvas.height;
  return {x:sx,y:sy};
}

/* ============================================================
   LOAD + VIEW
   ============================================================ */
fileInput.onchange=e=>{const f=e.target.files[0];if(!f)return;const url=URL.createObjectURL(f);
  const im=new Image();im.onload=()=>{img=im;session++;setupCanvas();URL.revokeObjectURL(url);};im.src=url;};

function setupCanvas(){
  const maxW=Math.min(1500,img.naturalWidth),scale=maxW/img.naturalWidth;
  canvas.width=Math.round(img.naturalWidth*scale);
  canvas.height=Math.round(img.naturalHeight*scale);
  ctx.drawImage(img,0,0,canvas.width,canvas.height);
  imgData=ctx.getImageData(0,0,canvas.width,canvas.height);
  stones=[];snapPts=[];pin=null;ringFit=null;scaleCmPerPx=null;tiltFrac=0;verifyMode=false;
  fitView();
  autoPin();
  redraw();
}

function fitView(){
  const cw=wrapEl.clientWidth, ch=Math.min(window.innerHeight*0.66, wrapEl.clientWidth*canvas.height/canvas.width);
  wrapEl.style.height=ch+'px';
  view.minScale=Math.min(cw/canvas.width, ch/canvas.height);
  view.scale=view.minScale;
  view.tx=(cw-canvas.width*view.scale)/2;
  view.ty=(ch-canvas.height*view.scale)/2;
  applyView();
}
function applyView(){
  canvas.style.transform=`translate(${view.tx}px,${view.ty}px) scale(${view.scale})`;
}
function clampPan(){
  const cw=wrapEl.clientWidth, ch=wrapEl.clientHeight;
  const sw=canvas.width*view.scale, sh=canvas.height*view.scale;
  if(sw<=cw) view.tx=(cw-sw)/2; else view.tx=clamp(view.tx,cw-sw,0);
  if(sh<=ch) view.ty=(ch-sh)/2; else view.ty=clamp(view.ty,ch-sh,0);
}

/* ---- pinch + pan + tap (pointer events) ---- */
let pointers=new Map();
let pinchPrev=null, panPrev=null, movedDist=0, downImg=null, draggingPin=false;
canvas.addEventListener('pointerdown',e=>{
  canvas.setPointerCapture(e.pointerId);
  pointers.set(e.pointerId,{x:e.clientX,y:e.clientY});
  movedDist=0;
  if(pointers.size===1){
    panPrev={x:e.clientX,y:e.clientY};
    downImg=evtToImg(e);
    if(mode==='pin'&&pin&&dist(downImg.x,downImg.y,pin.x,pin.y)<30/view.scale*1) draggingPin=true;
  } else if(pointers.size===2){
    const p=[...pointers.values()];
    pinchPrev={d:Math.hypot(p[0].x-p[1].x,p[0].y-p[1].y),cx:(p[0].x+p[1].x)/2,cy:(p[0].y+p[1].y)/2};
    panPrev=null; draggingPin=false;
  }
});
canvas.addEventListener('pointermove',e=>{
  if(!pointers.has(e.pointerId))return;
  e.preventDefault();
  const prev=pointers.get(e.pointerId);
  pointers.set(e.pointerId,{x:e.clientX,y:e.clientY});
  if(pointers.size===2){
    const p=[...pointers.values()];
    const d=Math.hypot(p[0].x-p[1].x,p[0].y-p[1].y);
    const cx=(p[0].x+p[1].x)/2, cy=(p[0].y+p[1].y)/2;
    // defensive init: if pinch baseline missing, set it this frame and skip (no jump)
    if(!pinchPrev){ pinchPrev={d,cx,cy}; draggingPin=false; panPrev=null; return; }
    const rect=wrapEl.getBoundingClientRect();
    const ox=cx-rect.left, oy=cy-rect.top;
    const factor=d/(pinchPrev.d||d);
    const ns=clamp(view.scale*factor, view.minScale, view.minScale*12);
    // zoom around pinch center
    view.tx = ox - (ox-view.tx)*(ns/view.scale);
    view.ty = oy - (oy-view.ty)*(ns/view.scale);
    view.scale=ns;
    // pan with center drift
    view.tx += (cx-pinchPrev.cx); view.ty += (cy-pinchPrev.cy);
    pinchPrev={d,cx,cy};
    clampPan(); applyView();
    return;
  }
  if(pointers.size===1){
    const cur=evtToImg(e);
    movedDist+=Math.hypot(e.clientX-prev.x,e.clientY-prev.y);
    if(draggingPin){
      pin={x:cur.x,y:cur.y,method:'manual',conf:1,sigmaPx:2};
      redraw(); return;
    }
    if(panPrev){
      view.tx+=e.clientX-panPrev.x; view.ty+=e.clientY-panPrev.y;
      panPrev={x:e.clientX,y:e.clientY};
      clampPan(); applyView();
    }
  }
},{passive:false});
/* Block Safari/iOS native page pinch (it ignores touch-action and causes bounce-back) */
['gesturestart','gesturechange','gestureend'].forEach(ev=>{
  canvas.addEventListener(ev,e=>e.preventDefault());
  wrapEl.addEventListener(ev,e=>e.preventDefault());
});
document.addEventListener('touchmove',e=>{ if(e.touches&&e.touches.length>1) e.preventDefault(); },{passive:false});
function endPointer(e){
  if(!pointers.has(e.pointerId))return;
  const wasSingle=pointers.size===1;
  pointers.delete(e.pointerId);
  if(pointers.size<2) pinchPrev=null;
  if(pointers.size===0){
    // Single tap no longer places anything (prevents phantom stones).
    // Placement happens on double-tap only; see the dbl-tap handler below.
    draggingPin=false; panPrev=null; downImg=null;
  }
}
canvas.addEventListener('pointerup',endPointer);
canvas.addEventListener('pointercancel',endPointer);

function handleTap(p){
  if(!imgData)return;
  if(verifyMode){ doVerify(p); return; }
  if(mode==='stone'){ const st=detectStoneFromSeed(p.x,p.y); if(st){stones.push(st);redraw();} }
  else if(mode==='pin'){ pin={x:p.x,y:p.y,method:'manual',conf:1,sigmaPx:2}; redraw(); }
  else if(mode==='snap'){ snapPts.push({x:p.x,y:p.y}); updateSnapBtn(); redraw(); }
}

/* double-tap to PLACE (stone / pin / snap). Zoom is pinch-only now. */
let lastTapT=0,lastTapX=0,lastTapY=0;
canvas.addEventListener('pointerup',e=>{
  const t=Date.now();
  const near = Math.hypot(e.clientX-lastTapX, e.clientY-lastTapY) < 40;
  if(t-lastTapT<280 && near && movedDist<6){
    const p=evtToImg(e);
    handleTap(p);
    lastTapT=0; // consume, so a triple-tap doesn't double-fire
    return;
  }
  lastTapT=t; lastTapX=e.clientX; lastTapY=e.clientY;
});

/* ---- modes ---- */
function setMode(m){
  mode=m; verifyMode=false;
  document.getElementById('modeStone').classList.toggle('active',m==='stone');
  document.getElementById('modePin').classList.toggle('active',m==='pin');
  document.getElementById('modeSnap').classList.toggle('active',m==='snap');
  if(m==='stone')setHint('Double-tap each stone\u2019s granite. The circle is capped to one stone width, so a touching neighbor can\u2019t pull it off.');
  if(m==='pin')setHint('Pinch to zoom in, then tap to drop the pin and drag to nudge it onto the exact center.');
  if(m==='snap'){snapPts=[];setHint('Tap <b>4+ points</b> spread along ONE ring, then press <b>Fit Ring \u2192 Pin</b>.');}
  updateSnapBtn();
  redraw();
}
document.getElementById('modeStone').onclick=()=>setMode('stone');
document.getElementById('modePin').onclick=()=>setMode('pin');
document.getElementById('modeSnap').onclick=()=>setMode('snap');
document.getElementById('snapFitTop').onclick=fitRingSnap;
function updateSnapBtn(){
  const b=document.getElementById('snapFitTop');
  if(mode==='snap'){b.style.display='';b.textContent=`Fit Ring \u2192 Pin (${snapPts.length})`;b.disabled=snapPts.length<4;b.style.opacity=snapPts.length<4?'0.55':'1';}
  else b.style.display='none';
}
document.getElementById('modeChallenge').onclick=()=>{challenge=!challenge;document.getElementById('modeChallenge').classList.toggle('active',challenge);redraw();};
document.getElementById('verifyScale').onclick=()=>{
  verifyMode=!verifyMode;
  if(verifyMode){toast('Verify: tap a point on a known ring line.');setHint('<b>Verify Scale:</b> pinch in, tap a point sitting exactly on a painted ring, then pick which ring. The tool shows what it reads vs. the known distance.');}
  else setMode(mode);
};
document.getElementById('undo').onclick=()=>{if(mode==='snap'){snapPts.pop();updateSnapBtn();}else stones.pop();redraw();};
document.getElementById('clear').onclick=()=>{stones=[];redraw();};
window.addEventListener('resize',()=>{if(img){fitView();}});

/* ============================================================
   AUTO-PIN from rings (eigensolver core — lab-validated)
   ============================================================ */
function autoPin(){
  const res=solveCenter();
  ringFit=res.ring||null;
  if(res.scaleCmPerPx)scaleCmPerPx=res.scaleCmPerPx;
  tiltFrac=res.tiltFrac||0;
  if(res.pin){
    const isAuto = (res.method==='concentric'||res.method==='button');
    pin={x:res.pin.x,y:res.pin.y,method:isAuto?'auto':'snap',conf:res.conf,sigmaPx:res.sigmaPx};
    if(res.conf>=0.6){statusEl.textContent='Pin found from the rings. Double-tap each stone.';setHint('Auto-pin locked on the button. If it\u2019s even slightly off, use <b>Move Pin</b> (pinch in first).');}
    else{statusEl.textContent='Pin estimated \u2014 verify it.';setHint('Ring was partial or angled. Pinch in and check the pin; use <b>Ring-Snap</b> or <b>Move Pin</b> to correct.');}
  } else {
    statusEl.textContent='No pin found automatically \u2014 set it manually.';
    setHint('No clear ring arc. Use <b>Ring-Snap</b> (tap along a ring) for the most accurate pin.');
  }
}
/* ============================================================
   HOUSE PIN via the BUTTON HOLE (validated on real partials).
   1) find the filled 4ft disc (red OR blue, color-agnostic) -> coarse center + radius
   2) refine to the little center "hole" punched in the disc -> that hole IS the pin,
      and being small/central/fully-visible it survives a ring cut off by the frame.
   3) the 4ft radius gives scale (known 4ft diameter = 121.92 cm).
   ============================================================ */
function findHousePin(){
  const W=canvas.width,H=canvas.height,D=imgData.data;
  // sample step keeps this fast on big phone photos
  const step=Math.max(1,Math.round(Math.min(W,H)/360));
  // collect red and blue filled pixels with their centroid + spread
  function gather(kind){
    let n=0,sx=0,sy=0; const px=[];
    for(let y=0;y<H;y+=step)for(let x=0;x<W;x+=step){
      const i=(y*W+x)*4,r=D[i],g=D[i+1],b=D[i+2];
      const mx=Math.max(r,g,b),mn=Math.min(r,g,b),s=mx?(mx-mn)/mx:0;
      let hit=false;
      if(kind==='red') hit=(r>g+18&&r>b+14&&s>0.12);
      else             hit=(b>r+8&&b>g+4&&s>0.10);
      if(hit){n++;sx+=x;sy+=y;px.push(x,y);}
    }
    if(n<40)return null;
    const cx=sx/n,cy=sy/n;
    // radius = 85th pct distance (robust outer extent of the filled disc)
    let ds=[];for(let k=0;k<px.length;k+=2)ds.push(Math.hypot(px[k]-cx,px[k+1]-cy));
    ds.sort((a,b)=>a-b);
    const r=ds[Math.floor(ds.length*0.85)]||0;
    return {cx,cy,r,n};
  }
  const red=gather('red'), blue=gather('blue');
  // pick the candidate that looks most like the FILLED 4ft disc: the denser, tighter one.
  // The 4ft is the inner solid colour; the 12ft band is an annulus (sparser per-area).
  let base=null,which='4ft';
  if(red&&blue){ base = (red.n/(red.r*red.r)) >= (blue.n/(blue.r*blue.r)) ? red : blue; }
  else base = red||blue;
  if(!base) return null;

  // ---- refine to the button hole: the redness/colour MINIMUM near the coarse centre ----
  const rOut=base.r;
  const win=Math.max(8,Math.round(rOut*0.5));
  const sc2=Math.max(1,Math.round(win/60)); // fine sampling inside the window
  let bestScore=-1,bx=base.cx,by=base.cy;
  for(let oy=-win;oy<=win;oy+=sc2)for(let ox=-win;ox<=win;ox+=sc2){
    const x=(base.cx+ox)|0,y=(base.cy+oy)|0;

function solveCenter(){
  const W=canvas.width,H=canvas.height;
  // PRIMARY: button-hole finder (works on partial & angled houses)
  const bp=findHousePin();

  const er=biggestRingEllipse('red'),eb=biggestRingEllipse('blue');

  let useBlue=eb;

function biggestRingEllipse(which){
  const W=canvas.width,H=canvas.height,D=imgData.data;
  const step=Math.max(1,Math.round(Math.min(W,H)/420));
  const sw=Math.ceil(W/step),sh=Math.ceil(H/step);
  const mask=new Uint8Array(sw*sh);let count=0;
  for(let y=0,sy=0;y<H;y+=step,sy++)for(let x=0,sx=0;x<W;x+=step,sx++){
    const i=(y*W+x)*4;const [h,s,v]=rgbToHsv(D[i],D[i+1],D[i+2]);let hit=false;
    if(which==='red')hit=((h<0.038||h>0.94)&&s>0.16&&v>0.35);

    if(hit){mask[sy*sw+sx]=1;count++;}

  const e=fitEllipseMoments(pts);if(!e)return null;

}

      if(x-1>=0){const n=idx-1;if(m[n]&&!seen[n]){seen[n]=1;q.push(n);}}
      if(y+1<h){const n=idx+w;if(m[n]&&!seen[n]){seen[n]=1;q.push(n);}}
      if(y-1>=0){const n=idx-w;if(m[n]&&!seen[n]){seen[n]=1;q.push(n);}}}

/* ---- ring snap ---- */
function fitRingSnap(){

  const c=fitCircleKasa(snapPts);if(!c){toast('Couldn\u2019t fit a ring.');return;}
  pin={x:c.x,y:c.y,method:'snap',conf:0.9,sigmaPx:3};

  snapPts=[];setMode('stone');statusEl.textContent='Pin set from your ring points. Tap each stone.';toast('Pin set from ring.');redraw();

/* ============================================================
   STONE DETECTION — body-lock, radius-capped
   ============================================================ */
function isGraniteAt(x,y){const W=canvas.width,H=canvas.height,D=imgData.data;x|=0;y|=0;if(x<0||y<0||x>=W||y>=H)return false;
  const i=(y*W+x)*4,r=D[i],g=D[i+1],b=D[i+2];const [h,s,v]=rgbToHsv(r,g,b);const sum=r+g+b;
  const grayish=Math.abs(r-g)<58&&Math.abs(g-b)<68;const dark=v<0.56&&s<0.45&&sum<450&&grayish;
  const plastic=s>0.45&&v>0.30&&((h<0.10||h>0.92)||(h>0.10&&h<0.20));return dark||plastic;}
function expectedStoneRadiusPx(){if(scaleCmPerPx)return (STONE_DIAMETER_CM/2)/scaleCmPerPx;return Math.min(canvas.width,canvas.height)*0.085;}

function detectStoneFromSeed(seedX,seedY){
  const W=canvas.width,H=canvas.height;
  const rPred=clamp(expectedStoneRadiusPx(),22,Math.min(W,H)*0.22);
  const searchR=rPred*1.7;
  const x0=clamp((seedX-searchR)|0,0,W-1),x1=clamp(Math.ceil(seedX+searchR),0,W-1);
  const y0=clamp((seedY-searchR)|0,0,H-1),y1=clamp(Math.ceil(seedY+searchR),0,H-1);
  const w=x1-x0+1,h=y1-y0+1,m=new Uint8Array(w*h);
  for(let yy=0;yy<h;yy++)for(let xx=0;xx<w;xx++){const gx=x0+xx,gy=y0+yy;if(dist(gx,gy,seedX,seedY)<=searchR&&isGraniteAt(gx,gy))m[yy*w+xx]=1;}
  let mm=m;mm=dilate(mm,w,h);mm=dilate(mm,w,h);mm=erode(mm,w,h);
  const comps=connectedComponents(mm,w,h);const sx=seedX-x0,sy=seedY-y0;
  let best=null,bestScore=-1;
  for(const comp of comps){if(comp.length<50)continue;
    let minx=1e9,miny=1e9,maxx=-1,maxy=-1,sumx=0,sumy=0;
    for(const idx of comp){const lx=idx%w,ly=(idx/w)|0;minx=Math.min(minx,lx);maxx=Math.max(maxx,lx);miny=Math.min(miny,ly);maxy=Math.max(maxy,ly);sumx+=lx;sumy+=ly;}
    const area=comp.length,cx=sumx/area,cy=sumy/area,d=dist(cx,cy,sx,sy);
    // HARD CONSTRAINT: the tap decides which stone. A blob whose centroid sits
    // more than ~one stone-radius from the tap belongs to a neighbor (e.g. red
    // when you tapped yellow) and is rejected outright.
    if(d > rPred*1.05) continue;
    const bw=maxx-minx+1,bh=maxy-miny+1,boxMax=Math.max(bw,bh),aspect=Math.min(bw,bh)/Math.max(1,boxMax);
    const nearScore=1-Math.min(1,d/searchR),sizeScore=Math.min(1,area/(Math.PI*rPred*rPred*0.55)),aspectScore=clamp((aspect-0.30)/0.55,0,1);
    const score=0.62*nearScore+0.20*sizeScore+0.18*aspectScore;
    if(score>bestScore){bestScore=score;best={comp,minx,miny,maxx,maxy,cx,cy,area};}
  }
  if(!best){toast('No stone body found \u2014 pinch in and double-tap the granite.');return null;}
  const set=new Set(best.comp);const pts=[],bpts=[];
  for(const idx of best.comp){const lx=idx%w,ly=(idx/w)|0;const px=x0+lx,py=y0+ly;pts.push({x:px,y:py});
    let edge=false;if(lx+1>=w||!set.has(idx+1))edge=true;else if(lx-1<0||!set.has(idx-1))edge=true;else if(ly+1>=h||!set.has(idx+w))edge=true;else if(ly-1<0||!set.has(idx-w))edge=true;
    if(edge)bpts.push({x:px,y:py});}

  const bboxR=Math.max(best.maxx-best.minx,best.maxy-best.miny)/2;

  const minR=Math.max(16,rPred*0.78),maxR=rPred*1.18;let residual=null;
  if(!circle||!isFinite(circle.r)||circle.r<minR*0.8||circle.r>maxR*1.3||dist(circle.x,circle.y,bboxCx,bboxCy)>bboxR*0.8){
    circle={x:bboxCx,y:bboxCy,r:clamp(bboxR*1.04,minR,maxR)};
  } else circle.r=clamp(circle.r,minR,maxR);

  // BODY-LOCK: when ring scale is known, the true stone radius is known (rPred).
  // The granite blob often hugs the handle/top and reads small, which shrinks the
  // circle and throws off the edge. So: fix radius at the known stone size and
  // refine the CENTER to the position whose fixed-radius disk best covers granite.
  if(scaleCmPerPx){
    const lockR=rPred;

    // Tighter search (was 0.55R). The locked disk may only nudge, not wander
    // toward the neighbor's granite. Coverage is also tie-broken toward the tap.
    const span=Math.round(lockR*0.28);
    const maxDrift=lockR*0.40; // hard ceiling on how far center may move from the tap
    for(let oy=-span;oy<=span;oy+=2)for(let ox=-span;ox<=span;ox+=2){
      const ccx=circle.x+ox, ccy=circle.y+oy;
      if(dist(ccx,ccy,seedX,seedY) > maxDrift) continue; // stay anchored to the tap

      const outP=isGraniteAt(circle.x+Math.cos(t)*lockR*1.15, circle.y+Math.sin(t)*lockR*1.15);
      if(inP&&!outP)hits++;}
    residual=clamp(1-hits/tot,0.02,0.5)*0.18; // map edge agreement into residual scale
  } else if(bpts.length>10){
    let s=0;for(const q of bpts)s+=Math.abs(dist(q.x,q.y,circle.x,circle.y)-circle.r);residual=(s/bpts.length)/circle.r;

  // the fit wandered to a neighbor — refuse rather than log a wrong stone.
  if(dist(seedX,seedY,circle.x,circle.y) > circle.r){
    toast('Tap landed outside the stone \u2014 pinch in and double-tap its center.');
    return null;

  const label=labelColor(circle.x,circle.y,circle.r);

  const M=[[Sxx,Sxy,Sx],[Sxy,Syy,Sy],[Sx,Sy,n]],B=[-Sxz,-Syz,-Sz],sol=solve3(M,B);if(!sol)return null;
  const cx=-sol[0]/2,cy=-sol[1]/2,rr=cx*cx+cy*cy-sol[2];if(rr<=0)return null;return {x:cx,y:cy,r:Math.sqrt(rr)};}
function solve3(M,b){const a=M.map((r,i)=>[...r,b[i]]);for(let i=0;i<3;i++){let mx=i;for(let r=i+1;r<3;r++)if(Math.abs(a[r][i])>Math.abs(a[mx][i]))mx=r;if(Math.abs(a[mx][i])<1e-9)return null;[a[i],a[mx]]=[a[mx],a[i]];const dv=a[i][i];for(let c=i;c<4;c++)a[i][c]/=dv;for(let r=0;r<3;r++)if(r!==i){const f=a[r][i];for(let c=i;c<4;c++)a[r][c]-=f*a[i][c];}}return [a[0][3],a[1][3],a[2][3]];}
function labelColor(cx,cy,r){const W=canvas.width,H=canvas.height,D=imgData.data;let red=0,yel=0;const R=Math.max(8,r*0.55);
  for(let y=Math.max(0,(cy-R)|0);y<Math.min(H,Math.ceil(cy+R));y+=2)for(let x=Math.max(0,(cx-R)|0);x<Math.min(W,Math.ceil(cx+R));x+=2){if(dist(x,y,cx,cy)>R)continue;const i=(y*W+x)*4;const [h,s,v]=rgbToHsv(D[i],D[i+1],D[i+2]);if(s>0.34&&v>0.24){if(h<0.07||h>0.93)red++;if(h>0.10&&h<0.20)yel++;}}
  if(red>yel*1.2&&red>5)return 'Red';if(yel>red*1.2&&yel>5)return 'Yellow';return 'Stone';}

/* ============================================================
   MEASUREMENT + CALL LOGIC
   ============================================================ */
function chooseScale(){
  let ringScale=scaleCmPerPx||null,stoneScale=null;
  if(stones.length){const rs=stones.map(s=>s.r).sort((a,b)=>a-b);const medR=rs[Math.floor(rs.length/2)];stoneScale=(STONE_DIAMETER_CM/2)/medR;}
  let chosen=ringScale||stoneScale,agreement=null;
  if(ringScale&&stoneScale)agreement=1-Math.min(1,Math.abs(ringScale-stoneScale)/((ringScale+stoneScale)/2));
  return {chosen,ringScale,stoneScale,agreement};
}
function nearestEdge(s){ // returns {edgePx, edgeCm, pt}
  if(!pin)return {edgePx:null,edgeCm:null,pt:null};
  const dx=pin.x-s.x,dy=pin.y-s.y,L=Math.hypot(dx,dy)||1;
  const pt={x:s.x+dx/L*s.r,y:s.y+dy/L*s.r};
  const edgePx=Math.max(0,L-s.r);
  return {edgePx,pt};
}
function stoneBandCm(s,edgeCm,cmPerPx){
  const pinCm=(pin?.sigmaPx||5)*cmPerPx;
  const fitCm=(s.residual||0.08)*s.r*cmPerPx;
  const tiltCm=tiltFrac*(edgeCm||0);
  return Math.hypot(pinCm,fitCm,tiltCm,0.4); // 0.4cm floor (pixel/tap noise)
}
function computeAll(){
  const sc=chooseScale(),cmPerPx=sc.chosen;
  const rows=stones.map(s=>{
    const ne=nearestEdge(s);
    let edgeCm=ne.edgePx!=null&&cmPerPx?ne.edgePx*cmPerPx:null;
    let bandCm=edgeCm!=null?stoneBandCm(s,edgeCm,cmPerPx):null;
    return {...s,edgePx:ne.edgePx,edgePt:ne.pt,edgeCm,bandCm};
  });
  const ranked=rows.filter(r=>r.edgeCm!=null).sort((a,b)=>a.edgeCm-b.edgeCm);
  let call=null;
  if(ranked.length>=2){
    const a=ranked[0],b=ranked[1];
    const gap=b.edgeCm-a.edgeCm,combined=Math.hypot(a.bandCm,b.bandCm);
    call={winner:a,gap,combined,confident:gap>STRICT_K*combined};
  } else if(ranked.length===1){
    call={winner:ranked[0],gap:null,combined:ranked[0].bandCm,confident:true,solo:true};
  }
  return {rows,ranked,call,scale:sc,cmPerPx};
}

/* ============================================================
   VERIFY SCALE (self-check against a known ring)
   ============================================================ */
function doVerify(p){
  if(!pin){toast('Set the pin first, then verify.');verifyMode=false;return;}
  const sc=chooseScale();if(!sc.chosen){toast('No scale yet \u2014 measure a stone or fit a ring first.');return;}
  const measPx=dist(p.x,p.y,pin.x,pin.y);
  const measCm=measPx*sc.chosen, measIn=measCm/2.54;
  // pick nearest known ring edge in inches
  let bestRing='8ft',bestErr=1e9;
  for(const k of Object.keys(RING_EDGE_IN)){const err=Math.abs(measIn-RING_EDGE_IN[k]);if(err<bestErr){bestErr=err;bestRing=k;}}
  const known=RING_EDGE_IN[bestRing];
  const pct=Math.max(0,100-Math.abs(measIn-known)/known*100);
  verifyMode=false;
  setHint(`<b>Scale check:</b> that point reads <b>${measIn.toFixed(1)} in</b>. Nearest known line is the <b>${bestRing}</b> ring edge at <b>${known} in</b>. Tool is reading <b>${pct.toFixed(1)}%</b> true on this photo.`);
  toast(`Reads ${measIn.toFixed(1)}in vs ${known}in known \u2014 ${pct.toFixed(0)}% true.`);
  redraw();
}

/* ============================================================
   DRAW
   ============================================================ */
function redraw(){
  if(!imgData)return;
  ctx.putImageData(imgData,0,0);
  const M=computeAll();

  // ring overlay (always faint; bold in challenge)
  if(ringFit){
    ctx.save();
    ctx.strokeStyle=challenge?'rgba(185,139,255,.9)':'rgba(90,170,255,.35)';
    ctx.lineWidth=challenge?3:2;ctx.setLineDash(challenge?[]:[7,6]);
    ctx.beginPath();
    if(ringFit.MA&&ringFit.ma&&ringFit.which!=='snap'){
      ctx.ellipse(ringFit.x,ringFit.y,ringFit.MA/2,ringFit.ma/2,(ringFit.ang||0)*Math.PI/180,0,Math.PI*2);
    } else ctx.arc(ringFit.x,ringFit.y,ringFit.r,0,Math.PI*2);
    ctx.stroke();
    if(challenge){ctx.fillStyle='rgba(185,139,255,.95)';ctx.font='bold 15px system-ui';ctx.fillText('ring used for pin + scale',ringFit.x-ringFit.r+4,ringFit.y-ringFit.r-6);}
    ctx.restore();
  }

  // snap pts
  if(mode==='snap'&&snapPts.length){ctx.save();ctx.fillStyle='#9cc6ff';for(const p of snapPts){ctx.beginPath();ctx.arc(p.x,p.y,5,0,Math.PI*2);ctx.fill();}
    if(snapPts.length>=4){const c=fitCircleKasa(snapPts);if(c){ctx.strokeStyle='rgba(156,198,255,.7)';ctx.lineWidth=2;ctx.beginPath();ctx.arc(c.x,c.y,c.r,0,Math.PI*2);ctx.stroke();}}ctx.restore();}

  // stones + measured edge lines
  M.rows.forEach(s=>{
    const col=s.label==='Red'?'#ff4040':s.label==='Yellow'?'#ffe14a':'#50a7ff';
    ctx.save();ctx.lineWidth=4;ctx.strokeStyle=col;ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.stroke();
    ctx.fillStyle=col;ctx.beginPath();ctx.arc(s.x,s.y,4,0,Math.PI*2);ctx.fill();
    // measured line: pin -> nearest edge point (not center)
    if(pin&&s.edgePt){
      ctx.strokeStyle=challenge?'rgba(255,255,255,.95)':'rgba(255,255,255,.8)';
      ctx.lineWidth=challenge?3:2;ctx.beginPath();ctx.moveTo(pin.x,pin.y);ctx.lineTo(s.edgePt.x,s.edgePt.y);ctx.stroke();
      // mark the actual edge point being measured
      ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(s.edgePt.x,s.edgePt.y,challenge?5:3,0,Math.PI*2);ctx.fill();
    }
    const rk=M.ranked.findIndex(r=>r.seed===s.seed);
    const tag=(rk>=0?('#'+(rk+1)+' '):'')+s.label+(challenge&&s.edgeCm!=null?`  ${(s.edgeCm/2.54).toFixed(1)}in`:'');
    ctx.font='bold 17px system-ui';ctx.lineWidth=4;ctx.strokeStyle='#000';ctx.fillStyle='#fff';
    ctx.strokeText(tag,s.x+s.r+6,s.y);ctx.fillText(tag,s.x+s.r+6,s.y);
    ctx.restore();
  });

  // pin crosshair
  if(pin){ctx.save();ctx.strokeStyle=pin.method==='manual'?'#00ff7b':pin.method==='snap'?'#9cc6ff':'#2fe06a';
    ctx.lineWidth=3;const s=16;ctx.beginPath();ctx.moveTo(pin.x-s,pin.y);ctx.lineTo(pin.x+s,pin.y);ctx.moveTo(pin.x,pin.y-s);ctx.lineTo(pin.x,pin.y+s);ctx.stroke();
    ctx.beginPath();ctx.arc(pin.x,pin.y,4,0,Math.PI*2);ctx.fillStyle=ctx.strokeStyle;ctx.fill();ctx.restore();}

  renderResults(M);
}

/* ============================================================
   RESULTS UI
   ============================================================ */
let lastFlags={happy:false,error:false};
function renderResults(M){
  if(!stones.length){
    let extra='';
    if(mode==='snap')extra=`<div class="logrow"><span class="small">${snapPts.length} ring point(s) \u2014 use the <b>Fit Ring \u2192 Pin</b> button up top (needs 4+).</span></div>`;
    resultsEl.innerHTML=`<div class="small">No stones measured yet.</div>${extra}`;
    return;
  }
  const pinTag=pin?`<span class="pinbadge ${pin.method}">pin: ${pin.method}</span>`:'<span class="pinbadge">no pin</span>';
  let html='';
  const call=M.call;
  const distTrusted = !!scaleCmPerPx && M.scale.chosen && M.ranked.slice(0,2).every(s=>s.trusted);
  if(call&&!call.solo){
    if(call.confident){
      const sub = distTrusted
        ? `Ahead by ${call.gap.toFixed(1)} cm (${(call.gap/2.54).toFixed(1)} in) \u2014 clear of the \u00B1${call.combined.toFixed(1)} cm uncertainty on this photo.`
        : `Clear separation \u2014 the nearer rock leads by more than the photo\u2019s margin of error.`;
      html+=`<div class="verdict win"><span class="who">${call.winner.label}</span> is shot rock. ${pinTag}</div><div class="verdictsub">${sub}</div>`;
    } else {
      const sub = distTrusted
        ? `Gap is only ${call.gap.toFixed(1)} cm but the photo\u2019s uncertainty is \u00B1${call.combined.toFixed(1)} cm. Not safe to call from this image.`
        : `The two are within this photo\u2019s margin of error. Not safe to call \u2014 measure with the stick.`;
      html+=`<div class="verdict tooclose">Too close to call \u2014 use the stick. ${pinTag}</div><div class="verdictsub">${sub}</div>`;
    }
  } else if(call&&call.solo){
    html+=`<div class="verdict win"><span class="who">${call.winner.label}</span> measured. ${pinTag}</div><div class="verdictsub">Add the other rock to compare.</div>`;
  } else {
    html+=`<div class="verdict">Set the pin to get a call. ${pinTag}</div>`;
  }
  if(!distTrusted && stones.length){
    html+=`<div class="verdictsub" style="color:var(--muted)">Distances hidden: ${!scaleCmPerPx?'no verified ring scale yet':'fit confidence too low to trust exact numbers'}. The ranking and call still hold. Use <b>Verify Scale</b> on a ring to unlock distances.</div>`;
  }

  html+='<table><thead><tr><th>Rank</th><th>Stone</th><th>Edge to pin</th><th>Fit conf.</th></tr></thead><tbody>';
  const list=M.ranked.length?M.ranked:M.rows;
  list.forEach((s,idx)=>{
    const d = (s.edgeCm!=null && distTrusted)
      ? `${s.edgeCm.toFixed(1)} cm <span class="small">(${(s.edgeCm/2.54).toFixed(1)} in)</span>`
      : (s.edgeCm!=null ? '<span class="small">hidden \u2014 verify scale</span>' : '<span class="small">need pin</span>');
    const cc=s.conf>=75?'#2fe06a':s.conf>=55?'#ffd23d':'#ff7d7d';
    html+=`<tr><td>${M.ranked.length?idx+1:'\u2013'}</td><td><span class="pill ${s.label}">${s.label}</span></td><td>${d}</td><td class="conf"><span class="confbar"><i style="width:${s.conf}%;background:${cc}"></i></span>${s.conf}%</td></tr>`;
  });
  html+='</tbody></table>';

  // Challenge Mode panel
  if(challenge){ html+=challengePanel(M); }

  // flags + export
  html+=`<div class="logrow"><span class="glabel">Was this call right?</span>
    <button id="flagHappy" class="flagbtn happy ${lastFlags.happy?'on':''}">\u{1F44D} Right</button>
    <button id="flagErr" class="flagbtn err ${lastFlags.error?'on':''}">\u26A0\uFE0F Wrong</button>
    <span class="spacer"></span>
    <button id="saveRow">Save to log</button><button id="dlCsv">CSV</button><button id="dlPng">Image</button></div>`;

  resultsEl.innerHTML=html;
  document.getElementById('flagHappy').onclick=()=>{lastFlags={happy:true,error:false};redraw();};
  document.getElementById('flagErr').onclick=()=>{lastFlags={happy:false,error:true};redraw();};
  document.getElementById('saveRow').onclick=()=>saveRow(M);
  document.getElementById('dlCsv').onclick=downloadCsv;
  document.getElementById('dlPng').onclick=downloadPng;
  if(mode==='snap')updateSnapBtn();
}

function challengePanel(M){
  const sc=M.scale,call=M.call;
  let scaleLine = sc.agreement!=null
    ? `Scale cross-check: ring vs stone agree <b class="${sc.agreement>=0.85?'ok':'warnt'}">${Math.round(sc.agreement*100)}%</b>.`
    : (scaleCmPerPx?`Scale from the <b>${ringFit?.which||'ring'}</b>.`:`Scale from stone size (no ring scale).`);
  let tiltLine = tiltFrac<0.03?`Rings read round \u2014 <b class="ok">low tilt</b>, tight uncertainty.`
    : tiltFrac<0.12?`Mild tilt detected from ring shape \u2014 uncertainty widened a little.`
    : `<b class="warnt">Strong tilt</b> from ring shape \u2014 uncertainty widened; shoot more overhead for a tighter call.`;
  let steps=`<div class="steps">
    <div class="step" data-n="1"><b>Pin.</b> ${pin?`Set by <b>${pin.method}</b>. The drawn ring above should sit on the painted ring \u2014 if it does, the pin is trustworthy.`:'No pin set.'}</div>
    <div class="step" data-n="2"><b>Scale.</b> ${scaleLine} ${tiltLine}</div>
    <div class="step" data-n="3"><b>Each rock.</b> The white dot on every stone is the exact point measured \u2014 the granite edge nearest the pin, one radius in from the fitted center. The line runs pin \u2192 that point.</div>`;
  if(call&&!call.solo){
    steps+=`<div class="step" data-n="4"><b>The call.</b> ${call.winner.label} edge ${M.ranked[0].edgeCm.toFixed(1)} cm vs ${M.ranked[1].label} ${M.ranked[1].edgeCm.toFixed(1)} cm. Gap <b>${call.gap.toFixed(1)} cm</b>. Photo uncertainty <b>\u00B1${call.combined.toFixed(1)} cm</b>. Rule: call only if gap &gt; ${STRICT_K}\u00D7 uncertainty (${(STRICT_K*call.combined).toFixed(1)} cm). ${call.confident?`<b class="ok">${call.gap.toFixed(1)} &gt; ${(STRICT_K*call.combined).toFixed(1)} \u2192 confident call.</b>`:`<b class="warnt">${call.gap.toFixed(1)} &lt; ${(STRICT_K*call.combined).toFixed(1)} \u2192 too close, use the stick.</b>`}</div>`;
  }
  steps+='</div>';
  // visual band bar
  let band='';
  if(call&&!call.solo){
    const maxv=Math.max(call.gap,STRICT_K*call.combined)*1.25;
    const gapW=call.gap/maxv*100, uncW=STRICT_K*call.combined/maxv*100;
    band=`<div class="bandwrap"><div class="small">Gap vs. required margin (to scale)</div>
      <div class="bandbar"><div class="track"></div>
        <div class="gap" style="left:0;width:${gapW}%"></div>
        <div class="unc" style="left:0;width:${uncW}%"></div>
        <div class="lbl" style="left:${Math.min(gapW,92)}%">gap ${call.gap.toFixed(1)}</div>
        <div class="lbl" style="left:${Math.min(uncW,92)}%;top:20px">need ${(STRICT_K*call.combined).toFixed(1)}</div>
      </div></div>`;
  }
  return `<div class="challengePanel"><h3>\u2696\uFE0F Challenge Mode \u2014 show your work</h3>${steps}${band}
    <div style="padding:0 14px 12px"><button id="verifyInline" style="border-color:var(--challenge)">Verify scale on a ring \u2192</button></div></div>`;
}

/* ---- logging ---- */
const LOG=[];
const LOG_HEADER=['session','timestamp','call','confident','margin_cm','uncertainty_cm',
  'stone1_color','stone1_edge_cm','stone2_color','stone2_edge_cm','stone3_color','stone3_edge_cm','stone4_color','stone4_edge_cm',
  'pin_method','tilt_frac','user_right','user_wrong'];
function saveRow(M){
  const r=M.ranked.slice(0,4);const slot=[null,null,null,null];r.forEach((s,i)=>slot[i]={c:s.label,d:s.edgeCm});
  const call=M.call;
  const row=[session,new Date().toISOString(),
    call?(call.solo?call.winner.label:(call.confident?call.winner.label:'TOO CLOSE')):'',
    call&&!call.solo?(call.confident?'yes':'no'):'',
    call&&call.gap!=null?call.gap.toFixed(1):'', call&&call.combined!=null?call.combined.toFixed(1):'',
    slot[0]?.c||'',slot[0]?.d!=null?slot[0].d.toFixed(1):'',slot[1]?.c||'',slot[1]?.d!=null?slot[1].d.toFixed(1):'',
    slot[2]?.c||'',slot[2]?.d!=null?slot[2].d.toFixed(1):'',slot[3]?.c||'',slot[3]?.d!=null?slot[3].d.toFixed(1):'',
    pin?.method||'none',tiltFrac.toFixed(3),lastFlags.happy?'yes':'no',lastFlags.error?'yes':'no'];
  LOG.push(row);toast(`Saved row ${LOG.length}.`);
}
function downloadCsv(){if(!LOG.length){toast('Log empty \u2014 press Save to log first.');return;}
  const esc=v=>{const s=String(v);return /[",\n]/.test(s)?'"'+s.replace(/"/g,'""')+'"':s;};
  const lines=[LOG_HEADER.join(',')].concat(LOG.map(r=>r.map(esc).join(',')));
  const blob=new Blob([lines.join('\n')],{type:'text/csv'});const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);a.download=`shotrock_log_${new Date().toISOString().slice(0,19).replace(/[:T]/g,'-')}.csv`;a.click();
  setTimeout(()=>URL.revokeObjectURL(a.href),1000);toast('CSV downloaded.');}
function downloadPng(){const wasCh=challenge;redraw();canvas.toBlob(blob=>{const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`shotrock_s${session}_${Date.now()}.png`;a.click();setTimeout(()=>URL.revokeObjectURL(a.href),1000);toast('Image saved.');},'image/png');}

/* delegate inline verify button (created in challenge panel) */
resultsEl.addEventListener('click',e=>{if(e.target&&e.target.id==='verifyInline'){verifyMode=true;toast('Verify: pinch in, tap a point on a known ring line.');setHint('<b>Verify Scale:</b> tap a point sitting exactly on a painted ring line. The tool reports what it reads vs. the known distance.');}});

setMode('stone');
</script>
</body>
</html>
