<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
<title>Shot Rock Tap-Seed Prototype</title>
<style>
  :root{--bg:#0c1116;--panel:#121923;--ink:#f2f6fb;--muted:#9fb0c2;--line:#283443;--green:#35e66d;--gold:#ffd84d;--red:#ff4d4d;--blue:#4da3ff;}
  *{box-sizing:border-box} body{margin:0;background:var(--bg);color:var(--ink);font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif}
  header{padding:14px 16px;border-bottom:1px solid var(--line);background:#0e151d;position:sticky;top:0;z-index:2}
  h1{font-size:18px;margin:0 0 4px}.sub{color:var(--muted);font-size:13px;line-height:1.3}
  .bar{display:flex;gap:8px;flex-wrap:wrap;padding:12px 16px;background:var(--panel);border-bottom:1px solid var(--line)}
  button,label.file{border:1px solid #3a4b61;background:#1a2532;color:var(--ink);padding:10px 12px;border-radius:10px;font-weight:650;font-size:14px}
  button.active{background:#173d25;border-color:#2dd66a}.danger{background:#3a1b1b;border-color:#7c3333}
  input[type=file]{display:none}.wrap{padding:12px}.canvasWrap{width:100%;overflow:hidden;border:1px solid var(--line);border-radius:12px;background:#05080b;touch-action:none}
  canvas{display:block;width:100%;height:auto;max-width:100%;touch-action:none}
  .info{padding:12px 16px;color:var(--muted);font-size:14px;line-height:1.4}.results{padding:0 16px 20px}
  table{width:100%;border-collapse:collapse;background:var(--panel);border:1px solid var(--line);border-radius:12px;overflow:hidden;font-size:14px}
  th,td{padding:10px;border-bottom:1px solid var(--line);text-align:left}th{color:#cfe1f5;background:#17202b}tr:last-child td{border-bottom:0}
  .pill{display:inline-block;border:1px solid #405267;border-radius:999px;padding:2px 8px;color:#d9e8f7}.small{font-size:12px;color:var(--muted)}
</style>
</head>
<body>
<header>
  <h1>Shot Rock · Tap-Seed Test FIT V2</h1>
  <div class="sub">Upload photo → full image stays visible → tap candidate stones. V2 constrains circle to visible granite edge.</div>
</header>
<div class="bar">
  <label class="file">Load Photo<input id="file" type="file" accept="image/*"></label>
  <button id="modeStone" class="active">Tap Stones</button>
  <button id="modePin">Set Pin Override</button>
  <button id="undo">Undo</button>
  <button id="clear" class="danger">Clear Stones</button>
</div>
<div class="info" id="status">Load a curling photo. Then tap each stone you want measured.</div>
<div class="wrap"><div class="canvasWrap"><canvas id="cv"></canvas></div></div>
<div class="results" id="results"></div>
<script>
const canvas = document.getElementById('cv');
const ctx = canvas.getContext('2d', {willReadFrequently:true});
const fileInput = document.getElementById('file');
const statusEl = document.getElementById('status');
const resultsEl = document.getElementById('results');
let img = null, imgData = null, mode='stone', pin=null, pinAuto=null, stones=[];
const STONE_DIAMETER_CM = 29.2; // curling stone max diameter approx 11.5 in
function clamp(v,a,b){return Math.max(a,Math.min(b,v));}
function rgbToHsv(r,g,b){r/=255;g/=255;b/=255;let max=Math.max(r,g,b),min=Math.min(r,g,b),d=max-min,h=0,s=max?d/max:0,v=max;if(d){switch(max){case r:h=(g-b)/d+(g<b?6:0);break;case g:h=(b-r)/d+2;break;case b:h=(r-g)/d+4;break;}h/=6;}return [h,s,v];}
function getXY(evt){const rect=canvas.getBoundingClientRect();let e=evt.touches?evt.touches[0]:evt;return {x:(e.clientX-rect.left)*(canvas.width/rect.width), y:(e.clientY-rect.top)*(canvas.height/rect.height)};}
fileInput.onchange = e => { const f=e.target.files[0]; if(!f)return; const url=URL.createObjectURL(f); const im=new Image(); im.onload=()=>{img=im; setupCanvas(); URL.revokeObjectURL(url)}; im.src=url; };
document.getElementById('modeStone').onclick=()=>setMode('stone'); document.getElementById('modePin').onclick=()=>setMode('pin');
document.getElementById('undo').onclick=()=>{stones.pop(); redraw();}; document.getElementById('clear').onclick=()=>{stones=[]; redraw();};
function setMode(m){mode=m; document.getElementById('modeStone').classList.toggle('active',m==='stone'); document.getElementById('modePin').classList.toggle('active',m==='pin'); statusEl.textContent=m==='pin'?'Tap exact pin center to override.':'Tap each candidate stone.';}
function setupCanvas(){
  const maxW = Math.min(1400, img.naturalWidth), scale=maxW/img.naturalWidth;
  canvas.width=Math.round(img.naturalWidth*scale); canvas.height=Math.round(img.naturalHeight*scale);
  ctx.drawImage(img,0,0,canvas.width,canvas.height);
  imgData=ctx.getImageData(0,0,canvas.width,canvas.height);
  stones=[]; pinAuto=autoFindPin(); pin=pinAuto; redraw();
}
canvas.addEventListener('click', evt=>{ if(!imgData)return; const p=getXY(evt); if(mode==='pin'){pin={x:p.x,y:p.y,manual:true}; redraw(); return;} const st=detectStoneFromSeed(p.x,p.y); if(st){stones.push(st); redraw();} });
function autoFindPin(){
  // Lightweight center guess: largest red/pink house region centroid. Debug aid, not final Claude center engine.
  const W=canvas.width,H=canvas.height,D=imgData.data; let sx=0,sy=0,n=0;
  for(let y=0;y<H;y+=2){for(let x=0;x<W;x+=2){let i=(y*W+x)*4,r=D[i],g=D[i+1],b=D[i+2];let [h,s,v]=rgbToHsv(r,g,b);
    const red = ((h<0.06||h>0.93)&&s>0.12&&v>0.35&&r>g*1.05&&r>b*1.05);
    if(red){sx+=x;sy+=y;n++;}
  }}
  if(n<100) return {x:W/2,y:H/2,weak:true};
  return {x:sx/n,y:sy/n,auto:true};
}
function objectMaskAt(x,y){
  const W=canvas.width,H=canvas.height,D=imgData.data; if(x<0||y<0||x>=W||y>=H)return false; let i=(y*W+x)*4,r=D[i],g=D[i+1],b=D[i+2];let [h,s,v]=rgbToHsv(r,g,b);
  // Raised/non-ice: dark granite, saturated handles, strong shadow. Avoid faint red paint by requiring darkness or very saturated plastic.
  const dark = v < 0.48 && (r+g+b)<390;
  const plastic = s>0.42 && v>0.35 && ( (h<0.11||h>0.92) || (h>0.12&&h<0.20) || (h>0.25&&h<0.45) );
  const shadow = v<0.58 && s<0.35;
  return dark || plastic || shadow;
}
function isGraniteAt(x,y){
  const W=canvas.width,H=canvas.height,D=imgData.data;
  if(x<0||y<0||x>=W||y>=H)return false;
  let i=(Math.floor(y)*W+Math.floor(x))*4;
  let r=D[i],g=D[i+1],b=D[i+2];
  let [h,s,v]=rgbToHsv(r,g,b);
  // Granite is dark/gray/speckled. Avoid red/blue house paint and plastic handles.
  const sum=r+g+b;
  const grayish = Math.abs(r-g)<55 && Math.abs(g-b)<65;
  return (v<0.55 && s<0.42 && sum<430 && grayish);
}
function detectStoneFromSeed(seedX,seedY){
  const W=canvas.width,H=canvas.height;

  // V2 fix: the tap selects the stone, but the fitted circle must hug the visible granite.
  // Do NOT inflate to a giant generic search circle.
  const baseR = Math.max(35, Math.min(120, Math.min(W,H)*0.095));
  const searchR = baseR*1.65;
  const x0=clamp(Math.floor(seedX-searchR),0,W-1), x1=clamp(Math.ceil(seedX+searchR),0,W-1);
  const y0=clamp(Math.floor(seedY-searchR),0,H-1), y1=clamp(Math.ceil(seedY+searchR),0,H-1);
  const w=x1-x0+1,h=y1-y0+1, N=w*h;

  // Build granite-only mask around the tapped stone.
  const m=new Uint8Array(N);
  for(let yy=0;yy<h;yy++){
    for(let xx=0;xx<w;xx++){
      const gx=x0+xx, gy=y0+yy;
      if(Math.hypot(gx-seedX,gy-seedY)<=searchR && isGraniteAt(gx,gy)) m[yy*w+xx]=1;
    }
  }

  // Close small gaps, but do not over-dilate or the fitted radius becomes too big.
  let mm=m;
  for(let pass=0;pass<1;pass++) mm=dilate(mm,w,h);
  for(let pass=0;pass<1;pass++) mm=erode(mm,w,h);

  // Find the granite component closest to the tap.
  const sx=clamp(Math.round(seedX-x0),0,w-1), sy=clamp(Math.round(seedY-y0),0,h-1);
  let best=-1, bd=1e9;
  const maxFind=Math.floor(searchR);
  for(let yy=Math.max(0,sy-maxFind); yy<=Math.min(h-1,sy+maxFind); yy++){
    for(let xx=Math.max(0,sx-maxFind); xx<=Math.min(w-1,sx+maxFind); xx++){
      const idx=yy*w+xx;
      if(!mm[idx]) continue;
      const d=(xx-sx)*(xx-sx)+(yy-sy)*(yy-sy);
      if(d<bd){bd=d; best=idx;}
    }
  }
  if(best<0){alert('No granite found near tap. Try tapping closer to the visible stone body.'); return null;}

  const comp=floodComponent(mm,w,h,best);
  if(comp.pixels.length<80){alert('Granite component too small. Try another tap.');return null;}

  const pts=[];
  let minx=1e9,miny=1e9,maxx=-1,maxy=-1;
  for(const idx of comp.pixels){
    const lx=idx%w, ly=Math.floor(idx/w);
    const px=x0+lx, py=y0+ly;
    pts.push({x:px,y:py,lx,ly});
    minx=Math.min(minx,px); maxx=Math.max(maxx,px); miny=Math.min(miny,py); maxy=Math.max(maxy,py);
  }

  const boxW=maxx-minx, boxH=maxy-miny;
  const bboxR=Math.max(boxW,boxH)/2;
  const bboxCx=(minx+maxx)/2, bboxCy=(miny+maxy)/2;
  const boundary = boundaryPoints(pts, x0,y0,w,h,mm);
  let circle = fitCircleKasa(boundary.length>30?boundary:pts);

  // Kasa can explode on partial arcs. Constrain it to the visible granite bounding box.
  const minR = Math.max(18, bboxR*0.75);
  const maxR = Math.max(28, bboxR*1.22);
  const centerJump = circle ? Math.hypot(circle.x-bboxCx,circle.y-bboxCy) : 9999;
  if(!circle || !isFinite(circle.r) || circle.r<minR || circle.r>maxR || centerJump>bboxR*0.65){
    circle={x:bboxCx,y:bboxCy,r:Math.max(22,bboxR*1.06)};
  } else {
    // Slightly expand to reach outer granite edge, but never to the huge search area.
    circle.r = clamp(circle.r*1.04, minR, maxR);
  }

  const label=labelColor(seedX,seedY,circle.r);
  const pinPt=pin||{x:W/2,y:H/2};
  const centerDist=Math.hypot(circle.x-pinPt.x,circle.y-pinPt.y);
  const edgePx=Math.max(0,centerDist-circle.r);
  const cmPerPx=STONE_DIAMETER_CM/(2*circle.r);
  const edgeCm=edgePx*cmPerPx;
  return {x:circle.x,y:circle.y,r:circle.r,seed:{x:seedX,y:seedY},label,edgePx,edgeCm,cmPerPx,confidence:scoreStone(circle,pts,boundary)};
}
function dilate(m,w,h){const out=new Uint8Array(m.length); for(let y=0;y<h;y++)for(let x=0;x<w;x++){let val=0; for(let dy=-1;dy<=1&&!val;dy++)for(let dx=-1;dx<=1;dx++){let xx=x+dx,yy=y+dy;if(xx>=0&&yy>=0&&xx<w&&yy<h&&m[yy*w+xx]){val=1;break}} out[y*w+x]=val;} return out;}
function erode(m,w,h){const out=new Uint8Array(m.length); for(let y=0;y<h;y++)for(let x=0;x<w;x++){let val=1; for(let dy=-1;dy<=1&&val;dy++)for(let dx=-1;dx<=1;dx++){let xx=x+dx,yy=y+dy;if(xx<0||yy<0||xx>=w||yy>=h||!m[yy*w+xx]){val=0;break}} out[y*w+x]=val;} return out;}
function floodComponent(m,w,h,start){const seen=new Uint8Array(m.length), q=[start], pix=[]; seen[start]=1; for(let qi=0;qi<q.length;qi++){const idx=q[qi];pix.push(idx);const x=idx%w,y=Math.floor(idx/w); for(const [dx,dy] of [[1,0],[-1,0],[0,1],[0,-1]]){let xx=x+dx,yy=y+dy;if(xx>=0&&yy>=0&&xx<w&&yy<h){let ni=yy*w+xx;if(m[ni]&&!seen[ni]){seen[ni]=1;q.push(ni);}}}} return {pixels:pix};}
function boundaryPoints(pts,x0,y0,w,h,m){const out=[]; const set=new Set(pts.map(p=>p.ly*w+p.lx)); for(const p of pts){const x=p.lx,y=p.ly; let edge=false; for(const [dx,dy] of [[1,0],[-1,0],[0,1],[0,-1]]){let xx=x+dx,yy=y+dy;if(xx<0||yy<0||xx>=w||yy>=h||!set.has(yy*w+xx)){edge=true;break}} if(edge)out.push({x:p.x,y:p.y});} return out;}
function fitCircleKasa(points){
  // Least squares for x^2+y^2 + A*x + B*y + C = 0
  let Sx=0,Sy=0,Sxx=0,Syy=0,Sxy=0,Sz=0,Sxz=0,Syz=0,n=points.length;
  for(const p of points){const x=p.x,y=p.y,z=x*x+y*y;Sx+=x;Sy+=y;Sxx+=x*x;Syy+=y*y;Sxy+=x*y;Sz+=z;Sxz+=x*z;Syz+=y*z;}
  const M=[[Sxx,Sxy,Sx],[Sxy,Syy,Sy],[Sx,Sy,n]], B=[-Sxz,-Syz,-Sz]; const sol=solve3(M,B); if(!sol)return null; const [A,Bb,C]=sol; const cx=-A/2, cy=-Bb/2; const rr=cx*cx+cy*cy-C; if(rr<=0)return null; return {x:cx,y:cy,r:Math.sqrt(rr)};
}
function solve3(M,b){let a=M.map((r,i)=>[...r,b[i]]); for(let i=0;i<3;i++){let max=i;for(let r=i+1;r<3;r++)if(Math.abs(a[r][i])>Math.abs(a[max][i]))max=r; if(Math.abs(a[max][i])<1e-9)return null; [a[i],a[max]]=[a[max],a[i]]; let div=a[i][i]; for(let c=i;c<4;c++)a[i][c]/=div; for(let r=0;r<3;r++)if(r!==i){let f=a[r][i];for(let c=i;c<4;c++)a[r][c]-=f*a[i][c];}} return [a[0][3],a[1][3],a[2][3]];}
function labelColor(cx,cy,r){const W=canvas.width,H=canvas.height,D=imgData.data; let red=0,yel=0,total=0; const R=Math.max(8,r*0.55); for(let y=Math.max(0,Math.floor(cy-R));y<Math.min(H,Math.ceil(cy+R));y+=2)for(let x=Math.max(0,Math.floor(cx-R));x<Math.min(W,Math.ceil(cx+R));x+=2){if(Math.hypot(x-cx,y-cy)>R)continue;let i=(y*W+x)*4;let [h,s,v]=rgbToHsv(D[i],D[i+1],D[i+2]);if(s>.35&&v>.25){total++; if(h<.08||h>.93)red++; if(h>.10&&h<.20)yel++;}}
  if(red>yel*1.2&&red>5)return 'Red'; if(yel>red*1.2&&yel>5)return 'Yellow'; return 'Stone';}
function scoreStone(circle,pts,boundary){let expected=Math.max(28,Math.min(130,Math.min(canvas.width,canvas.height)*0.085)); let sizeScore=1-Math.min(1,Math.abs(circle.r-expected)/(expected*.9)); let pixScore=Math.min(1,pts.length/2500); let edgeScore=Math.min(1,boundary.length/300); return Math.round(100*(.45*sizeScore+.3*pixScore+.25*edgeScore));}
function redraw(){
  if(!imgData)return; ctx.putImageData(imgData,0,0);
  if(pin){ctx.save();ctx.strokeStyle=pin.manual?'#00ff7b':'#00d66b';ctx.lineWidth=4;ctx.beginPath();ctx.moveTo(pin.x-14,pin.y);ctx.lineTo(pin.x+14,pin.y);ctx.moveTo(pin.x,pin.y-14);ctx.lineTo(pin.x,pin.y+14);ctx.stroke();ctx.restore();}
  const sorted=[...stones].sort((a,b)=>a.edgeCm-b.edgeCm);
  stones.forEach((s,idx)=>{ctx.save();ctx.lineWidth=4;ctx.strokeStyle=s.label==='Red'?'#ff4040':s.label==='Yellow'?'#ffe14a':'#50a7ff';ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.stroke();ctx.fillStyle=ctx.strokeStyle;ctx.beginPath();ctx.arc(s.seed.x,s.seed.y,5,0,Math.PI*2);ctx.fill(); if(pin){ctx.strokeStyle='rgba(255,255,255,.85)';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(pin.x,pin.y);ctx.lineTo(s.x,s.y);ctx.stroke();} ctx.fillStyle='#fff';ctx.font='bold 18px system-ui';ctx.strokeStyle='#000';ctx.lineWidth=4;const rank=sorted.indexOf(s)+1;ctx.strokeText('#'+rank+' '+s.label, s.x+s.r+6, s.y);ctx.fillText('#'+rank+' '+s.label, s.x+s.r+6, s.y);ctx.restore();});
  renderResults();
}
function renderResults(){
  if(!stones.length){resultsEl.innerHTML='<div class="small">No stones tapped yet.</div>';return;}
  const sorted=[...stones].sort((a,b)=>a.edgeCm-b.edgeCm); const diff=sorted.length>1?Math.abs(sorted[1].edgeCm-sorted[0].edgeCm):null;
  let html='<table><thead><tr><th>Rank</th><th>Stone</th><th>Distance</th><th>Confidence</th></tr></thead><tbody>';
  sorted.forEach((s,i)=>{html+=`<tr><td>${i+1}</td><td><span class="pill">${s.label}</span></td><td>${s.edgeCm.toFixed(1)} cm <span class="small">(${(s.edgeCm/2.54).toFixed(2)} in)</span></td><td>${s.confidence}%</td></tr>`});
  html+='</tbody></table>'; if(diff!==null)html+=`<p><b>${sorted[0].label} is closest</b> by ${diff.toFixed(1)} cm (${(diff*10).toFixed(0)} mm).</p>`; html+=`<p class="small">Prototype note: pin auto-center here is a lightweight red-house centroid, not Claude’s full conic engine. Use Set Pin Override when testing measurement behavior.</p>`; resultsEl.innerHTML=html;
}
</script>
</body></html>
