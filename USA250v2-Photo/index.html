<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Your USA250 Photo</title>
  <style>
    html, body {
      margin: 0;
      min-height: 100%;
      background: #07111f;
      color: #fff;
      font-family: Arial, sans-serif;
    }

    body {
      background:
        linear-gradient(rgba(7,17,31,.35), rgba(7,17,31,.75)),
        url("https://phoneguy94.github.io/0924/USA250-CAM/USA_Background.png")
        center center / cover fixed no-repeat;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      box-sizing: border-box;
    }

    .wrap {
      width: min(1500px, 100%);
      text-align: center;
    }

    h1 {
      font-size: clamp(30px, 7vw, 58px);
      margin: 0 0 8px;
      text-shadow: 0 4px 22px rgba(0,0,0,.75);
    }

    p {
      font-size: clamp(16px, 4vw, 24px);
      opacity: .95;
      text-shadow: 0 3px 14px rgba(0,0,0,.75);
    }

    .grid {
  display: grid;
  grid-template-columns: repeat(3, minmax(300px, 1fr));
  gap: 28px;
  margin-top: 22px;
  align-items: start;
}

@media (max-width: 900px) {
  .grid {
    grid-template-columns: 1fr;
  }
}

    .card {
      background: #f4f1e8;
      color: #111b2c;
      border-radius: 18px;
      padding: 12px 12px 18px;
      box-shadow: 0 18px 50px rgba(0,0,0,.55);
    }

    .card img {
      width: 100%;
      border-radius: 12px;
      display: block;
      background: #07111f;
    }

    .caption {
      font-family: Georgia, serif;
      font-style: italic;
      font-weight: 900;
      font-size: 22px;
      margin-top: 12px;
    }

    .actions {
      margin-top: 22px;
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }

    a, button {
      font-size: 20px;
      font-weight: bold;
      padding: 14px 22px;
      border: 0;
      border-radius: 16px;
      background: #fff;
      color: #07111f;
      text-decoration: none;
      box-shadow: 0 8px 24px rgba(0,0,0,.35);
      cursor: pointer;
    }

    .spinner {
      width: 60px;
      height: 60px;
      border: 7px solid rgba(255,255,255,.25);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 26px auto;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .small {
      font-size: 14px;
      opacity: .75;
      margin-top: 14px;
    }

    .hidden {
      display: none !important;
    }
  </style>
</head>

<body>
  <div class="wrap">
    <h1>Your USA250 Photo</h1>
    <p id="message">Creating your USA250 image. This page will update automatically.</p>

    <div id="spinner" class="spinner"></div>
    <div id="grid" class="grid"></div>

    <div class="actions">
      <a href="https://phoneguy94.github.io/0924/USA250v2-CAM/">📸 Take Another</a>
      <a href="https://phoneguy94.github.io/0924/USA250-Wall/">🖼️ View Wall</a>
      <button id="refresh">Refresh</button>
    </div>

    <div class="small">USA250v2 · Powered by Veytec + Webex</div>
  </div>

  <script>
    const BASE_ID = "appSxuH0GH10rxd5y";
    const TABLE_ID = "tblI7llQH93Xkin3O";

    const USA250_FIELDS = [
      "fldjLx8XrIxda4FcV",
      "fldoj4Im2cUcxua5D",
      "fld2p2xcD1atuV7CM"
    ];

    const USA250_CAPTIONS = [
      "America 250",
      "Liberty Celebration",
      "Hometown Parade"
    ];

    const AIRTABLE_TOKEN = "patYsJQ4hhojOhYuk.a0839f88a7ae231ce3bf1db6816c451efd8cc6dc7a313a99d4216dc1e557336e";

    const params = new URLSearchParams(location.search);
    const recordId = params.get("id");
    const ts = Number(params.get("ts") || Date.now());

    const message = document.getElementById("message");
    const grid = document.getElementById("grid");
    const spinner = document.getElementById("spinner");

    function esc(s) {
      return String(s || "").replace(/[&<>'"]/g, c => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        "'": "&#39;",
        "\"": "&quot;"
      }[c]));
    }

    function attUrl(a) {
      return (a && a.thumbnails && a.thumbnails.large && a.thumbnails.large.url) ||
             (a && a.url) ||
             "";
    }

    function firstAttachmentUrl(v) {
      return Array.isArray(v) && v.length ? attUrl(v[0]) : "";
    }

    function imgsFromRecord(rec) {
      const f = rec.fields || {};

      return USA250_FIELDS.map((fid, i) => ({
        url: firstAttachmentUrl(f[fid]),
        caption: USA250_CAPTIONS[i]
      })).filter(x => x.url);
    }

    async function fetchRecordById(id) {
      const url = `https://api.airtable.com/v0/${BASE_ID}/${TABLE_ID}/${encodeURIComponent(id)}?returnFieldsByFieldId=true`;

      const res = await fetch(url, {
        headers: {
          Authorization: `Bearer ${AIRTABLE_TOKEN}`
        }
      });

      if (!res.ok) throw new Error("Airtable returned " + res.status);

      return await res.json();
    }

    async function fetchLatestAfter() {
      let records = [];
      let offset = null;

      do {
        const url =
          `https://api.airtable.com/v0/${BASE_ID}/${TABLE_ID}?pageSize=100&returnFieldsByFieldId=true` +
          (offset ? `&offset=${encodeURIComponent(offset)}` : "");

        const res = await fetch(url, {
          headers: {
            Authorization: `Bearer ${AIRTABLE_TOKEN}`
          }
        });

        if (!res.ok) throw new Error("Airtable returned " + res.status);

        const data = await res.json();

        records = records.concat(data.records || []);
        offset = data.offset || null;
      } while (offset);

      const after = new Date(ts - 120000);

      records.sort((a, b) => new Date(b.createdTime) - new Date(a.createdTime));

      return records.find(r =>
        new Date(r.createdTime) >= after &&
        imgsFromRecord(r).length
      );
    }

    function render(imgs) {
      spinner.classList.add("hidden");
      message.textContent = "Your USA250 image is ready.";

      grid.innerHTML = imgs.map(x => `
        <div class="card">
          <img src="${esc(x.url)}" alt="">
          <div class="caption">${esc(x.caption)}</div>
        </div>
      `).join("");
    }

    async function load() {
      try {
        const rec = recordId
          ? await fetchRecordById(recordId)
          : await fetchLatestAfter();

        if (rec) {
          const imgs = imgsFromRecord(rec);

          if (imgs.length) {
            render(imgs);
            return;
          }
        }

        spinner.classList.remove("hidden");
        message.textContent = "Still creating your USA250 image. This page will update automatically.";
      } catch (e) {
        console.error(e);
        spinner.classList.remove("hidden");
        message.textContent = "Still waiting for your photo. Refresh in a few seconds.";
      }
    }

    document.getElementById("refresh").onclick = load;

    load();
    setInterval(load, 8000);
  </script>
</body>
</html>
