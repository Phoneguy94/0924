<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Veytec Bobblehead Kiosk</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #07111f;
      color: white;
      text-align: center;
      overflow: hidden;
    }
    .header {
      padding: 22px;
      font-size: 42px;
      font-weight: bold;
      letter-spacing: 1px;
    }
    .subheader {
      font-size: 24px;
      opacity: 0.9;
      margin-bottom: 20px;
    }
    .camera-wrap {
      position: relative;
      width: 80%;
      max-width: 900px;
      margin: 0 auto;
      border: 8px solid #f6c343;
      border-radius: 24px;
      overflow: hidden;
      background: #000;
    }
    /* Mirror the live preview so it feels natural at a kiosk */
    video { transform: scaleX(-1); }
    video, canvas, img {
      width: 100%;
      display: block;
      pointer-events: none;          /* block Desk Pro hover/pop-out controls */
      -webkit-user-select: none;
      user-select: none;
      -webkit-touch-callout: none;
    }
    /* Big 3-2-1 countdown over the live video */
    .countdown {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 220px;
      font-weight: bold;
      color: #fff;
      text-shadow: 0 0 30px rgba(0,0,0,0.8);
      background: rgba(0,0,0,0.25);
      pointer-events: none;
    }
    .button-row {
      margin-top: 24px;
    }
    button {
      font-size: 30px;
      font-weight: bold;
      padding: 20px 42px;
      margin: 10px;
      border: none;
      border-radius: 16px;
      background: #f6c343;
      color: #07111f;
      cursor: pointer;
    }
    button.secondary {
      background: white;
    }
    button:disabled {
      opacity: 0.5;
      cursor: default;
    }
    .hidden {
      display: none;
    }
    .status {
      margin-top: 14px;
      font-size: 22px;
      min-height: 28px;
      opacity: 0.9;
    }
    .watermark {
      position: fixed;
      bottom: 18px;
      right: 24px;
      font-size: 24px;
      opacity: 0.65;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="header">⚾ Smile for Your Bobblehead</div>
  <div class="subheader">Look at the camera and tap Take Picture</div>
  <div class="camera-wrap">
    <video id="video" autoplay playsinline></video>
    <canvas id="canvas" class="hidden"></canvas>
    <img id="photo" class="hidden" alt="Captured selfie" />
    <div id="countdown" class="countdown hidden"></div>
  </div>
  <div class="button-row">
    <button id="takePhoto">📸 Take Picture</button>
    <button id="retake" class="secondary hidden">↩ Retake</button>
    <button id="submit" class="hidden">✅ Send It</button>
  </div>
  <div class="status" id="status"></div>
  <div class="watermark">Powered by Veytec + Webex &middot; <span id="ver">v1.5</span></div>

  <script>
    const video = document.getElementById("video");
    const canvas = document.getElementById("canvas");
    const photo = document.getElementById("photo");
    const takePhotoBtn = document.getElementById("takePhoto");
    const retakeBtn = document.getElementById("retake");
    const submitBtn = document.getElementById("submit");
    const statusEl = document.getElementById("status");
    const countdownEl = document.getElementById("countdown");

    // ── CONFIG ──────────────────────────────────────────────
    const WEBHOOK_URL = "https://hooks.us.webexconnect.io/events/X6LYS4HP7U";
    const MAX_WIDTH = 640;     // AI-reference sweet spot
    const JPEG_QUALITY = 0.7;  // keeps base64 ~55–110 KB
    const IDLE_TIMEOUT_MS = 30000;  // walk-away reset after photo taken
    // ────────────────────────────────────────────────────────

    let capturedBase64 = "";   // raw base64, no data: prefix
    let idleTimer = null;      // resets to camera if user abandons the photo

    function startIdleTimer() {
      clearTimeout(idleTimer);
      idleTimer = setTimeout(resetToCamera, IDLE_TIMEOUT_MS);
    }
    function stopIdleTimer() {
      clearTimeout(idleTimer);
    }

    async function startCamera() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: "user", width: { ideal: 1280 }, height: { ideal: 720 } },
          audio: false
        });
        video.srcObject = stream;
      } catch (err) {
        alert("Camera could not start. Check device camera permissions.");
        console.error(err);
      }
    }

    // Draw the current video frame onto a small canvas, return raw base64
    function downscaleToBase64() {
      const sw = video.videoWidth;
      const sh = video.videoHeight;
      const scale = Math.min(1, MAX_WIDTH / sw);
      const dw = Math.round(sw * scale);
      const dh = Math.round(sh * scale);

      canvas.width = dw;
      canvas.height = dh;
      const ctx = canvas.getContext("2d");

      // Un-mirror on capture so the saved image isn't reversed
      ctx.save();
      ctx.translate(dw, 0);
      ctx.scale(-1, 1);
      ctx.drawImage(video, 0, 0, dw, dh);
      ctx.restore();

      const dataUrl = canvas.toDataURL("image/jpeg", JPEG_QUALITY);
      // strip the "data:image/jpeg;base64," prefix — send raw base64
      return dataUrl.split(",")[1];
    }

    // Tap = run 3-2-1 countdown, then capture
    takePhotoBtn.addEventListener("click", () => {
      takePhotoBtn.disabled = true;
      let n = 3;
      countdownEl.textContent = n;
      countdownEl.classList.remove("hidden");

      const tick = setInterval(() => {
        n -= 1;
        if (n > 0) {
          countdownEl.textContent = n;
        } else {
          clearInterval(tick);
          countdownEl.classList.add("hidden");
          takePhotoBtn.disabled = false;
          captureNow();
        }
      }, 1000);
    });

    function captureNow() {
      capturedBase64 = downscaleToBase64();
      photo.src = "data:image/jpeg;base64," + capturedBase64;  // preview with prefix

      const approxKB = Math.round((capturedBase64.length * 3 / 4) / 1024);
      statusEl.textContent = "Ready to send (~" + approxKB + " KB)";

      video.classList.add("hidden");
      photo.classList.remove("hidden");
      takePhotoBtn.classList.add("hidden");
      retakeBtn.classList.remove("hidden");
      submitBtn.classList.remove("hidden");

      startIdleTimer();  // if they walk away without sending, reset
    }

    submitBtn.addEventListener("click", async () => {
      if (!capturedBase64) return;
      stopIdleTimer();  // they engaged — cancel the walk-away timer
      submitBtn.disabled = true;
      retakeBtn.disabled = true;
      statusEl.textContent = "Sending…";

      const payload = {
        automation: "bobblehead_kiosk",
        custname: "Veytec",
        demo_type: "bobblehead",
        Name: "Kiosk",
        MobileNumber: "0000000000",
        EventName: "Kiosk-Baseball",
        imageB64: capturedBase64
      };

      try {
        const res = await fetch(WEBHOOK_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });
        if (res.ok) {
          statusEl.textContent = "Sent! Your bobblehead is on the way ⚾";
          setTimeout(resetToCamera, 4000);  // auto-reset for next person
        } else {
          statusEl.textContent = "Hmm, let's try that again.";
          setTimeout(resetToCamera, 4000);  // auto-reset, don't get stuck
        }
      } catch (err) {
        console.error(err);
        statusEl.textContent = "Let's try that again.";
        setTimeout(resetToCamera, 4000);    // auto-reset on network failure too
      }
    });

    retakeBtn.addEventListener("click", () => {
      stopIdleTimer();
      resetToCamera();
    });

    function resetToCamera() {
      stopIdleTimer();
      countdownEl.classList.add("hidden");
      takePhotoBtn.disabled = false;
      capturedBase64 = "";
      statusEl.textContent = "";
      photo.classList.add("hidden");
      video.classList.remove("hidden");
      retakeBtn.classList.add("hidden");
      submitBtn.classList.add("hidden");
      takePhotoBtn.classList.remove("hidden");
      submitBtn.disabled = false;
      retakeBtn.disabled = false;
    }

    startCamera();
  </script>
</body>
</html>
