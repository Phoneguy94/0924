<!DOCTYPE html>

<title>Webex Ballpark Experience</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}

  body{
    min-height:100vh;
    background:#0a1526;            /* navy from the image; fills any empty space seamlessly */
    font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;
    overflow-x:hidden;
  }

  /* The hero image, centered, always shown WHOLE (never cropped),
     scaling to fit whatever screen it's on. Navy body shows behind it. */
  .hero{
    position:fixed;inset:0;z-index:0;
    display:flex;align-items:center;justify-content:center;
    padding:0;
  }
  .hero img{
    max-width:100%;
    max-height:100%;
    width:auto;height:auto;
    object-fit:contain;
    display:block;
  }

  /* Desktop & landscape phone: image is wide like the screen -> fills nicely,
     pin toward top so logos/headline read first and the chat sits over the lower area. */
  @media (min-aspect-ratio: 1/1){
    .hero{align-items:flex-start}
    .hero img{max-height:100vh}
  }

  /* Portrait phone: wide image becomes a top banner; navy fills below
     where the chat widget lives. Everything in the graphic stays visible. */
  @media (max-aspect-ratio: 3/4){
    .hero{align-items:flex-start}
    .hero img{width:100%;max-height:none}
  }

  main{position:relative;z-index:1;min-height:100vh}
</style>
</head>
