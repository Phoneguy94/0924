<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Webex Ballpark — Kiosk Rotator</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;background:#0a0805;overflow:hidden;
    font-family:'Oswald',Arial,sans-serif}
  /* each view is its own iframe, stacked and faded in/out.
     They all stay LOADED so playback continues in the background. */
  .frame{position:fixed;inset:0;width:100%;height:100%;border:0;display:block;
    opacity:0;pointer-events:none;transition:opacity .5s ease;z-index:1}
  .frame.active{opacity:1;pointer-events:auto;z-index:2}

  /* slim control bar, fades out when idle so it's invisible on the TV */
  #bar{position:fixed;left:50%;bottom:18px;transform:translateX(-50%);
    z-index:10;display:flex;align-items:center;gap:8px;
    background:rgba(20,13,8,.86);border:1px solid #4a3624;border-radius:12px;
    padding:8px 12px;backdrop-filter:blur(8px);box-shadow:0 10px 30px rgba(0,0,0,.5);
    opacity:0;transition:opacity .35s ease;letter-spacing:1px}
  body:hover #bar, #bar.show{opacity:1}
  #bar button{font-family:inherit;letter-spacing:1px;font-size:13px;cursor:pointer;
    background:#241b14;color:#f5ecdf;border:1px solid #4a3624;border-radius:8px;
    padding:7px 13px;transition:all .15s}
  #bar button:hover{border-color:#ffc629;color:#ffc629}
  #bar button.active{background:#ffc629;color:#1a1205;border-color:#ffc629}
  #bar .sep{width:1px;height:22px;background:#4a3624;margin:0 4px}
  #bar .lbl{font-size:11px;color:#b89c80;text-transform:uppercase}
  #playBtn{min-width:96px}

  /* thin progress bar across the very top showing time until next switch */
  #prog{position:fixed;top:0;left:0;height:3px;width:0;z-index:11;
    background:linear-gradient(90deg,#ffc629,#ff8c3b);transition:width .25s linear}
</style>
</head>
<body>
  <div id="prog"></div>
  <div id="frames"></div>

  <div id="bar">
    <button id="playBtn">⏸ Pause</button>
    <span class="sep"></span>
    <span id="viewBtns"></span>
    <span class="sep"></span>
    <span class="lbl" id="next">—</span>
  </div>

<script>
/* ====== CONFIG — edit these ====== */
const BASE = "https://phoneguy94.github.io/0924/webex-ballpark3/";
const VIEWS = [
  { name:"Dashboard", url: BASE },                 // 7-panel view
  { name:"Wallboard", url: BASE + "#wallboard" },  // 3 big tiles
  // To add the bobblehead wall later, drop another line here, e.g.:
  // { name:"Bobblehead Wall", url:"https://phoneguy94.github.io/0924/bobblehead-wall/" },
];
const SECONDS = 15;          // how long each view stays up
/* ================================= */

const framesWrap = document.getElementById("frames");
const prog  = document.getElementById("prog");
const bar   = document.getElementById("bar");
const playBtn = document.getElementById("playBtn");
const nextLbl = document.getElementById("next");
const viewBtnsWrap = document.getElementById("viewBtns");

// Build one iframe per view ONCE. They all load and keep running.
const frames = VIEWS.map(v=>{
  const f = document.createElement("iframe");
  f.className = "frame";
  f.src = v.url;            // loaded once, never reloaded -> playback continues
  f.setAttribute("allow","fullscreen");
  framesWrap.appendChild(f);
  return f;
});

// Build the view buttons
const viewBtns = VIEWS.map((v,i)=>{
  const b = document.createElement("button");
  b.textContent = v.name; b.dataset.i = i;
  b.onclick = ()=>{ show(i); setPlaying(false); };  // click a view = jump + pause
  viewBtnsWrap.appendChild(b);
  return b;
});

let cur = 0;
let playing = true;
let elapsed = 0;
let ticker = null;

function show(i){
  cur = (i + VIEWS.length) % VIEWS.length;
  frames.forEach((f,k)=> f.classList.toggle("active", k===cur));
  elapsed = 0;
  paint();
}

function paint(){
  viewBtns.forEach(b=> b.classList.toggle("active", +b.dataset.i === cur));
  const remaining = Math.max(0, SECONDS - elapsed);
  nextLbl.textContent = playing ? `Next: ${VIEWS[(cur+1)%VIEWS.length].name} in ${remaining}s` : "Paused";
  prog.style.width = (elapsed / SECONDS * 100) + "%";
}

function tick(){
  if(!playing) return;
  elapsed++;
  if(elapsed >= SECONDS){ show(cur + 1); return; }
  paint();
}

function setPlaying(on){
  playing = on;
  playBtn.textContent = on ? "⏸ Pause" : "▶ Play";
  paint();
}

/* controls */
playBtn.onclick = ()=> setPlaying(!playing);
document.addEventListener("keydown", e=>{
  if(e.code === "Space"){ e.preventDefault(); setPlaying(!playing); }
  else if(e.key === "ArrowRight"){ show(cur+1); }
  else if(e.key === "ArrowLeft"){ show(cur-1); }
  else if(/^[1-9]$/.test(e.key)){ const i=+e.key-1; if(i<VIEWS.length){ show(i); setPlaying(false); } }
});
/* flash the control bar briefly on load so people know it's there */
bar.classList.add("show");
setTimeout(()=> bar.classList.remove("show"), 2600);

/* go */
show(0);
ticker = setInterval(tick, 1000);
</script>
</body>
</html>
