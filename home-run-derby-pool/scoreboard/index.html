<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>Derby Scoreboard</title><style>:root{--red:#e31837;--green:#79ff8a;--gold:#ffd35a}*{box-sizing:border-box}html,body{margin:0;min-height:100%;background:#07111f;font-family:Inter,system-ui,Arial,sans-serif;color:white}body{overflow-x:hidden}.scene{min-height:100vh;position:relative;background:linear-gradient(#7db8e6 0 25%,#dcebf7 25% 31%,#3f4b5c 31% 47%,#0d642f 47% 100%);overflow:hidden}.sky{position:absolute;inset:0;background:radial-gradient(circle at 78% 7%,#fff9 0 3%,transparent 18%),linear-gradient(180deg,transparent 55%,#0004)}.stands{position:absolute;left:0;right:0;top:31%;height:16%;background:repeating-linear-gradient(0deg,#3c4857 0 8px,#28323f 8px 16px);border-top:8px solid #8e9aa8;border-bottom:12px solid #17202b}.crowd{position:absolute;left:0;right:0;top:33%;height:12%;opacity:.7;background:radial-gradient(circle,#eee 0 1px,transparent 2px);background-size:8px 8px}.wall{position:absolute;left:0;right:0;top:47%;height:17%;background:linear-gradient(#0c6b33,#06491f);border-top:8px solid #153b26;border-bottom:12px solid #7e4d2d}.grass{position:absolute;left:-12%;right:-12%;bottom:-40%;height:92%;border-radius:50% 50% 0 0;background:radial-gradient(ellipse at center,#36aa4c 0 32%,#248d3e 33% 52%,#176f34 53% 68%,#0d5728 69%)}.warning{position:absolute;left:4%;right:4%;bottom:1%;height:17%;border:24px solid #a76b3f;border-radius:50%;opacity:.95}.score{position:absolute;left:50%;top:7%;transform:translateX(-50%);width:min(94%,1120px);background:#111820;border:12px solid #293541;border-radius:16px;box-shadow:0 24px 55px #000c,0 0 0 5px #090c10}.score:before,.score:after{content:"";position:absolute;bottom:-130px;width:18px;height:130px;background:#202a34}.score:before{left:9%}.score:after{right:9%}.head{display:flex;justify-content:space-between;align-items:center;gap:12px;padding:13px 18px;background:linear-gradient(#2b3846,#141b23);border-bottom:4px solid #080b0f}.head strong{letter-spacing:.13em}.live{background:var(--red);border-radius:999px;padding:7px 12px;font-size:12px;font-weight:1000}.screen{min-height:430px;background:#020706;color:#f7f3dc;padding:18px;font-family:"Courier New",monospace;box-shadow:inset 0 0 50px #000}.screen h1{text-align:center;color:var(--green);letter-spacing:.16em;font-size:clamp(28px,4.2vw,52px);margin:0 0 15px;text-shadow:0 0 14px #58ff7188}.leaders{width:100%;border-collapse:collapse;font-size:clamp(17px,2.2vw,30px)}.leaders th,.leaders td{padding:13px 10px;border-bottom:1px dashed #566654;text-align:left;font-weight:1000}.leaders th:last-child,.leaders td:last-child{text-align:right;color:var(--green)}.rank{color:var(--gold)}.meta{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:18px}.meta span{border:1px solid #2c6236;background:#07130b;color:#8fff9b;padding:8px 11px;border-radius:9px;font-size:13px}.foot{display:flex;justify-content:space-between;padding:10px 16px;background:#1c2630;font-weight:900;font-size:13px;letter-spacing:.08em}.actions{position:absolute;right:4%;bottom:4%;display:flex;gap:9px}.btn{display:inline-block;text-decoration:none;border:0;border-radius:999px;padding:12px 17px;background:var(--red);color:white;font-weight:1000;box-shadow:0 10px 25px #0008}.btn.alt{background:var(--gold);color:#111}@media(max-width:700px){.score{top:4%;border-width:7px}.screen{min-height:360px;padding:10px}.leaders th:nth-child(3),.leaders td:nth-child(3){display:none}.scene{min-height:690px}.actions{right:3%;bottom:3%}.head{padding:10px}.foot{font-size:10px}}</style></head><body><main class="scene"><div class="sky"></div><div class="stands"></div><div class="crowd"></div><div class="wall"></div><div class="grass"></div><div class="warning"></div><section class="score"><div class="head"><strong>PHILADELPHIA HOME RUN DERBY</strong><span class="live">LIVE</span></div><div class="screen"><h1>DERBY STANDINGS</h1><table class="leaders"><thead><tr><th>RK</th><th>PLAYER</th><th>CORRECT</th><th>PTS</th></tr></thead><tbody id="rows"><tr><td colspan="4">LOADING…</td></tr></tbody></table><div class="meta"><span id="final">FINAL 0</span><span id="pending">PENDING 0</span><span id="players">PLAYERS 0</span></div></div><div class="foot"><span>CITIZENS BANK PARK</span><span>PREDICTION CHALLENGE</span></div></section><div class="actions"><a class="btn alt" href="../wall/">Bobblehead Wall</a><a class="btn" href="../">Back to Picks</a></div></main><script>const API='https://script.google.com/macros/s/AKfycbxeC_x5b-Ku1a9PJoqtbZyJdDwryAOjV5RGbJ32BSG4oTXbN2gBlSn7w_IVfop5kWCdYw/exec';async function get(action){const u=new URL(API);u.searchParams.set('action',action);return fetch(u).then(r=>r.json())}async function load(){const [b,l]=await Promise.all([get('bootstrap'),get('leaderboard')]);if(l.ok){rows.innerHTML=l.players?.length?l.players.map((p,i)=>`<tr><td class="rank">${i+1}</td><td>${String(p.Name||'').toUpperCase()}</td><td>${p.Correct||0}</td><td>${p.Score||0}</td></tr>`).join(''):'<tr><td colspan="4">NO PICKS YET</td></tr>';players.textContent=`PLAYERS ${l.players?.length||0}`}if(b.ok){const q=b.questions||[];final.textContent=`FINAL ${q.filter(x=>x['Result Status']==='Final').length}`;pending.textContent=`PENDING ${q.filter(x=>x['Result Status']!=='Final'&&x['Result Status']!=='Void').length}`}}load();setInterval(load,15000)</script></body></html>
