<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Home Run Derby Challenge</title><style>*{box-sizing:border-box}body{margin:0;font-family:system-ui;background:#e8eef5;color:#17202a}.shell{max-width:1500px;margin:auto;padding:14px}.top{background:linear-gradient(135deg,#8e0016,#ef1736 55%,#61101c);color:#fff;border-radius:24px;padding:24px}.top h1{margin:0;font-size:clamp(38px,7vw,76px);font-style:italic}.tabs{display:flex;gap:8px;overflow:auto;padding:12px 2px}.tabs button{border:0;border-radius:999px;padding:12px 18px;background:#fff;font-weight:900}.tabs button.active{background:#e31837;color:#fff}.view{display:none}.view.active{display:block}.frame{background:#07111f;border-radius:22px;padding:8px}.frame iframe{display:block;width:100%;height:calc(100vh - 245px);min-height:700px;border:0;border-radius:14px}.notice{background:#fff7d7;border:1px solid #ecd46e;border-radius:16px;padding:14px 16px;font-weight:850;margin:12px 0}.status{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:10px}.status span{background:#fff;border-radius:999px;padding:9px 13px;font-weight:850}@media(max-width:700px){.shell{padding:8px}.frame iframe{height:calc(100vh - 245px);min-height:650px}}</style></head><body><main class="shell"><header class="top"><h1>Home Run Derby</h1><p>Philadelphia • Prediction Challenge</p></header><nav class="tabs"><button class="active" data-view="scoreboard">Scoreboard</button><button data-view="everyone">Everyone's Picks</button><button data-view="wall">Bobblehead Wall</button></nav><div class="notice"><strong>Audited final:</strong> Daniel Quintana has two submitted entries tied for first at 89 points. All nine Airtable entries were recalculated from their underlying Picks records.</div><div class="status"><span>9 entries</span><span>27 final questions scored</span><span>Q023–Q024 pending</span><span>Winner: Daniel Quintana — 89</span></div><section id="scoreboard" class="view active"><div class="frame"><iframe title="Final Derby Scoreboard" src="./scoreboard/"></iframe></div></section><section id="everyone" class="view"><div class="frame"><iframe title="Everyone's Picks" src="./everyone/"></iframe></div></section><section id="wall" class="view"><div class="frame"><iframe title="Derby Bobblehead Wall" src="./wall/"></iframe></div></section></main><script>const b=[...document.querySelectorAll('[data-view]')],v=[...document.querySelectorAll('.view')];b.forEach(x=>x.onclick=()=>{b.forEach(y=>y.classList.toggle('active',y===x));v.forEach(y=>y.classList.toggle('active',y.id===x.dataset.view))});</script></body></html>
