<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>Home Run Derby Challenge</title><style>:root{--red:#e31837;--navy:#07111f;--gold:#ffd35a}*{box-sizing:border-box}body{margin:0;font-family:Inter,system-ui,-apple-system,Segoe UI,Arial,sans-serif;background:linear-gradient(180deg,#eef3f9,#dfe7f0);color:#17202a}.shell{max-width:1500px;margin:auto;padding:14px}.top{background:linear-gradient(135deg,#8e0016,#ef1736 55%,#61101c);color:#fff;border-radius:24px;padding:24px 22px;box-shadow:0 18px 50px #0018;position:relative;overflow:hidden}.top:after{content:"";position:absolute;inset:0;background:radial-gradient(circle,#ffffff24 0 2px,transparent 3px);background-size:18px 18px;opacity:.5}.top h1,.top p{position:relative;z-index:1}.top h1{margin:0;font-size:clamp(38px,7vw,76px);font-style:italic;letter-spacing:-3px}.top p{margin:4px 0 0;font-weight:800}.tabs{display:flex;gap:8px;overflow:auto;padding:12px 2px 8px;position:sticky;top:0;z-index:20;background:#e8eef5ef;backdrop-filter:blur(10px)}.tabs button,.tabs a{border:0;border-radius:999px;padding:12px 18px;background:#fff;color:#21314a;font-weight:950;cursor:pointer;white-space:nowrap;text-decoration:none;box-shadow:0 5px 16px #0011}.tabs button.active{background:var(--red);color:#fff}.view{display:none}.view.active{display:block}.frame{background:#07111f;border-radius:22px;padding:10px;box-shadow:0 20px 55px #0018}.frame iframe{display:block;width:100%;height:calc(100vh - 225px);min-height:720px;border:0;border-radius:14px;background:#07111f}.notice{background:#fff7d7;border:1px solid #ecd46e;border-radius:16px;padding:14px 16px;font-weight:850;margin:12px 0}.status{display:flex;gap:10px;flex-wrap:wrap}.status span{background:#fff;border-radius:999px;padding:9px 13px;font-weight:850;box-shadow:0 5px 14px #0011}@media(max-width:700px){.shell{padding:8px}.top{padding:18px}.frame{padding:4px}.frame iframe{height:calc(100vh - 205px);min-height:650px}.tabs button,.tabs a{padding:11px 14px}}</style></head><body><main class="shell"><header class="top"><h1>Home Run Derby</h1><p>Philadelphia • Prediction Challenge</p></header><nav class="tabs"><button class="active" data-view="scoreboard">Scoreboard</button><button data-view="everyone">Everyone's Picks</button><button data-view="wall">Bobblehead Wall</button></nav><div class="notice">All votes are locked. The scoreboard and picks pages now run directly from the saved Airtable contest snapshot—no Google Apps Script.</div><div class="status"><span>9 entries</span><span>2 questions scored</span><span>27 pending</span><span>Current leaders: 8 points</span></div><section id="scoreboard" class="view active"><div class="frame"><iframe title="Live Derby Scoreboard" src="./scoreboard/"></iframe></div></section><section id="everyone" class="view"><div class="frame"><iframe title="Everyone's Picks" src="./everyone/"></iframe></div></section><section id="wall" class="view"><div class="frame"><iframe title="Derby Bobblehead Wall" src="./wall/"></iframe></div></section></main><script>const buttons=[...document.querySelectorAll('[data-view]')],views=[...document.querySelectorAll('.view')];function show(id){buttons.forEach(b=>b.classList.toggle('active',b.dataset.view===id));views.forEach(v=>v.classList.toggle('active',v.id===id));}buttons.forEach(b=>b.onclick=()=>show(b.dataset.view));</script></body></html>
