<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Webex Ballpark — On Deck</title>
<style>
  /* ---------- KIOSK DISPLAY CAROUSEL ----------
     Center card = newest bobblehead, largest.
     2 cards flank each side, scaled + faded back.
     Everything advances one slot every ROTATE_MS.
     Reads live from Airtable; new bobbleheads appear on their own.
  --------------------------------------------- */

  :root{
    --ink:#0B1A2B;          /* deep night-game navy */
    --ink2:#0F2540;
    --turf:#1f6b3a;          /* outfield green accent */
    --chalk:#F4F1E8;         /* baseline chalk / card stock */
    --leather:#C8531B;       /* glove leather / stitch */
    --gold:#E8B84B;          /* stadium light glow */
    --line:rgba(244,241,232,.14);
  }

  *{box-sizing:border-box;margin:0;padding:0;}

  html,body{height:100%;overflow:hidden;}

  body{
    background:
      radial-gradient(120% 90% at 50% -10%, #15314f 0%, var(--ink) 55%, #060f1a 100%);
    font-family:"Inter","Segoe UI",system-ui,sans-serif;
    color:var(--chalk);
    height:100vh;
    display:flex;
    flex-direction:column;
    user-select:none;
    -webkit-user-select:none;
  }

  /* subtle stadium-light wash from the top corners */
  body::before{
    content:"";
    position:fixed; inset:0;
    background:
      radial-gradient(60% 40% at 12% 0%, rgba(232,184,75,.10), transparent 60%),
      radial-gradient(60% 40% at 88% 0%, rgba(232,184,75,.10), transparent 60%);
    pointer-events:none;
  }

  /* ---------- header ---------- */
  header{
    flex:0 0 auto;
    text-align:center;
    padding:3.2vh 2vw 1vh;
    position:relative; z-index:2;
  }
  .eyebrow{
    font-size:1.5vh; letter-spacing:.42em; text-transform:uppercase;
    color:var(--gold); font-weight:600; margin-bottom:.6vh;
  }
  h1{
    font-family:"Georgia","Times New Roman",serif;
    font-weight:800; font-style:italic;
    font-size:5vh; line-height:1; letter-spacing:-.01em;
    text-shadow:0 2px 0 rgba(0,0,0,.35);
  }
  h1 .accent{ color:var(--leather); }

  /* ---------- stage ---------- */
  .stage{
    flex:1 1 auto;
    position:relative;
    perspective:1600px;
    display:flex; align-items:center; justify-content:center;
    overflow:hidden;
  }
  .track{
    position:relative;
    width:100%; height:100%;
    transform-style:preserve-3d;
  }

  .card{
    position:absolute;
    top:50%; left:50%;
    height:62vh;                /* portrait card keyed off screen height */
    aspect-ratio:864 / 1320;    /* image (864x1184) + room for the nameplate */
    margin:0;
    border-radius:14px;
    background:var(--chalk);
    padding:1.1vh 1.1vh 0;
    box-shadow:0 30px 60px rgba(0,0,0,.55);
    transition:transform .9s cubic-bezier(.22,.61,.36,1),
               opacity .9s ease, filter .9s ease;
    will-change:transform,opacity;
    overflow:hidden;
  }
  .card .photo{
    width:100%;
    aspect-ratio:864 / 1184;
    border-radius:8px;
    object-fit:cover;
    display:block;
    background:#0c1722;
    border:1px solid rgba(0,0,0,.12);
  }
  .card .plate{
    height:5.5vh;
    display:flex; align-items:center; justify-content:center;
    gap:.6vw;
  }
  .card .plate .pill{
    font-family:"Georgia",serif; font-weight:700; font-style:italic;
    color:var(--ink);
    font-size:2vh; letter-spacing:.02em;
  }
  .card .plate .stitch{
    flex:0 0 auto; width:1.4vh; height:1.4vh; border-radius:50%;
    background:var(--leather);
    box-shadow:0 0 0 .35vh rgba(200,83,27,.18);
  }

  /* the five visible positions: -2 -1 0(center) +1 +2 */
  .pos-c   { transform:translate(-50%,-50%) translateX(0)        scale(1)    rotateY(0deg);   opacity:1;   z-index:50; }
  .pos-l1  { transform:translate(-50%,-50%) translateX(-26vh)    scale(.72)  rotateY(36deg);  opacity:.82; z-index:40; filter:brightness(.78); }
  .pos-r1  { transform:translate(-50%,-50%) translateX(26vh)     scale(.72)  rotateY(-36deg); opacity:.82; z-index:40; filter:brightness(.78); }
  .pos-l2  { transform:translate(-50%,-50%) translateX(-45vh)    scale(.52)  rotateY(44deg);  opacity:.5;  z-index:30; filter:brightness(.6); }
  .pos-r2  { transform:translate(-50%,-50%) translateX(45vh)     scale(.52)  rotateY(-44deg); opacity:.5;  z-index:30; filter:brightness(.6); }
  /* anything else parked off-stage */
  .pos-hide{ transform:translate(-50%,-50%) translateX(0) scale(.4); opacity:0; z-index:1; pointer-events:none; }

  /* glow ring behind the center card */
  .spotlight{
    position:absolute; top:50%; left:50%;
    width:42vh; height:66vh; border-radius:50%;
    transform:translate(-50%,-50%);
    background:radial-gradient(ellipse, rgba(232,184,75,.22), transparent 62%);
    z-index:10; pointer-events:none;
  }

  /* ---------- footer / status ---------- */
  footer{
    flex:0 0 auto;
    display:flex; align-items:center; justify-content:center; gap:1.4vw;
    padding:1.4vh 2vw 2.6vh;
    position:relative; z-index:2;
  }
  .dots{ display:flex; gap:.8vh; }
  .dots i{
    width:1.1vh; height:1.1vh; border-radius:50%;
    background:var(--line); display:block; transition:background .4s,transform .4s;
  }
  .dots i.on{ background:var(--gold); transform:scale(1.35); }
  .brand{
    font-size:1.4vh; letter-spacing:.3em; text-transform:uppercase;
    color:rgba(244,241,232,.4); font-weight:600;
  }

  /* loading / empty states */
  .msg{
    position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    flex-direction:column; gap:1.2vh; text-align:center; z-index:60;
    font-size:2.2vh; color:rgba(244,241,232,.7); padding:0 8vw;
  }
  .msg .big{ font-family:"Georgia",serif; font-style:italic; font-size:3.4vh; color:var(--chalk); }
  .hidden{ display:none !important; }

  @media (prefers-reduced-motion: reduce){
    .card{ transition:opacity .3s ease; }
  }
</style>
</head>
<body>

  <header>
    <div class="eyebrow">Webex Ballpark · Live Roster</div>
  </header>

  <div class="stage">
    <div class="track" id="track"></div>
    <div class="msg" id="loading"><div class="big">Warming up the bullpen…</div><div>Loading today’s lineup</div></div>
    <div class="msg hidden" id="empty"><div class="big">No players on deck yet</div><div>Step up to the kiosk to join the roster</div></div>
  </div>

  <footer>
    <div class="dots" id="dots"></div>
    <div class="brand">Powered by Webex</div>
  </footer>

<script>
/* ============================================================
   CONFIG — the only things you ever need to touch
   ============================================================ */
const BASE_ID   = "appSxuH0GH10rxd5y";
const TABLE_ID  = "tblI7llQH93Xkin3O";
const IMG_FIELD = "AIKioskv3";        // field that holds the kiosk bobblehead image
const ROTATE_MS = 15000;              // advance every 15 seconds
const REFRESH_MS = 60000;             // re-check Airtable for new bobbleheads every 60s

/* >>> PASTE YOUR READ-ONLY AIRTABLE TOKEN BETWEEN THE QUOTES <<<
   Make a token at airtable.com/create/tokens with ONLY:
     scope:  data.records:read
     base:   this base
   Then delete/rotate it after the event.                        */
const AIRTABLE_TOKEN = "patYsJQ4hhojOhYuk.a0839f88a7ae231ce3bf1db6816c451efd8cc6dc7a313a99d4216dc1e557336e";
/* ============================================================ */

const track   = document.getElementById("track");
const dotsBox = document.getElementById("dots");
const loadingEl = document.getElementById("loading");
const emptyEl   = document.getElementById("empty");

let images = [];     // array of image URLs, newest first
let center = 0;      // index of the card currently in the center slot
let cardEls = [];
let rotateTimer = null;

const API = `https://api.airtable.com/v0/${BASE_ID}/${TABLE_ID}`
          + `?filterByFormula=${encodeURIComponent(`NOT({${IMG_FIELD}} = '')`)}`
          + `&sort%5B0%5D%5Bfield%5D=createdDate&sort%5B0%5D%5Bdirection%5D=desc`
          + `&pageSize=50`;

async function fetchImages(){
  try{
    const res = await fetch(API, { headers:{ Authorization:`Bearer ${AIRTABLE_TOKEN}` }});
    if(!res.ok){ console.error("Airtable error", res.status); return null; }
    const data = await res.json();
    const urls = [];
    for(const rec of (data.records||[])){
      const att = rec.fields[IMG_FIELD];
      if(Array.isArray(att) && att.length){
        const a = att[0];
        // prefer the large thumbnail (fast) and fall back to full url
        urls.push((a.thumbnails && a.thumbnails.large && a.thumbnails.large.url) || a.url);
      }
    }
    return urls;
  }catch(e){ console.error(e); return null; }
}

function buildCards(){
  track.innerHTML = "";
  cardEls = images.map((url,i)=>{
    const c = document.createElement("div");
    c.className = "card pos-hide";
    c.innerHTML =
      `<img class="photo" src="${url}" alt="Bobblehead ${i+1}" loading="eager">` +
      `<div class="plate"></div>`;
    track.appendChild(c);
    return c;
  });
  // dots
  dotsBox.innerHTML = "";
  images.forEach(()=>dotsBox.appendChild(document.createElement("i")));
}

function layout(){
  const n = images.length;
  if(!n) return;
  cardEls.forEach((el,i)=>{
    // distance from center, wrapping around the ring
    let d = i - center;
    if(d >  n/2) d -= n;
    if(d < -n/2) d += n;
    let cls = "pos-hide";
    if(d === 0) cls = "pos-c";
    else if(d === -1) cls = "pos-l1";
    else if(d ===  1) cls = "pos-r1";
    else if(d === -2) cls = "pos-l2";
    else if(d ===  2) cls = "pos-r2";
    el.className = "card " + cls;
    // only the center card shows the nameplate
    const plate = el.querySelector(".plate");
    if(d === 0){
      plate.innerHTML =
        `<span class="stitch"></span>` +
        `<span class="pill">Now Batting</span>` +
        `<span class="stitch"></span>`;
    } else {
      plate.innerHTML = "";
    }
    // for a 3- or 4-card pool, suppress the far slots so it doesn't look sparse
    if(n <= 4 && (cls==="pos-l2"||cls==="pos-r2")) el.classList.replace(cls,"pos-hide");
  });
  // dots
  [...dotsBox.children].forEach((dot,i)=>dot.classList.toggle("on", i===center));
}

function advance(){
  if(images.length<=1) return;
  center = (center + 1) % images.length;
  layout();
}

function startRotation(){
  clearInterval(rotateTimer);
  if(images.length>1){
    rotateTimer = setInterval(advance, ROTATE_MS);
  }
}

function showStage(){
  loadingEl.classList.add("hidden");
  emptyEl.classList.toggle("hidden", images.length>0);
}

async function load(initial){
  const urls = await fetchImages();
  if(urls===null){            // network/token error
    if(initial){
      loadingEl.innerHTML =
        '<div class="big">Can’t reach Airtable</div>' +
        '<div>Check the token and network, then refresh</div>';
    }
    return;
  }
  // only rebuild if the set actually changed (keeps the carousel from jumping)
  const changed = urls.length!==images.length || urls.some((u,i)=>u!==images[i]);
  if(changed){
    const wasEmpty = images.length===0;
    images = urls;
    buildCards();
    if(wasEmpty) center = 0;     // first load lands newest in the center
    layout();
    startRotation();
  }
  showStage();
}

load(true);
setInterval(()=>load(false), REFRESH_MS);
</script>
</body>
</html>
