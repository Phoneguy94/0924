<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>VXP Camera</title>
<link rel="stylesheet" href="./flgisa-kiosk.css" />
<style>
html,body{margin:0;height:100%}body{font-family:Arial,sans-serif;background:linear-gradient(rgba(7,17,31,.25),rgba(7,17,31,.55)),var(--bg-img,none) center/cover no-repeat fixed,#07111f;color:#fff;text-align:center;min-height:100dvh;display:flex;flex-direction:column;align-items:center;overflow:hidden}.header{padding:14px 16px 4px;font-size:clamp(24px,6vw,42px);font-weight:bold;text-shadow:0 3px 18px #000}.subheader{font-size:clamp(15px,3.5vw,24px);margin-bottom:10px;padding:0 16px;text-shadow:0 2px 12px #000}.mode-row{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin:0 10px 10px}.mode-row button{font-size:clamp(14px,3.4vw,20px);padding:10px 14px;margin:0;border-radius:999px;background:rgba(255,255,255,.88)}.mode-row button.active{background:#fff;outline:3px solid var(--accent,#B23A48)}.camera-wrap{position:relative;flex:1 1 auto;min-height:0;aspect-ratio:3/4;max-height:56vh;max-width:90vw;border:8px solid rgba(255,255,255,.88);border-radius:24px;overflow:hidden;background:#000;box-shadow:0 18px 60px rgba(0,0,0,.45)}video,canvas,img{width:100%;height:100%;display:block;object-fit:cover;pointer-events:none;user-select:none}video.mirror{transform:scaleX(-1)}.countdown{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:clamp(120px,30vw,220px);font-weight:bold;text-shadow:0 0 30px #000;background:rgba(0,0,0,.25)}.button-row{margin-top:12px;display:flex;flex-wrap:wrap;justify-content:center}button,a.big-link{font-size:clamp(19px,5vw,29px);font-weight:bold;padding:clamp(12px,3vw,20px) clamp(20px,6vw,38px);margin:7px;border:0;border-radius:16px;background:#fff;color:#07111f;cursor:pointer;box-shadow:0 8px 24px rgba(0,0,0,.35);text-decoration:none;display:inline-block}button.secondary{background:rgba(255,255,255,.9)}button:disabled{opacity:.5;cursor:default}.hidden{display:none!important}.status{margin-top:4px;font-size:clamp(16px,4vw,22px);min-height:24px;text-shadow:0 2px 12px #000;padding:0 14px}.watermark{margin-top:auto;padding:8px 16px;font-size:clamp(13px,3vw,18px);opacity:.78;font-weight:bold;text-shadow:0 2px 12px #000}input[type=file]{display:none}.team-row{margin:0 12px 10px}.team-row label{display:block;font-size:clamp(15px,3.5vw,20px);font-weight:bold;margin-bottom:6px;text-shadow:0 2px 12px #000}.team-row select{width:min(420px,88vw);font-size:clamp(16px,4vw,22px);padding:11px 14px;border:3px solid rgba(255,255,255,.88);border-radius:14px;background:#fff;color:#07111f;font-weight:bold}
</style>
</head>
<body>
<div id="flgisaBrand" class="hidden"><div class="flgisa-brand-row"><div class="flgisa-brand veytec">VEYTEC<small>www.veytec.com</small></div><div class="flgisa-brand webex">webex<small>by Cisco</small></div></div><div class="flgisa-left-card"><div class="flgisa-word">FLGISA</div><div><span class="big">50</span> <span class="years">YEARS</span></div><p>Celebrating 50 years of innovation in government IT.</p></div></div>
<div class="header" id="title">VXP Camera</div><div class="subheader" id="subheader">Choose a camera or upload a photo</div>
<div class="mode-row"><button id="frontMode" class="active">🤳 Front Camera</button><button id="backMode">📷 Back Camera</button><button id="uploadMode">⬆️ Upload Image</button></div>
<div id="nbaTeamRow" class="team-row hidden"><label for="nbaTeam">NBA Team</label><select id="nbaTeam"></select></div>
<div id="flgisaLocationRow" class="team-row hidden"><label for="flgisaLocation">Florida City / County / Destination</label><select id="flgisaLocation"></select></div>
<div class="camera-wrap"><video id="video" autoplay playsinline class="mirror"></video><canvas id="canvas" class="hidden"></canvas><img id="photo" class="hidden" alt="Selected photo"><div id="countdown" class="countdown hidden"></div></div>
<input id="fileInput" type="file" accept="image/*">
<div class="button-row"><button id="takePhoto">📸 Take Picture</button><button id="chooseFile" class="hidden">⬆️ Choose Image</button><button id="retake" class="secondary hidden">↻ Retake Photo</button><button id="submit" class="hidden">✅ Send It</button><a id="viewPhoto" class="big-link hidden" href="#">🔎 Click here to view your photo</a></div>
<div class="status" id="status"></div><div class="watermark" id="watermark">Powered by Veytec + Webex</div>
<script src="../config/experiences.js"></script>
<script>
const $=id=>document.getElementById(id),root=window.VXP_CONFIG,params=new URLSearchParams(location.search);
const NBA_TEAMS=['Atlanta Hawks','Boston Celtics','Brooklyn Nets','Charlotte Hornets','Chicago Bulls','Cleveland Cavaliers','Dallas Mavericks','Denver Nuggets','Detroit Pistons','Golden State Warriors','Houston Rockets','Indiana Pacers','Los Angeles Clippers','Los Angeles Lakers','Memphis Grizzlies','Miami Heat','Milwaukee Bucks','Minnesota Timberwolves','New Orleans Pelicans','New York Knicks','Oklahoma City Thunder','Orlando Magic','Philadelphia 76ers','Phoenix Suns','Portland Trail Blazers','Sacramento Kings','San Antonio Spurs','Toronto Raptors','Utah Jazz','Washington Wizards'];
const FLGISA_CITIES=['Altamonte Springs','Apopka','Atlantic Beach','Aventura','Bartow','Belleview','Boca Raton','Bonita Springs','Boynton Beach','Bradenton','Bunnell','Cape Coral','Clearwater','Clermont','Cocoa','Cocoa Beach','Coconut Creek','Cooper City','Coral Gables','Coral Springs','Crestview','Dade City','Dania Beach','Davie','Daytona Beach','Daytona Beach Shores','DeBary','DeFuniak Springs','Deerfield Beach','DeLand','Delray Beach','Deltona','Destin','Doral','Dunedin','Edgewater','Eustis','Fernandina Beach','Flagler Beach','Florida City','Fort Lauderdale','Fort Myers','Fort Pierce','Fort Walton Beach','Gainesville','Green Cove Springs','Greenacres','Groveland','Gulf Breeze','Haines City','Hallandale Beach','Hialeah','Holly Hill','Hollywood','Homestead','Indian River Shores','Islamorada','Jacksonville','Jacksonville Beach','Jupiter','Jupiter Island','Key Biscayne','Key West','Kissimmee','Lady Lake','Lake City','Lake Park','Lake Wales','Lakeland','Lantana','Largo','Lauderdale Lakes','Lauderhill','Leesburg','Longboat Key','Longwood','Maitland','Marco Island','Margate','Melbourne','Miami','Miami Beach','Miami Gardens','Miami Lakes','Miami Shores','Miami Springs','Milton','Miramar','Mount Dora','Naples','New Port Richey','New Smyrna Beach','Niceville','North Lauderdale','North Miami','North Miami Beach','North Port','Oakland Park','Ocala','Ocoee','Oldsmar','Orlando','Ormond Beach','Oviedo','Palm Bay','Palm Beach','Palm Beach Gardens','Palm Coast','Palmetto Bay','Panama City','Panama City Beach','Parkland','Pembroke Park','Pembroke Pines','Pensacola','Pinecrest','Pinellas Park','Plant City','Plantation','Pompano Beach','Ponce Inlet','Port Orange','Port St. Lucie','Punta Gorda','Riviera Beach','Royal Palm Beach','Safety Harbor','Sanford','Sanibel','Sarasota','Satellite Beach','Sebastian','Sebring','Seminole','South Daytona','St. Augustine Beach','St. Cloud','St. Pete Beach','St. Petersburg','Stuart','Sunny Isles Beach','Sunrise','Sweetwater','Tallahassee','Tamarac','Tampa','Tarpon Springs','Tavares','Temple Terrace','Tequesta','Titusville','Treasure Island','Venice','Vero Beach','Wellington','West Melbourne','West Palm Beach','Weston','Wildwood','Wilton Manors','Winter Garden','Winter Haven','Winter Park','Winter Springs'];
const FLORIDA_COUNTIES=['Alachua County','Baker County','Bay County','Bradford County','Brevard County','Broward County','Calhoun County','Charlotte County','Citrus County','Clay County','Collier County','Columbia County','DeSoto County','Dixie County','Duval County','Escambia County','Flagler County','Franklin County','Gadsden County','Gilchrist County','Glades County','Gulf County','Hamilton County','Hardee County','Hendry County','Hernando County','Highlands County','Hillsborough County','Holmes County','Indian River County','Jackson County','Jefferson County','Lafayette County','Lake County','Lee County','Leon County','Levy County','Liberty County','Madison County','Manatee County','Marion County','Martin County','Miami-Dade County','Monroe County','Nassau County','Okaloosa County','Okeechobee County','Orange County','Osceola County','Palm Beach County','Pasco County','Pinellas County','Polk County','Putnam County','Santa Rosa County','Sarasota County','Seminole County','St. Johns County','St. Lucie County','Sumter County','Suwannee County','Taylor County','Union County','Volusia County','Wakulla County','Walton County','Washington County'];
const FLGISA_DESTINATIONS=['Port Canaveral'];
function experienceFromParam(){const raw=String(params.get('experience')||params.get('event')||'usa250').toLowerCase();for(const e of Object.values(root.experiences)){if(e.id===raw||(e.aliases||[]).map(x=>String(x).toLowerCase()).includes(raw))return e}return root.experiences.usa250}
function fillSelect(select,placeholder,groups){select.innerHTML=`<option value="">${placeholder}</option>`+groups.map(([label,items])=>`<optgroup label="${label}">${items.map(v=>`<option value="${v}">${v}</option>`).join('')}</optgroup>`).join('')}
const exp=experienceFromParam(),cap=root.defaults.capture,kioskMode=exp.id==='flgisa'&&String(params.get('mode')||'kiosk').toLowerCase()!=='phone',flgisaMode=exp.id==='flgisa',nbaMode=exp.id==='nba';
fillSelect($('nbaTeam'),'Select an NBA Team',[['NBA Teams',NBA_TEAMS]]);fillSelect($('flgisaLocation'),'Select a Florida city, county, or destination…',[['Florida Cities',FLGISA_CITIES],['Florida Counties',FLORIDA_COUNTIES],['Destinations and Organizations',FLGISA_DESTINATIONS]]);
if(kioskMode){document.body.classList.add('kiosk-flgisa');$('flgisaBrand').classList.remove('hidden')}if(nbaMode)$('nbaTeamRow').classList.remove('hidden');if(flgisaMode)$('flgisaLocationRow').classList.remove('hidden');
document.title=kioskMode?'FLGISA Hero Experience':exp.cameraTitle;$('title').innerHTML=kioskMode?'Become the Hero of <span class="hero-emphasis">Florida Technology</span>':exp.cameraTitle;$('subheader').textContent=kioskMode?'Choose your Florida city, county, or destination, then take your photo.':(exp.cameraSubtitle||'Choose a camera or upload a photo');document.documentElement.style.setProperty('--accent',kioskMode?'#58F2A6':(exp.accent||'#B23A48'));document.body.style.setProperty('--bg-img',kioskMode?'url("https://phoneguy94.github.io/0924/vxp/assets/backgrounds/flgisa-kiosk-main.png")':(exp.backgroundImage?`url("${exp.backgroundImage}")`:'none'));$('watermark').textContent=kioskMode?'Powered by Veytec + Webex · FLGISA Hero Experience':`Powered by Veytec + Webex · ${exp.label}`;
const video=$('video'),canvas=$('canvas'),photo=$('photo'),takePhotoBtn=$('takePhoto'),chooseFileBtn=$('chooseFile'),retakeBtn=$('retake'),submitBtn=$('submit'),viewPhotoLink=$('viewPhoto'),statusEl=$('status'),countdownEl=$('countdown'),fileInput=$('fileInput'),frontMode=$('frontMode'),backMode=$('backMode'),uploadMode=$('uploadMode'),nbaTeam=$('nbaTeam'),flgisaLocation=$('flgisaLocation');let capturedBase64='',currentMode=kioskMode?'front':(cap.defaultMode||'front'),stream=null,idleTimer=null,kioskResetTimer=null,kioskRetakeDelay=null,kioskAbortController=null;
function setStatus(t){statusEl.textContent=t||''}function requireSelection(){if(nbaMode&&!nbaTeam.value){setStatus('Select an NBA team first.');return false}if(flgisaMode&&!flgisaLocation.value){setStatus('Select a Florida city, county, or destination first.');return false}return true}function startIdleTimer(){clearTimeout(idleTimer);idleTimer=setTimeout(resetToCamera,cap.idleTimeoutMs||45000)}function stopIdleTimer(){clearTimeout(idleTimer)}function stopCamera(){if(stream){stream.getTracks().forEach(t=>t.stop());stream=null}video.srcObject=null}
async function startCamera(facingMode='user'){stopCamera();video.classList.toggle('mirror',facingMode==='user');try{stream=await navigator.mediaDevices.getUserMedia({video:{facingMode,width:{ideal:1080},height:{ideal:1440}},audio:false});video.srcObject=stream}catch(err){console.error(err);setStatus(kioskMode?'Camera could not start. Check kiosk camera permissions.':'Camera could not start. Try Upload Image or check camera permissions.')}}
function setMode(mode){if(kioskMode)mode='front';currentMode=mode;stopIdleTimer();capturedBase64='';photo.classList.add('hidden');viewPhotoLink.classList.add('hidden');submitBtn.classList.add('hidden');retakeBtn.classList.add('hidden');frontMode.classList.toggle('active',mode==='front');backMode.classList.toggle('active',mode==='back');uploadMode.classList.toggle('active',mode==='upload');takePhotoBtn.classList.toggle('hidden',mode==='upload');chooseFileBtn.classList.toggle('hidden',mode!=='upload');setStatus('');if(mode==='front'){$('subheader').textContent=kioskMode?'Choose your Florida city, county, or destination, then take your photo.':'Look at the camera and tap Take Picture';video.classList.remove('hidden');startCamera('user')}if(mode==='back'){$('subheader').textContent='Use the rear camera and tap Take Picture';video.classList.remove('hidden');startCamera('environment')}if(mode==='upload'){$('subheader').textContent='Upload a photo instead of using the camera';stopCamera();video.classList.add('hidden')}}
frontMode.onclick=()=>setMode('front');backMode.onclick=()=>setMode('back');uploadMode.onclick=()=>setMode('upload');chooseFileBtn.onclick=()=>{if(requireSelection())fileInput.click()};
function drawCoverImage(source,mirror=false){const W=cap.outWidth||768,H=cap.outHeight||1024,Q=cap.jpegQuality||.7,sw=source.videoWidth||source.naturalWidth,sh=source.videoHeight||source.naturalHeight,targetAR=W/H,srcAR=sw/sh;let cropW,cropH;if(srcAR>targetAR){cropH=sh;cropW=sh*targetAR}else{cropW=sw;cropH=sw/targetAR}const cropX=(sw-cropW)/2,cropY=(sh-cropH)/2;canvas.width=W;canvas.height=H;const ctx=canvas.getContext('2d');ctx.clearRect(0,0,W,H);if(mirror){ctx.save();ctx.translate(W,0);ctx.scale(-1,1);ctx.drawImage(source,cropX,cropY,cropW,cropH,0,0,W,H);ctx.restore()}else ctx.drawImage(source,cropX,cropY,cropW,cropH,0,0,W,H);return canvas.toDataURL('image/jpeg',Q).split(',')[1]}
function showCaptured(){photo.src='data:image/jpeg;base64,'+capturedBase64;video.classList.add('hidden');photo.classList.remove('hidden');takePhotoBtn.classList.add('hidden');chooseFileBtn.classList.add('hidden');viewPhotoLink.classList.add('hidden');if(kioskMode){retakeBtn.classList.add('hidden');submitBtn.classList.add('hidden');setStatus('Creating your FLGISA Hero... please watch the Hero Wall.');kioskRetakeDelay=setTimeout(()=>retakeBtn.classList.remove('hidden'),1500);sendKioskCapture();return}setStatus('Ready to send (~'+Math.round((capturedBase64.length*3/4)/1024)+' KB)');retakeBtn.classList.remove('hidden');submitBtn.classList.remove('hidden');startIdleTimer()}
takePhotoBtn.onclick=()=>{if(!requireSelection())return;takePhotoBtn.disabled=true;let n=3;countdownEl.textContent=n;countdownEl.classList.remove('hidden');const tick=setInterval(()=>{n--;if(n>0)countdownEl.textContent=n;else{clearInterval(tick);countdownEl.classList.add('hidden');takePhotoBtn.disabled=false;capturedBase64=drawCoverImage(video,currentMode==='front');showCaptured()}},1000)};
fileInput.onchange=()=>{const file=fileInput.files&&fileInput.files[0];if(!file)return;if(!requireSelection()){fileInput.value='';return}const img=new Image();img.onload=()=>{capturedBase64=drawCoverImage(img,false);URL.revokeObjectURL(img.src);showCaptured()};img.src=URL.createObjectURL(file)};retakeBtn.onclick=()=>resetToCamera();
function buildPayloadAndUrl(){const submittedAt=Date.now(),photoUrl=`${root.baseUrl}/vxp/photo/?experience=${encodeURIComponent(exp.id)}&ts=${submittedAt}`,selectedNbaTeam=nbaMode?nbaTeam.value:'',selectedLocation=flgisaMode?flgisaLocation.value:'';if(!requireSelection())throw new Error('selection required');const selection=nbaMode?selectedNbaTeam:selectedLocation,eventName=(nbaMode||flgisaMode)?`${exp.eventName}-${selection}`:exp.eventName;const payload={automation:'bobblehead_kiosk',custname:'Veytec',demo_type:exp.demoType,experience:exp.id,Name:'Kiosk',MobileNumber:'0000000000',EventName:eventName,source:exp.source,captureMode:currentMode,submittedAt:new Date(submittedAt).toISOString(),photoUrl};if(nbaMode)payload.FavoriteTeam=selectedNbaTeam;if(flgisaMode)payload.FloridaLocation=selectedLocation;payload['image'+'B64']=capturedBase64;return {submittedAt,photoUrl,payload}}
async function postCapture(signal){const built=buildPayloadAndUrl();const res=await fetch(root.webexConnect.captureWebhookUrl,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(built.payload),signal});let data=null;try{data=await res.clone().json()}catch(e){}if(!res.ok)throw new Error('capture failed');const id=data&&(data.recordId||data.id||data.airtableRecordId);const claimUrl=id?`${root.baseUrl}/vxp/photo/?experience=${encodeURIComponent(exp.id)}&id=${encodeURIComponent(id)}&ts=${built.submittedAt}`:built.photoUrl;return {claimUrl,id}}
async function sendKioskCapture(){try{kioskAbortController=new AbortController();await postCapture(kioskAbortController.signal);let n=10;setStatus('Your FLGISA Hero is being created. Watch the Hero Wall. Retake available below. Camera resets in '+n+'...');clearInterval(kioskResetTimer);kioskResetTimer=setInterval(()=>{n--;if(n>0)setStatus('Your FLGISA Hero is being created. Watch the Hero Wall. Retake available below. Camera resets in '+n+'...');else{clearInterval(kioskResetTimer);resetToCamera()}},1000)}catch(err){if(err.name==='AbortError')return;console.error(err);setStatus("Let's try that again. Camera resets now.");setTimeout(resetToCamera,2500)}}
submitBtn.onclick=async()=>{if(!capturedBase64||!requireSelection())return;stopIdleTimer();submitBtn.disabled=true;retakeBtn.disabled=true;setStatus('Sending…');try{const result=await postCapture();viewPhotoLink.href=result.claimUrl;viewPhotoLink.classList.remove('hidden');submitBtn.classList.add('hidden');retakeBtn.classList.add('hidden');setStatus(exp.readyMessage||'Sent! Tap below to view your photo.')}catch(err){console.error(err);setStatus("Let's try that again.");submitBtn.disabled=false;retakeBtn.disabled=false;startIdleTimer()}};
function resetToCamera(){stopIdleTimer();clearInterval(kioskResetTimer);clearTimeout(kioskRetakeDelay);if(kioskAbortController){try{kioskAbortController.abort()}catch(e){}kioskAbortController=null}countdownEl.classList.add('hidden');capturedBase64='';setStatus('');photo.classList.add('hidden');submitBtn.classList.add('hidden');retakeBtn.classList.add('hidden');viewPhotoLink.classList.add('hidden');submitBtn.disabled=false;retakeBtn.disabled=false;takePhotoBtn.disabled=false;fileInput.value='';setMode(currentMode)}
setMode(currentMode);
</script>
</body>
</html>
