<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>VXP Wall</title><style>:root{--accent:#58F2A6;--stage-w:min(100vw,calc(100vh * 16 / 9));--stage-h:min(100vh,calc(100vw * 9 / 16));--stage-left:calc((100vw - var(--stage-w))/2);--stage-top:calc((100vh - var(--stage-h))/2);--chalk:#F4F1E8;--ink:#061326}*{box-sizing:border-box;margin:0;padding:0}html,body{width:100%;height:100%;overflow:hidden;background:#061326;font-family:Inter,"Segoe UI",system-ui,sans-serif;color:var(--chalk);user-select:none}body:before{content:"";position:fixed;left:var(--stage-left);top:var(--stage-top);width:var(--stage-w);height:var(--stage-h);background:url("../assets/backgrounds/flgisa-kiosk-main.png") center/100% 100% no-repeat;z-index:0;pointer-events:none}.wall{position:fixed;left:var(--stage-left);top:var(--stage-top);width:var(--stage-w);height:var(--stage-h);overflow:hidden;z-index:1}.slot{position:absolute;transform:translate(-50%,-50%);transition:opacity .55s ease,filter .55s ease,transform .72s cubic-bezier(.19,1,.22,1);display:flex;align-items:center;justify-content:center}.slot.hero{left:50%;top:54%;z-index:20}.slot.tl{left:18%;top:31%;z-index:8}.slot.tr{left:82%;top:31%;z-index:8}.slot.bl{left:18%;top:80%;z-index:8}.slot.br{left:82%;top:80%;z-index:8}.slot.side-left{left:24%;top:54%;z-index:8}.slot.side-right{left:76%;top:54%;z-index:8}.card{position:relative;width:calc(var(--stage-w) * .278);aspect-ratio:864/1320;border-radius:calc(var(--stage-w) * .011);background:#f4f1e8;padding:calc(var(--stage-w) * .006);box-shadow:0 calc(var(--stage-w) * .018) calc(var(--stage-w) * .040) rgba(0,0,0,.58),0 0 calc(var(--stage-w) * .017) rgba(88,242,166,.22);overflow:hidden}.hero .card{width:calc(var(--stage-w) * .300);box-shadow:0 calc(var(--stage-w) * .022) calc(var(--stage-w) * .052) rgba(0,0,0,.68),0 0 calc(var(--stage-w) * .032) rgba(88,242,166,.44),0 0 0 1px rgba(255,255,255,.12)}.corner .card{width:calc(var(--stage-w) * .138);filter:grayscale(.58) brightness(.70) saturate(.82);opacity:.76}.side .card{width:calc(var(--stage-w) * .173);filter:grayscale(.68) brightness(.62);opacity:.78}.photo{width:100%;height:100%;display:block;object-fit:cover;border-radius:calc(var(--stage-w) * .007);background:#071827}.nav{position:absolute;top:54.5%;transform:translateY(-50%);z-index:30;width:calc(var(--stage-w) * .04);height:calc(var(--stage-w) * .04);border-radius:50%;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.18);border:1px solid rgba(88,242,166,.18);color:rgba(244,241,232,.55);font-size:calc(var(--stage-w) * .024);cursor:pointer;backdrop-filter:blur(4px);transition:opacity .4s ease,background .25s ease,color .25s ease}.nav:hover{background:rgba(0,0,0,.4);color:#fff}.nav.prev{left:calc(var(--stage-w) * .030)}.nav.next{right:calc(var(--stage-w) * .030)}.nav.hidden{display:none}.dots{position:absolute;left:50%;bottom:calc(var(--stage-h) * .045);transform:translateX(-50%);display:flex;gap:calc(var(--stage-w) * .005);z-index:25;max-width:55%;flex-wrap:wrap;justify-content:center}.dots i{width:calc(var(--stage-w) * .0065);height:calc(var(--stage-w) * .0065);border-radius:50%;background:rgba(244,241,232,.20);transition:background .3s,transform .3s}.dots i.on{background:var(--accent);transform:scale(1.35)}.badge{position:absolute;right:calc(var(--stage-w) * .055);bottom:calc(var(--stage-h) * .080);z-index:25;font-size:clamp(13px,calc(var(--stage-w) * .011),22px);letter-spacing:.12em;text-transform:uppercase;color:rgba(244,241,232,.58)}.status{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:70%;text-align:center;padding:2.5vh 3vw;border:1px solid rgba(88,242,166,.32);border-radius:18px;background:rgba(3,10,22,.62);box-shadow:0 20px 70px rgba(0,0,0,.5);color:rgba(244,241,232,.82);font-size:clamp(16px,calc(var(--stage-w) * .018),32px);line-height:1.35;z-index:50}.status .big{font-family:Georgia,serif;font-style:italic;font-weight:800;color:#fff;font-size:1.6em;margin-bottom:.35em}.hidden{display:none!important}#sourceFrame{position:fixed;left:-9999px;top:-9999px;width:1px;height:1px;border:0;opacity:0;pointer-events:none}
.dots{display:none!important}
.card.is-new::after{content:"";position:absolute;inset:-40%;z-index:2;background:linear-gradient(115deg,transparent 38%,rgba(255,255,255,.32) 48%,transparent 58%);transform:translateX(-75%) rotate(6deg);animation:newSheen 1.15s ease-out .15s both;pointer-events:none}.wall.live-burst .hero .card{animation:newHeroPop 1.3s cubic-bezier(.19,1,.22,1) both}.slot.swap .card{animation:softCardMove .62s cubic-bezier(.19,1,.22,1) both}@keyframes newHeroPop{0%{transform:scale(.965);box-shadow:0 calc(var(--stage-w) * .022) calc(var(--stage-w) * .052) rgba(0,0,0,.68),0 0 calc(var(--stage-w) * .010) rgba(88,242,166,.20)}45%{transform:scale(1.018);box-shadow:0 calc(var(--stage-w) * .025) calc(var(--stage-w) * .060) rgba(0,0,0,.70),0 0 calc(var(--stage-w) * .052) rgba(88,242,166,.72),0 0 0 1px rgba(255,255,255,.18)}100%{transform:scale(1);box-shadow:0 calc(var(--stage-w) * .022) calc(var(--stage-w) * .052) rgba(0,0,0,.68),0 0 calc(var(--stage-w) * .032) rgba(88,242,166,.44),0 0 0 1px rgba(255,255,255,.12)}}@keyframes softCardMove{0%{transform:translateY(calc(var(--stage-h) * .010)) scale(.985)}100%{transform:translateY(0) scale(1)}}@keyframes toastIn{0%{opacity:0;transform:translateX(-50%) translateY(-12px) scale(.96)}16%,72%{opacity:1;transform:translateX(-50%) translateY(0) scale(1)}100%{opacity:0;transform:translateX(-50%) translateY(-6px) scale(.98)}}@keyframes newSheen{0%{transform:translateX(-75%) rotate(6deg)}100%{transform:translateX(75%) rotate(6deg)}}
@media(max-width:900px),(max-height:520px) and (orientation:landscape){.hero .card{width:calc(var(--stage-w) * .34)}.side .card{width:calc(var(--stage-w) * .20)}.slot.tl,.slot.tr,.slot.bl,.slot.br{display:none}.slot.side-left{left:22%;top:55%}.slot.side-right{left:78%;top:55%}.nav{width:calc(var(--stage-w) * .07);height:calc(var(--stage-w) * .07);font-size:calc(var(--stage-w) * .045)}}</style></head><body><main class="wall"><div class="slot hero" id="heroSlot"></div><div class="slot corner tl" id="tlSlot"></div><div class="slot corner tr" id="trSlot"></div><div class="slot corner bl" id="blSlot"></div><div class="slot corner br" id="brSlot"></div><div class="slot side side-left hidden" id="leftSlot"></div><div class="slot side side-right hidden" id="rightSlot"></div><button class="nav prev hidden" id="prev" aria-label="Previous">‹</button><button class="nav next hidden" id="next" aria-label="Next">›</button><div class="dots" id="dots"></div><div class="badge" id="badge">FLGISA Wall</div><div class="status" id="status"><div class="big">Loading…</div><div>Fetching the latest FLGISA images</div></div></main><iframe id="sourceFrame" src="../../event-wall/?event=FLGISA"></iframe><script>const ROTATE_MS=7600,NEW_MS=22000,PRELOAD_AHEAD=10,REFRESH_MS=3000;
let items=[],cur=0,timer=null,booted=false,knownImgs=new Set(),newUntil=new Map(),lastRenderedSig="";
let liveQueue=[],showingLive=false,resumeAfterLiveImg=null,lastLiveShown="";
const wallEl=document.querySelector(".wall"),heroSlot=document.getElementById("heroSlot"),tlSlot=document.getElementById("tlSlot"),trSlot=document.getElementById("trSlot"),blSlot=document.getElementById("blSlot"),brSlot=document.getElementById("brSlot"),leftSlot=document.getElementById("leftSlot"),rightSlot=document.getElementById("rightSlot"),dots=document.getElementById("dots"),statusEl=document.getElementById("status"),prev=document.getElementById("prev"),next=document.getElementById("next"),badge=document.getElementById("badge"),sourceFrame=document.getElementById("sourceFrame");
function esc(s){return String(s||"").replace(/[&<>\'"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","'":"&#39;","\"":"&quot;"}[c]))}
function signature(list){return(list||[]).map(x=>x.img).join("||")}
function scrapeSource(){try{const doc=sourceFrame.contentDocument;if(!doc)return[];const imgs=[...doc.querySelectorAll("img.photo")].map(img=>img.currentSrc||img.src).filter(Boolean),seen=new Set;return imgs.filter(u=>!seen.has(u)&&seen.add(u)).map(img=>({img}))}catch(e){console.error(e);return[]}}
function markNewFlags(list){const now=Date.now();list.forEach(x=>{x.isNew=(newUntil.get(x.img)||0)>now});for(const[k,v]of newUntil)if(v<=now)newUntil.delete(k);return list}
function imgCard(item){return item?`<div class="card${item.isNew?" is-new":""}"><img class="photo" src="${esc(item.img)}" alt="" loading="eager" decoding="async"></div>`:""}
function idx(offset){return((cur+offset)%items.length+items.length)%items.length}
function findImgIndex(img){return img?items.findIndex(x=>x.img===img):-1}
function useHeroFive(){return document.querySelector(".wall").getBoundingClientRect().width>=900&&items.length>=5}
function visibleSignature(){if(!items.length)return"";const five=useHeroFive();let arr=[items[cur]?.img||"",items[cur]?.isNew?"N":"-"];if(five)arr.push(items[idx(-1)]?.img||"",items[idx(1)]?.img||"",items[idx(-2)]?.img||"",items[idx(2)]?.img||"");else arr.push(items[idx(-1)]?.img||"",items[idx(1)]?.img||"");return arr.join("||")}
function preloadUrl(url){if(!url)return;const im=new Image();im.src=url}
function preloadAround(){if(!items.length)return;for(let i=-2;i<=PRELOAD_AHEAD;i++){const it=items[idx(i)];if(it)preloadUrl(it.img)}liveQueue.slice(0,5).forEach(preloadUrl)}
function pulseTransition(isLive=false){const visible=[heroSlot,tlSlot,trSlot,blSlot,brSlot,leftSlot,rightSlot].filter(el=>el&&!el.classList.contains("hidden"));visible.forEach(el=>{el.classList.remove("swap");void el.offsetWidth;el.classList.add("swap")});setTimeout(()=>visible.forEach(el=>el.classList.remove("swap")),700);if(isLive){wallEl.classList.remove("live-burst");void wallEl.offsetWidth;wallEl.classList.add("live-burst");setTimeout(()=>wallEl.classList.remove("live-burst"),1900)}}
function renderSlots(force=false){if(!items.length)return;const vs=visibleSignature();if(!force&&vs===lastRenderedSig)return;lastRenderedSig=vs;const five=useHeroFive();heroSlot.innerHTML=imgCard(items[cur]);if(five){tlSlot.classList.remove("hidden");trSlot.classList.remove("hidden");blSlot.classList.remove("hidden");brSlot.classList.remove("hidden");leftSlot.classList.add("hidden");rightSlot.classList.add("hidden");tlSlot.innerHTML=imgCard(items[idx(-1)]);trSlot.innerHTML=imgCard(items[idx(1)]);blSlot.innerHTML=imgCard(items[idx(-2)]);brSlot.innerHTML=imgCard(items[idx(2)])}else{tlSlot.classList.add("hidden");trSlot.classList.add("hidden");brSlot.classList.add("hidden");blSlot.classList.add("hidden");leftSlot.classList.toggle("hidden",items.length<2);rightSlot.classList.toggle("hidden",items.length<3);leftSlot.innerHTML=items.length>1?imgCard(items[idx(-1)]):"";rightSlot.innerHTML=items.length>2?imgCard(items[idx(1)]):""}[...dots.children].forEach((dot,i)=>dot.classList.toggle("on",i===cur));preloadAround()}
function rebuildDots(){dots.innerHTML="";badge.textContent=`FLGISA Hero Wall · ${items.length} Image${items.length===1?"":"s"}`}
function render(force=false){rebuildDots();lastRenderedSig="";renderSlots(force)}
function show(){statusEl.classList.toggle("hidden",items.length>0);const many=items.length>1;prev.classList.toggle("hidden",!many);next.classList.toggle("hidden",!many)}
function saveResumePoint(){if(!items.length)return;const nextNormal=items[idx(1)];if(nextNormal)resumeAfterLiveImg=nextNormal.img}
function showImg(img,isLive=false){const i=findImgIndex(img);if(i<0)return false;cur=i;showingLive=!!isLive;lastLiveShown=isLive?img:lastLiveShown;lastRenderedSig="";renderSlots(true);pulseTransition(!!isLive);restart();return true}
function promoteNextLive(){while(liveQueue.length){const img=liveQueue.shift();if(findImgIndex(img)>=0){newUntil.set(img,Date.now()+NEW_MS);showImg(img,true);return true}}showingLive=false;return false}
function normalAdvance(){if(!items.length)return;if(showingLive||(lastLiveShown&&items[cur]?.img===lastLiveShown&&resumeAfterLiveImg)){showingLive=false;if(promoteNextLive())return;if(resumeAfterLiveImg){const ri=findImgIndex(resumeAfterLiveImg);resumeAfterLiveImg=null;if(ri>=0){cur=ri;lastRenderedSig="";renderSlots(true);pulseTransition(false);return}}}
if(promoteNextLive())return;if(items.length>1){cur=(cur+1)%items.length;renderSlots();pulseTransition(false)}}
function go(dir){if(items.length>1){showingLive=false;resumeAfterLiveImg=null;cur=(cur+dir+items.length)%items.length;renderSlots();restart()}}
function restart(){clearInterval(timer);if(items.length>1)timer=setInterval(normalAdvance,ROTATE_MS)}
function refresh(){let nextItems=scrapeSource();if(!nextItems.length){if(!items.length){statusEl.classList.remove("hidden");statusEl.innerHTML="<div class='big'>Waiting for images…</div><div>The FLGISA source wall is still loading.</div>"}return}
const currentImg=items[cur]?.img||"",resumeCandidate=items.length?(items[idx(1)]?.img||null):null,oldSig=signature(items),oldCount=items.length;
const justAdded=booted?nextItems.filter(x=>!knownImgs.has(x.img)).map(x=>x.img):[];
nextItems.forEach(x=>knownImgs.add(x.img));booted=true;items=markNewFlags(nextItems);
const nextSig=signature(items);if(nextSig!==oldSig){rebuildDots();}
if(!oldCount){cur=0;render(true);restart();show();return}
if(currentImg){const keep=findImgIndex(currentImg);if(keep>=0)cur=keep;}
if(justAdded.length){justAdded.forEach(preloadUrl);const existingLive=new Set(liveQueue);justAdded.slice().reverse().forEach(img=>{if(img!==lastLiveShown&&!existingLive.has(img)){liveQueue.unshift(img);existingLive.add(img)}});if(!showingLive){resumeAfterLiveImg=resumeCandidate;promoteNextLive();}}
else renderSlots(false);
show();}
prev.addEventListener("click",()=>go(-1));next.addEventListener("click",()=>go(1));
window.addEventListener("resize",()=>{lastRenderedSig="";renderSlots(true)});
document.addEventListener("keydown",e=>{if(e.key==="ArrowRight")go(1);if(e.key==="ArrowLeft")go(-1)});
sourceFrame.addEventListener("load",()=>setTimeout(refresh,2000));
setInterval(refresh,REFRESH_MS);</script></body></html>
