<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>FLGISA Hero Wall</title>
<style>
:root{--stage-w:min(100vw,calc(100vh * 16 / 9));--stage-h:min(100vh,calc(100vw * 9 / 16));--stage-left:calc((100vw - var(--stage-w))/2);--stage-top:calc((100vh - var(--stage-h))/2);--chalk:#F4F1E8;--accent:#58F2A6}
*{box-sizing:border-box;margin:0;padding:0}html,body{width:100%;height:100%;overflow:hidden;background:#061326;font-family:Inter,"Segoe UI",system-ui,sans-serif;color:var(--chalk);user-select:none}
body:before{content:"";position:fixed;left:var(--stage-left);top:var(--stage-top);width:var(--stage-w);height:var(--stage-h);background:url("../assets/backgrounds/flgisa-kiosk-main.png") center/100% 100% no-repeat;z-index:0;pointer-events:none}
.wall{position:fixed;left:var(--stage-left);top:var(--stage-top);width:var(--stage-w);height:var(--stage-h);overflow:hidden;z-index:1}
.slot{position:absolute;transform:translate(-50%,-50%);display:flex;align-items:center;justify-content:center;transition:transform .7s ease,opacity .5s ease}.hero{left:50%;top:54%;z-index:20}.tl{left:18%;top:31%;z-index:8}.tr{left:82%;top:31%;z-index:8}.bl{left:18%;top:80%;z-index:8}.br{left:82%;top:80%;z-index:8}.side-left{left:24%;top:54%;z-index:8}.side-right{left:76%;top:54%;z-index:8}
.card{position:relative;width:calc(var(--stage-w)*.278);aspect-ratio:864/1320;border-radius:calc(var(--stage-w)*.011);background:#f4f1e8;padding:calc(var(--stage-w)*.006);box-shadow:0 24px 48px rgba(0,0,0,.58);overflow:hidden}.hero .card{width:calc(var(--stage-w)*.300)}.corner .card{width:calc(var(--stage-w)*.145);filter:grayscale(.08) brightness(.96) saturate(.98);opacity:.95}.side .card{width:calc(var(--stage-w)*.18);filter:grayscale(.08) brightness(.96) saturate(.98);opacity:.95}
.photo{width:100%;height:100%;display:block;object-fit:cover;border-radius:calc(var(--stage-w)*.007);background:#071827}
.qr{position:absolute;right:4%;bottom:3.5%;width:22%;background:#fff;border-radius:8px;padding:5px;box-shadow:0 4px 16px rgba(0,0,0,.5);z-index:5}.hero .qr{width:24%;padding:7px}.qr img{display:block;width:100%;aspect-ratio:1/1;object-fit:contain}.qr span{display:block;color:#111;text-align:center;font-weight:800;font-size:clamp(7px,calc(var(--stage-w)*.006),11px);line-height:1.1;margin-top:3px;text-transform:uppercase}
.nav{position:absolute;top:54%;transform:translateY(-50%);z-index:30;width:calc(var(--stage-w)*.04);height:calc(var(--stage-w)*.04);border-radius:50%;border:1px solid rgba(88,242,166,.25);background:rgba(0,0,0,.28);color:#fff;font-size:calc(var(--stage-w)*.024);cursor:pointer}.prev{left:3%}.next{right:3%}.hidden{display:none!important}.badge{position:absolute;right:5.5%;bottom:7%;font-size:clamp(12px,calc(var(--stage-w)*.011),22px);letter-spacing:.12em;text-transform:uppercase;color:rgba(244,241,232,.65)}.status{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);text-align:center;font-size:clamp(18px,2vw,34px)}
#sourceFrame{position:fixed;left:-9999px;top:-9999px;width:1px;height:1px;border:0;opacity:0}
@media(max-width:900px),(max-height:520px) and (orientation:landscape){.hero .card{width:calc(var(--stage-w)*.34)}.side .card{width:calc(var(--stage-w)*.21)}.tl,.tr,.bl,.br{display:none}.side-left{left:21%;top:55%}.side-right{left:79%;top:55%}.nav{width:7vw;height:7vw;font-size:4vw}}
</style>
</head>
<body>
<main class="wall">
<div class="slot hero" id="hero"></div><div class="slot corner tl" id="tl"></div><div class="slot corner tr" id="tr"></div><div class="slot corner bl" id="bl"></div><div class="slot corner br" id="br"></div><div class="slot side side-left hidden" id="left"></div><div class="slot side side-right hidden" id="right"></div>
<button class="nav prev hidden" id="prev">‹</button><button class="nav next hidden" id="next">›</button><div class="badge" id="badge">FLGISA Hero Wall</div><div class="status" id="status">Loading FLGISA images…</div>
</main>
<iframe id="sourceFrame" src="../../event-wall/?event=FLGISA&v=qr2"></iframe>
<script>
const ROTATE_MS=30000,REFRESH_MS=3000;let items=[],cur=0,timer=null;
const $=id=>document.getElementById(id),frame=$('sourceFrame'),hero=$('hero'),tl=$('tl'),tr=$('tr'),bl=$('bl'),br=$('br'),left=$('left'),right=$('right'),prev=$('prev'),next=$('next'),status=$('status'),badge=$('badge');
function esc(s){return String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
function scrape(){try{const d=frame.contentDocument;if(!d)return[];const cards=[...d.querySelectorAll('.card')],seen=new Set,out=[];for(const c of cards){const p=c.querySelector('img.photo'),q=c.querySelector('.qr-overlay img');const img=p&&(p.currentSrc||p.src),qr=q&&(q.currentSrc||q.src);if(img&&!seen.has(img)){seen.add(img);out.push({img,qr})}}return out}catch(e){console.error(e);return[]}}
function card(x){if(!x)return'';return `<div class="card"><img class="photo" src="${esc(x.img)}" alt="">${x.qr?`<div class="qr"><img src="${esc(x.qr)}" alt="Claim photo QR"><span>Claim Photo</span></div>`:''}</div>`}
function idx(n){return((cur+n)%items.length+items.length)%items.length}
function desktop(){return document.querySelector('.wall').getBoundingClientRect().width>=900&&items.length>=5}
function render(){if(!items.length)return;hero.innerHTML=card(items[cur]);if(desktop()){tl.classList.remove('hidden');tr.classList.remove('hidden');bl.classList.remove('hidden');br.classList.remove('hidden');left.classList.add('hidden');right.classList.add('hidden');tl.innerHTML=card(items[idx(-1)]);tr.innerHTML=card(items[idx(1)]);bl.innerHTML=card(items[idx(-2)]);br.innerHTML=card(items[idx(2)])}else{tl.classList.add('hidden');tr.classList.add('hidden');bl.classList.add('hidden');br.classList.add('hidden');left.classList.toggle('hidden',items.length<2);right.classList.toggle('hidden',items.length<3);left.innerHTML=items.length>1?card(items[idx(-1)]):'';right.innerHTML=items.length>2?card(items[idx(1)]):''}status.classList.add('hidden');const many=items.length>1;prev.classList.toggle('hidden',!many);next.classList.toggle('hidden',!many);badge.textContent=`FLGISA Hero Wall · ${items.length} Images`}
function advance(){if(items.length>1){cur=(cur+1)%items.length;render()}}
function restart(){clearInterval(timer);if(items.length>1)timer=setInterval(advance,ROTATE_MS)}
function go(n){if(items.length>1){cur=idx(n);render();restart()}}
function refresh(){const n=scrape();if(!n.length)return;const changed=n.length!==items.length||n.some((x,i)=>!items[i]||items[i].img!==x.img||items[i].qr!==x.qr);if(!changed)return;const current=items[cur]?.img;items=n;if(current){const k=items.findIndex(x=>x.img===current);cur=k>=0?k:0}else cur=0;render();restart()}
prev.onclick=()=>go(-1);next.onclick=()=>go(1);document.addEventListener('keydown',e=>{if(e.key==='ArrowLeft')go(-1);if(e.key==='ArrowRight')go(1)});window.addEventListener('resize',render);frame.addEventListener('load',()=>setTimeout(refresh,1500));setInterval(refresh,REFRESH_MS);
</script>
</body>
</html>
