<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>VXP Camera</title>
<style>
html,body{margin:0;min-height:100%}body{font-family:Inter,system-ui,Arial,sans-serif;background:linear-gradient(rgba(7,17,31,.38),rgba(7,17,31,.78)),var(--bg-img,none) center/cover fixed,#07111f;color:#fff;text-align:center;min-height:100dvh;display:flex;flex-direction:column;align-items:center;padding:10px}.header{padding:8px 16px 2px;font-size:clamp(28px,6vw,48px);font-weight:1000;text-shadow:0 3px 18px #000}.subheader{font-size:clamp(15px,3.5vw,22px);margin-bottom:8px;text-shadow:0 2px 12px #000}.team-panel{width:min(92vw,520px);background:#ffffffec;color:#111;border-radius:16px;padding:12px;margin:4px 0 10px;text-align:left;box-shadow:0 12px 30px #0005}.team-panel label{display:block;font-weight:900;margin-bottom:6px}.team-panel select{width:100%;padding:12px;border-radius:10px;border:1px solid #bbb;font:inherit}.mode-row{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-bottom:10px}.mode-row button{font-size:clamp(14px,3.4vw,19px);padding:10px 14px;border-radius:999px;background:#fff;color:#07111f}.mode-row button.active{outline:4px solid var(--accent,#B23A48)}.camera-wrap{position:relative;aspect-ratio:3/4;height:min(54vh,640px);max-width:90vw;border:8px solid #fff;border-radius:24px;overflow:hidden;background:#000;box-shadow:0 18px 60px #0008}video,canvas,img{width:100%;height:100%;display:block;object-fit:contain}video.mirror{transform:scaleX(-1)}.countdown{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:clamp(120px,30vw,220px);font-weight:1000;text-shadow:0 0 30px #000;background:#0004}.button-row{margin-top:10px;display:flex;flex-wrap:wrap;justify-content:center}button,a.big-link{font-size:clamp(18px,4vw,26px);font-weight:900;padding:13px 22px;margin:6px;border:0;border-radius:15px;background:#fff;color:#07111f;cursor:pointer;text-decoration:none;box-shadow:0 8px 24px #0006}.hidden{display:none!important}.status{margin-top:4px;font-size:clamp(15px,3.5vw,20px);min-height:24px;padding:0 14px}.watermark{margin-top:auto;padding:8px 16px;font-size:13px;opacity:.8;font-weight:800}input[type=file]{display:none}@media(max-width:560px){body{padding:6px}.camera-wrap{height:min(50vh,520px)}.team-panel{margin-top:0}}
</style>
</head>
<body>
<div class="header" id="title">VXP Camera</div>
<div class="subheader" id="subheader">Choose a camera or upload a photo</div>
<div id="teamPanel" class="team-panel hidden"><label id="teamLabel" for="favoriteTeam">Team</label><select id="favoriteTeam"></select></div>
<div class="mode-row"><button id="frontMode" class="active">Front Camera</button><button id="backMode">Back Camera</button><button id="uploadMode">Upload Image</button></div>
<div class="camera-wrap"><video id="video" autoplay playsinline class="mirror"></video><canvas id="canvas" class="hidden"></canvas><img id="photo" class="hidden" alt="Selected photo"><div id="countdown" class="countdown hidden"></div></div>
<input id="fileInput" type="file" accept="image/*">
<div class="button-row"><button id="takePhoto">Take Picture</button><button id="chooseFile" class="hidden">Choose Image</button><button id="retake" class="hidden">Retake</button><button id="submit" class="hidden">Send It</button><a id="viewPhoto" class="big-link hidden" href="#">View Your Photo</a></div>
<div class="status" id="status"></div><div class="watermark" id="watermark">Powered by Veytec + Webex</div>
<script src="../../vxp/config/experiences.js"></script>
<script>
const $=id=>document.getElementById(id),root=window.VXP_CONFIG,params=new URLSearchParams(location.search);
const MLB_TEAMS=['Arizona Diamondbacks','Atlanta Braves','Baltimore Orioles','Boston Red Sox','Chicago Cubs','Chicago White Sox','Cincinnati Reds','Cleveland Guardians','Colorado Rockies','Detroit Tigers','Houston Astros','Kansas City Royals','Los Angeles Angels','Los Angeles Dodgers','Miami Marlins','Milwaukee Brewers','Minnesota Twins','New York Mets','New York Yankees','Athletics','Philadelphia Phillies','Pittsburgh Pirates','San Diego Padres','San Francisco Giants','Seattle Mariners','St. Louis Cardinals','Tampa Bay Rays','Texas Rangers','Toronto Blue Jays','Washington Nationals'];
const NBA_TEAMS=['Atlanta Hawks','Boston Celtics','Brooklyn Nets','Charlotte Hornets','Chicago Bulls','Cleveland Cavaliers','Dallas Mavericks','Denver Nuggets','Detroit Pistons','Golden State Warriors','Houston Rockets','Indiana Pacers','Los Angeles Clippers','Los Angeles Lakers','Memphis Grizzlies','Miami Heat','Milwaukee Bucks','Minnesota Timberwolves','New Orleans Pelicans','New York Knicks','Oklahoma City Thunder','Orlando Magic','Philadelphia 76ers','Phoenix Suns','Portland Trail Blazers','Sacramento Kings','San Antonio Spurs','Toronto Raptors','Utah Jazz','Washington Wizards'];
const FLGISA_CITIES=['Altamonte Springs','Apopka','Atlantic Beach','Aventura','Bartow','Belleview','Boca Raton','Bonita Springs','Boynton Beach','Bradenton','Bunnell','Cape Canaveral','Cape Coral','Clearwater','Clermont','Cocoa','Cocoa Beach','Coconut Creek','Cooper City','Coral Gables','Coral Springs','Crestview','Dade City','Dania Beach','Davie','Daytona Beach','Daytona Beach Shores','DeBary','DeFuniak Springs','Deerfield Beach','DeLand','Delray Beach','Deltona','Destin','Doral','Dunedin','Edgewater','Eustis','Fernandina Beach','Flagler Beach','Florida City','Fort Lauderdale','Fort Myers','Fort Pierce','Fort Walton Beach','Gainesville','Green Cove Springs','Greenacres','Groveland','Gulf Breeze','Haines City','Hallandale Beach','Hialeah','Holly Hill','Hollywood','Homestead','Indian River Shores','Islamorada','Jacksonville','Jacksonville Beach','Jupiter','Jupiter Island','Key Biscayne','Key West','Kissimmee','Lady Lake','Lake City','Lake Park','Lake Wales','Lakeland','Lantana','Largo','Lauderdale Lakes','Lauderhill','Leesburg','Longboat Key','Longwood','Maitland','Marco Island','Margate','Melbourne','Miami','Miami Beach','Miami Gardens','Miami Lakes','Miami Shores','Miami Springs','Milton','Miramar','Mount Dora','Naples','New Port Richey','New Smyrna Beach','Niceville','North Lauderdale','North Miami','North Miami Beach','North Port','Oakland Park','Ocala','Ocoee','Oldsmar','Orlando','Ormond Beach','Oviedo','Palm Bay','Palm Beach','Palm Beach Gardens','Palm Coast','Palmetto Bay','Panama City','Panama City Beach','Parkland','Pembroke Park','Pembroke Pines','Pensacola','Pinecrest','Pinellas Park','Plant City','Plantation','Pompano Beach','Ponce Inlet','Port Orange','Port St. Lucie','Punta Gorda','Riviera Beach','Royal Palm Beach','Safety Harbor','Sanford','Sanibel','Sarasota','Satellite Beach','Sebastian','Sebring','Seminole','South Daytona','St. Augustine Beach','St. Cloud','St. Pete Beach','St. Petersburg','Stuart','Sunny Isles Beach','Sunrise','Sweetwater','Tallahassee','Tamarac','Tampa','Tarpon Springs','Tavares','Temple Terrace','Tequesta','Titusville','Treasure Island','Venice','Vero Beach','Wellington','West Melbourne','West Palm Beach','Weston','Wildwood','Wilton Manors','Winter Garden','Winter Haven','Winter Park','Winter Springs'];
const FLORIDA_COUNTIES=['Alachua County','Baker County','Bay County','Bradford County','Brevard County','Broward County','Calhoun County','Charlotte County','Citrus County','Clay County','Collier County','Columbia County','DeSoto County','Dixie County','Duval County','Escambia County','Flagler County','Franklin County','Gadsden County','Gilchrist County','Glades County','Gulf County','Hamilton County','Hardee County','Hendry County','Hernando County','Highlands County','Hillsborough County','Holmes County','Indian River County','Jackson County','Jefferson County','Lafayette County','Lake County','Lee County','Leon County','Levy County','Liberty County','Madison County','Manatee County','Marion County','Martin County','Miami-Dade County','Monroe County','Nassau County','Okaloosa County','Okeechobee County','Orange County','Osceola County','Palm Beach County','Pasco County','Pinellas County','Polk County','Putnam County','Santa Rosa County','Sarasota County','Seminole County','St. Johns County','St. Lucie County','Sumter County','Suwannee County','Taylor County','Union County','Volusia County','Wakulla County','Walton County','Washington County'];
const FLGISA_DESTINATIONS=['Port Canaveral','Universal Orlando Resort','Universal Epic Universe','Walt Disney World'];
function getExp(){const raw=String(params.get('experience')||params.get('event')||'usa250').toLowerCase();for(const e of Object.values(root.experiences)){if(e.id===raw||(e.aliases||[]).map(x=>String(x).toLowerCase()).includes(raw))return e}return root.experiences.usa250}
function groupedOptions(placeholder,groups){return `<option value="">${placeholder}</option>`+groups.map(([label,items])=>`<optgroup label="${label}">${items.map(v=>`<option value="${v}">${v}</option>`).join('')}</optgroup>`).join('')}
const exp=getExp(),cap=root.defaults.capture,isMlb=exp.id==='mlb',isDerby=isMlb&&params.get('derby')==='1',isNba=exp.id==='nba',isFlgisa=exp.id==='flgisa',needsSelection=isMlb||isNba||isFlgisa,personName=params.get('name')||'Kiosk',playerKey=params.get('playerKey')||'';
document.title=exp.cameraTitle;$('title').textContent=isDerby?'Create Your Derby Bobblehead':exp.cameraTitle;$('subheader').textContent=isDerby?'Choose your favorite team, then take your picture':isNba?'Choose your NBA team, then take your picture':isMlb?'Choose your MLB team, then take your picture':isFlgisa?'Choose your Florida city, county, or destination, then take your picture':(exp.cameraSubtitle||'Choose a camera or upload a photo');document.documentElement.style.setProperty('--accent',exp.accent||'#B23A48');document.body.style.setProperty('--bg-img',exp.backgroundImage?`url("${exp.backgroundImage}")`:'none');$('watermark').textContent=`Powered by Veytec + Webex · ${exp.label}`;
const teamPanel=$('teamPanel'),teamLabel=$('teamLabel'),favoriteTeam=$('favoriteTeam');if(isFlgisa){favoriteTeam.innerHTML=groupedOptions('Select a Florida city, county, or destination…',[['Florida Cities',FLGISA_CITIES],['Florida Counties',FLORIDA_COUNTIES],['Destinations and Organizations',FLGISA_DESTINATIONS]])}else{const teamList=isNba?NBA_TEAMS:MLB_TEAMS;favoriteTeam.innerHTML='<option value="">Choose team…</option>'+teamList.map(t=>`<option>${t}</option>`).join('')}if(needsSelection){teamPanel.classList.remove('hidden');teamLabel.textContent=isFlgisa?'Florida City / County / Destination':isNba?'NBA Team':'MLB Team';favoriteTeam.value=params.get('favoriteTeam')||params.get('team')||params.get('location')||''}
const video=$('video'),canvas=$('canvas'),photo=$('photo'),takePhotoBtn=$('takePhoto'),chooseFileBtn=$('chooseFile'),retakeBtn=$('retake'),submitBtn=$('submit'),viewPhotoLink=$('viewPhoto'),statusEl=$('status'),countdownEl=$('countdown'),fileInput=$('fileInput'),frontMode=$('frontMode'),backMode=$('backMode'),uploadMode=$('uploadMode');let capturedBase64='',currentMode=cap.defaultMode||'front',stream=null;
function setStatus(t){statusEl.textContent=t||''}function stopCamera(){if(stream){stream.getTracks().forEach(t=>t.stop());stream=null}video.srcObject=null}
async function startCamera(facingMode='user'){stopCamera();video.classList.toggle('mirror',facingMode==='user');try{stream=await navigator.mediaDevices.getUserMedia({video:{facingMode,width:{ideal:1080},height:{ideal:1440}},audio:false});video.srcObject=stream}catch(err){setStatus('Camera could not start. Try Upload Image or check permissions.')}}
function setMode(mode){currentMode=mode;capturedBase64='';photo.classList.add('hidden');viewPhotoLink.classList.add('hidden');submitBtn.classList.add('hidden');retakeBtn.classList.add('hidden');frontMode.classList.toggle('active',mode==='front');backMode.classList.toggle('active',mode==='back');uploadMode.classList.toggle('active',mode==='upload');takePhotoBtn.classList.toggle('hidden',mode==='upload');chooseFileBtn.classList.toggle('hidden',mode!=='upload');setStatus('');if(mode==='front'){video.classList.remove('hidden');startCamera('user')}if(mode==='back'){video.classList.remove('hidden');startCamera('environment')}if(mode==='upload'){stopCamera();video.classList.add('hidden')}}
frontMode.onclick=()=>setMode('front');backMode.onclick=()=>setMode('back');uploadMode.onclick=()=>setMode('upload');chooseFileBtn.onclick=()=>fileInput.click();
function draw(source,mirror=false){const W=cap.outWidth||768,H=cap.outHeight||1024,Q=cap.jpegQuality||.7,sw=source.videoWidth||source.naturalWidth,sh=source.videoHeight||source.naturalHeight,target=W/H,src=sw/sh;let cw,ch;if(src>target){ch=sh;cw=sh*target}else{cw=sw;ch=sw/target}const cx=(sw-cw)/2,cy=(sh-ch)/2;canvas.width=W;canvas.height=H;const ctx=canvas.getContext('2d');if(mirror){ctx.save();ctx.translate(W,0);ctx.scale(-1,1);ctx.drawImage(source,cx,cy,cw,ch,0,0,W,H);ctx.restore()}else ctx.drawImage(source,cx,cy,cw,ch,0,0,W,H);return canvas.toDataURL('image/jpeg',Q).split(',')[1]}
function requireSelection(){if(needsSelection&&!favoriteTeam.value){setStatus(isFlgisa?'Choose your Florida city, county, or destination first.':isNba?'Choose your NBA team first.':'Choose your MLB team first.');return false}return true}
function showCaptured(){photo.src='data:image/jpeg;base64,'+capturedBase64;setStatus('Ready to send');video.classList.add('hidden');photo.classList.remove('hidden');takePhotoBtn.classList.add('hidden');chooseFileBtn.classList.add('hidden');retakeBtn.classList.remove('hidden');submitBtn.classList.remove('hidden')}
takePhotoBtn.onclick=()=>{if(!requireSelection())return;let n=3;countdownEl.textContent=n;countdownEl.classList.remove('hidden');const tick=setInterval(()=>{n--;if(n>0)countdownEl.textContent=n;else{clearInterval(tick);countdownEl.classList.add('hidden');capturedBase64=draw(video,currentMode==='front');showCaptured()}},1000)};
fileInput.onchange=()=>{const file=fileInput.files&&fileInput.files[0];if(!file)return;if(!requireSelection()){fileInput.value='';return}const img=new Image();img.onload=()=>{capturedBase64=draw(img);URL.revokeObjectURL(img.src);showCaptured()};img.src=URL.createObjectURL(file)};retakeBtn.onclick=()=>setMode(currentMode);
submitBtn.onclick=async()=>{if(!capturedBase64||!requireSelection())return;submitBtn.disabled=true;setStatus('Sending…');const submittedAt=Date.now(),photoUrl=`${root.baseUrl}/VXP/photo/?experience=${encodeURIComponent(exp.id)}&ts=${submittedAt}`,selectedValue=favoriteTeam.value||'',eventName=needsSelection&&selectedValue?`${exp.eventName}-${selectedValue}`:exp.eventName,payload={automation:'bobblehead_kiosk',custname:'Veytec',demo_type:exp.demoType,experience:exp.id,Name:personName,playerKey,MobileNumber:'0000000000',EventName:eventName,source:exp.source,captureMode:currentMode,submittedAt:new Date(submittedAt).toISOString(),photoUrl,imageB64:capturedBase64};if(isMlb||isNba)payload.FavoriteTeam=selectedValue;if(isFlgisa)payload.FloridaLocation=selectedValue;try{const res=await fetch(root.webexConnect.captureWebhookUrl,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});let data=null;try{data=await res.clone().json()}catch(e){}if(res.ok){const id=data&&(data.recordId||data.id||data.airtableRecordId);viewPhotoLink.href=id?`${root.baseUrl}/VXP/photo/?experience=${encodeURIComponent(exp.id)}&id=${encodeURIComponent(id)}&ts=${submittedAt}`:photoUrl;viewPhotoLink.classList.remove('hidden');submitBtn.classList.add('hidden');retakeBtn.classList.add('hidden');setStatus(isFlgisa?'Sent! Your FLGISA image will appear on the wall when it is ready.':isNba?'Sent! Your basketball image will appear on the NBA wall when it is ready.':'Sent! Your bobblehead will appear on the MLB wall when it is ready.')}else{setStatus("Let's try that again.");submitBtn.disabled=false}}catch(err){setStatus("Let's try that again.");submitBtn.disabled=false}};
setMode(currentMode);
</script>
</body>
</html>
