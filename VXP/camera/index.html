<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>VXP Camera</title><style>html,body{margin:0;min-height:100%}body{font-family:Inter,system-ui,Arial,sans-serif;background:linear-gradient(rgba(7,17,31,.38),rgba(7,17,31,.78)),var(--bg-img,none) center/cover fixed,#07111f;color:#fff;text-align:center;min-height:100dvh;display:flex;flex-direction:column;align-items:center;padding:10px}.header{padding:8px 16px 2px;font-size:clamp(28px,6vw,48px);font-weight:1000;text-shadow:0 3px 18px #000}.subheader{font-size:clamp(15px,3.5vw,22px);margin-bottom:8px;text-shadow:0 2px 12px #000}.team-panel{width:min(92vw,520px);background:#ffffffec;color:#111;border-radius:16px;padding:12px;margin:4px 0 10px;text-align:left;box-shadow:0 12px 30px #0005}.team-panel label{display:block;font-weight:900;margin-bottom:6px}.team-panel select{width:100%;padding:12px;border-radius:10px;border:1px solid #bbb;font:inherit}.mode-row{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-bottom:10px}.mode-row button{font-size:clamp(14px,3.4vw,19px);padding:10px 14px;border-radius:999px;background:#fff;color:#07111f}.mode-row button.active{outline:4px solid var(--accent,#B23A48)}.camera-wrap{position:relative;aspect-ratio:3/4;height:min(54vh,640px);max-width:90vw;border:8px solid #fff;border-radius:24px;overflow:hidden;background:#000;box-shadow:0 18px 60px #0008}video,canvas,img{width:100%;height:100%;display:block;object-fit:contain}video.mirror{transform:scaleX(-1)}.countdown{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:clamp(120px,30vw,220px);font-weight:1000;text-shadow:0 0 30px #000;background:#0004}.button-row{margin-top:10px;display:flex;flex-wrap:wrap;justify-content:center}button,a.big-link{font-size:clamp(18px,4vw,26px);font-weight:900;padding:13px 22px;margin:6px;border:0;border-radius:15px;background:#fff;color:#07111f;cursor:pointer;text-decoration:none;box-shadow:0 8px 24px #0006}.hidden{display:none!important}.status{margin-top:4px;font-size:clamp(15px,3.5vw,20px);min-height:24px;padding:0 14px}.watermark{margin-top:auto;padding:8px 16px;font-size:13px;opacity:.8;font-weight:800}input[type=file]{display:none}@media(max-width:560px){body{padding:6px}.camera-wrap{height:min(50vh,520px)}.team-panel{margin-top:0}}</style></head><body><div class="header" id="title">VXP Camera</div><div class="subheader" id="subheader">Choose a camera or upload a photo</div><div id="teamPanel" class="team-panel hidden"><label>Favorite MLB team</label><select id="favoriteTeam"></select></div><div class="mode-row"><button id="frontMode" class="active">Front Camera</button><button id="backMode">Back Camera</button><button id="uploadMode">Upload Image</button></div><div class="camera-wrap"><video id="video" autoplay playsinline class="mirror"></video><canvas id="canvas" class="hidden"></canvas><img id="photo" class="hidden" alt="Selected photo"><div id="countdown" class="countdown hidden"></div></div><input id="fileInput" type="file" accept="image/*"><div class="button-row"><button id="takePhoto">Take Picture</button><button id="chooseFile" class="hidden">Choose Image</button><button id="retake" class="hidden">Retake</button><button id="submit" class="hidden">Send It</button><a id="viewPhoto" class="big-link hidden" href="#">View Your Photo</a></div><div class="status" id="status"></div><div class="watermark" id="watermark">Powered by Veytec + Webex</div><script src="../../vxp/config/experiences.js"></script><script>const $=id=>document.getElementById(id),root=window.VXP_CONFIG,params=new URLSearchParams(location.search),TEAMS=['Arizona Diamondbacks','Atlanta Braves','Baltimore Orioles','Boston Red Sox','Chicago Cubs','Chicago White Sox','Cincinnati Reds','Cleveland Guardians','Colorado Rockies','Detroit Tigers','Houston Astros','Kansas City Royals','Los Angeles Angels','Los Angeles Dodgers','Miami Marlins','Milwaukee Brewers','Minnesota Twins','New York Mets','New York Yankees','Athletics','Philadelphia Phillies','Pittsburgh Pirates','San Diego Padres','San Francisco Giants','Seattle Mariners','St. Louis Cardinals','Tampa Bay Rays','Texas Rangers','Toronto Blue Jays','Washington Nationals'];function getExp(){const raw=String(params.get('experience')||params.get('event')||'usa250').toLowerCase();for(const e of Object.values(root.experiences)){if(e.id===raw||(e.aliases||[]).map(x=>String(x).toLowerCase()).includes(raw))return e}return root.experiences.usa250}const exp=getExp(),cap=root.defaults.capture,isDerby=exp.id==='mlb'&&params.get('derby')==='1',personName=params.get('name')||'Kiosk',playerKey=params.get('playerKey')||'';document.title=exp.cameraTitle;$('title').textContent=isDerby?'Create Your Derby Bobblehead':exp.cameraTitle;$('subheader').textContent=isDerby?'Choose your favorite team, then take your picture':(exp.cameraSubtitle||'Choose a camera or upload a photo');document.documentElement.style.setProperty('--accent',exp.accent||'#B23A48');document.body.style.setProperty('--bg-img',exp.backgroundImage?`url("${exp.backgroundImage}")`:'none');$('watermark').textContent=`Powered by Veytec + Webex · ${exp.label}`;const teamPanel=$('teamPanel'),favoriteTeam=$('favoriteTeam');favoriteTeam.innerHTML='<option value="">Choose team…</option>'+TEAMS.map(t=>`<option>${t}</option>`).join('');if(isDerby){teamPanel.classList.remove('hidden');favoriteTeam.value=params.get('favoriteTeam')||''}const video=$('video'),canvas=$('canvas'),photo=$('photo'),takePhotoBtn=$('takePhoto'),chooseFileBtn=$('chooseFile'),retakeBtn=$('retake'),submitBtn=$('submit'),viewPhotoLink=$('viewPhoto'),statusEl=$('status'),countdownEl=$('countdown'),fileInput=$('fileInput'),frontMode=$('frontMode'),backMode=$('backMode'),uploadMode=$('uploadMode');let capturedBase64='',currentMode=cap.defaultMode||'front',stream=null;function setStatus(t){statusEl.textContent=t||''}function stopCamera(){if(stream){stream.getTracks().forEach(t=>t.stop());stream=null}video.srcObject=null}async function startCamera(facingMode='user'){stopCamera();video.classList.toggle('mirror',facingMode==='user');try{stream=await navigator.mediaDevices.getUserMedia({video:{facingMode,width:{ideal:1080},height:{ideal:1440}},audio:false});video.srcObject=stream}catch(err){setStatus('Camera could not start. Try Upload Image or check permissions.')}}function setMode(mode){currentMode=mode;capturedBase64='';photo.classList.add('hidden');viewPhotoLink.classList.add('hidden');submitBtn.classList.add('hidden');retakeBtn.classList.add('hidden');frontMode.classList.toggle('active',mode==='front');backMode.classList.toggle('active',mode==='back');uploadMode.classList.toggle('active',mode==='upload');takePhotoBtn.classList.toggle('hidden',mode==='upload');chooseFileBtn.classList.toggle('hidden',mode!=='upload');setStatus('');if(mode==='front'){video.classList.remove('hidden');startCamera('user')}if(mode==='back'){video.classList.remove('hidden');startCamera('environment')}if(mode==='upload'){stopCamera();video.classList.add('hidden')}}frontMode.onclick=()=>setMode('front');backMode.onclick=()=>setMode('back');uploadMode.onclick=()=>setMode('upload');chooseFileBtn.onclick=()=>fileInput.click();function draw(source,mirror=false){const W=cap.outWidth||768,H=cap.outHeight||1024,Q=cap.jpegQuality||.7,sw=source.videoWidth||source.naturalWidth,sh=source.videoHeight||source.naturalHeight,target=W/H,src=sw/sh;let cw,ch;if(src>target){ch=sh;cw=sh*target}else{cw=sw;ch=sw/target}const cx=(sw-cw)/2,cy=(sh-ch)/2;canvas.width=W;canvas.height=H;const ctx=canvas.getContext('2d');if(mirror){ctx.save();ctx.translate(W,0);ctx.scale(-1,1);ctx.drawImage(source,cx,cy,cw,ch,0,0,W,H);ctx.restore()}else ctx.drawImage(source,cx,cy,cw,ch,0,0,W,H);return canvas.toDataURL('image/jpeg',Q).split(',')[1]}function showCaptured(){photo.src='data:image/jpeg;base64,'+capturedBase64;setStatus('Ready to send');video.classList.add('hidden');photo.classList.remove('hidden');takePhotoBtn.classList.add('hidden');chooseFileBtn.classList.add('hidden');retakeBtn.classList.remove('hidden');submitBtn.classList.remove('hidden')}takePhotoBtn.onclick=()=>{if(isDerby&&!favoriteTeam.value){setStatus('Choose your favorite MLB team first.');return}let n=3;countdownEl.textContent=n;countdownEl.classList.remove('hidden');const tick=setInterval(()=>{n--;if(n>0)countdownEl.textContent=n;else{clearInterval(tick);countdownEl.classList.add('hidden');capturedBase64=draw(video,currentMode==='front');showCaptured()}},1000)};fileInput.onchange=()=>{const file=fileInput.files&&fileInput.files[0];if(!file)return;const img=new Image();img.onload=()=>{capturedBase64=draw(img);URL.revokeObjectURL(img.src);showCaptured()};img.src=URL.createObjectURL(file)};retakeBtn.onclick=()=>setMode(currentMode);submitBtn.onclick=async()=>{if(!capturedBase64)return;if(isDerby&&!favoriteTeam.value){setStatus('Choose your favorite MLB team first.');return}submitBtn.disabled=true;setStatus('Sending…');const submittedAt=Date.now(),photoUrl=`${root.baseUrl}/VXP/photo/?experience=${encodeURIComponent(exp.id)}&ts=${submittedAt}`,payload={automation:'bobblehead_kiosk',custname:'Veytec',demo_type:exp.demoType,experience:exp.id,Name:personName,FavoriteTeam:favoriteTeam.value||'',playerKey,MobileNumber:'0000000000',EventName:isDerby&&favoriteTeam.value?`${exp.eventName}-${favoriteTeam.value}`:exp.eventName,source:exp.source,captureMode:currentMode,submittedAt:new Date(submittedAt).toISOString(),photoUrl,imageB64:capturedBase64};try{const res=await fetch(root.webexConnect.captureWebhookUrl,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});let data=null;try{data=await res.clone().json()}catch(e){}if(res.ok){const id=data&&(data.recordId||data.id||data.airtableRecordId);viewPhotoLink.href=id?`${root.baseUrl}/VXP/photo/?experience=${encodeURIComponent(exp.id)}&id=${encodeURIComponent(id)}&ts=${submittedAt}`:photoUrl;viewPhotoLink.classList.remove('hidden');submitBtn.classList.add('hidden');retakeBtn.classList.add('hidden');setStatus('Sent! Your bobblehead will appear on the MLB wall when it is ready.')}else{setStatus("Let's try that again.");submitBtn.disabled=false}}catch(err){setStatus("Let's try that again.");submitBtn.disabled=false}};setMode(currentMode);</script></body></html>
