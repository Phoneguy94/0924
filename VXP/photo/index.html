<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>VXP Photo</title>
<link rel="stylesheet" href="photo.css">
</head>
<body>
<div class="wrap">
<h1 id="title">VXP Photo</h1>
<p id="msg">Creating your image. This page will update automatically.</p>
<div id="spin" class="spin"></div>
<div id="grid" class="grid"></div>
<div id="claim" class="claim"><img id="qr" alt="Claim QR"><div class="hint"><b>Claim Your Photo</b><br>Scan to receive it on your phone.</div></div>
<div class="actions"><a id="claimBtn" href="#">📲 Claim Photo</a><a id="again" href="#">📸 Take Another</a><a id="wall" href="#">🖼️ View Wall</a><button id="refresh">Refresh</button></div>
<div class="small" id="brand">Powered by Veytec + Webex</div>
</div>
<script src="../../vxp/config/experiences.js"></script>
<script>
const $=id=>document.getElementById(id),root=window.VXP_CONFIG,p=new URLSearchParams(location.search),AT=root.airtable,recordId=p.get('id'),ts=Number(p.get('ts')||Date.now());
let exp=getExpFromParam();
function norm(v){return String(v||'').toLowerCase().replace(/[^a-z0-9]/g,'')}
function getExpFromParam(){const raw=String(p.get('experience')||p.get('event')||'').toLowerCase();for(const e of Object.values(root.experiences)){if(e.id===raw||(e.aliases||[]).map(a=>String(a).toLowerCase()).includes(raw))return e}return null}
function getExpFromRecord(rec){const f=rec&&rec.fields||{},eventName=f.EventName||f.eventName||'';const n=norm(eventName);for(const e of Object.values(root.experiences)){if(n.includes(norm(e.id))||n.includes(norm(e.eventName))||(e.aliases||[]).some(a=>n.includes(norm(a))))return e}return exp||root.experiences.usa250}
function applyExp(){document.title=exp.photoTitle;$('title').textContent=exp.photoTitle;$('msg').textContent=exp.waitingMessage||'Creating your image. This page will update automatically.';$('brand').textContent=exp.label+' · Powered by Veytec + Webex';$('again').href=root.baseUrl+'/VXP/camera/?experience='+encodeURIComponent(exp.id);$('wall').href=root.baseUrl+'/VXP/wall/?experience='+encodeURIComponent(exp.id);document.body.style.setProperty('--bg-img',exp.backgroundImage?`url("${exp.backgroundImage}")`:'none')}
function esc(s){return String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
function att(a){return a&&a.thumbnails&&a.thumbnails.large&&a.thumbnails.large.url||a&&a.url||''}
function newest(v){return Array.isArray(v)&&v.length?att(v[v.length-1]):''}
function first(v){return Array.isArray(v)&&v.length?att(v[0]):''}
function imgs(rec){const f=rec.fields||{};return (exp.fields||[]).map((fid,i)=>({url:exp.layout==='single'?newest(f[fid]):first(f[fid]),cap:(exp.captions||[])[i]||exp.label})).filter(x=>x.url)}
function headers(){const h={};h[['Author','ization'].join('')]=['Bear','er '].join('')+AT.token;return h}
async function aget(url){const r=await fetch(url,{headers:headers()});if(!r.ok)throw Error('airtable '+r.status);return r.json()}
async function byId(id){return aget(`https://api.airtable.com/v0/${AT.baseId}/${AT.tableId}/${encodeURIComponent(id)}?returnFieldsByFieldId=true`)}
async function latest(){let all=[],off=null;do{const d=await aget(`https://api.airtable.com/v0/${AT.baseId}/${AT.tableId}?pageSize=100&returnFieldsByFieldId=true`+(off?'&offset='+encodeURIComponent(off):''));all=all.concat(d.records||[]);off=d.offset||null}while(off);const after=new Date(ts-120000);all.sort((a,b)=>new Date(b.createdTime)-new Date(a.createdTime));return all.find(r=>new Date(r.createdTime)>=after&&Object.values(root.experiences).some(e=>{const old=exp;exp=e;const ok=imgs(r).length;exp=old;return ok}))}
function claimUrl(rec){return root.baseUrl+'/claim_my_bobble/?id='+encodeURIComponent(rec.id)+'&experience='+encodeURIComponent(exp.id)}
function render(rec,list){$('spin').classList.add('hide');$('msg').textContent='Your image is ready.';$('grid').innerHTML=list.map(x=>`<div class="card"><img src="${esc(x.url)}"><div class="caption">${esc(x.cap)}</div></div>`).join('');const u=claimUrl(rec);$('claimBtn').href=u;$('qr').src='https://api.qrserver.com/v1/create-qr-code/?size=220x220&data='+encodeURIComponent(u);$('claim').classList.add('show')}
async function load(){try{const rec=recordId?await byId(recordId):await latest();if(rec){exp=getExpFromRecord(rec);applyExp();const list=imgs(rec);if(list.length){render(rec,list);return}}else{exp=exp||root.experiences.usa250;applyExp()}$('spin').classList.remove('hide');$('msg').textContent=exp.waitingMessage||'Still creating your image.'}catch(e){console.error(e);exp=exp||root.experiences.usa250;applyExp();$('msg').textContent='Still waiting for your photo. Refresh in a few seconds.'}}
$('refresh').onclick=load;load();setInterval(load,8000);
</script>
</body>
</html>
