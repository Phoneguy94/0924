<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>VXP Photo</title>
<style>
html,body{margin:0;min-height:100%}body{font-family:Arial,sans-serif;background:linear-gradient(rgba(7,17,31,.35),rgba(7,17,31,.82)),var(--bg-img,none) center/cover fixed no-repeat,#07111f;color:#fff;display:flex;align-items:center;justify-content:center;padding:22px;box-sizing:border-box}.wrap{text-align:center;width:min(1000px,100%)}h1{font-size:clamp(30px,7vw,54px);margin:0 0 8px}p{font-size:clamp(16px,4vw,23px)}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,500px));gap:24px;justify-content:center;margin-top:18px}.card{background:#f4f1e8;color:#111b2c;border-radius:18px;padding:12px 12px 16px;box-shadow:0 18px 50px rgba(0,0,0,.55)}.card img{width:100%;max-height:68vh;object-fit:contain;border-radius:12px;background:#07111f}.caption{font-family:Georgia,serif;font-weight:900;font-style:italic;font-size:22px;margin-top:10px}.claim{display:none;margin:20px auto 0;align-items:center;justify-content:center;gap:16px;flex-wrap:wrap}.claim.show{display:flex}.claim img{width:130px;height:130px;background:#fff;border-radius:12px;padding:8px}.hint{text-align:left;font-size:18px}.actions{margin-top:20px;display:flex;gap:12px;justify-content:center;flex-wrap:wrap}a,button{font-size:20px;font-weight:800;padding:13px 20px;border:0;border-radius:14px;background:#fff;color:#07111f;text-decoration:none;cursor:pointer}.spin{width:58px;height:58px;border:7px solid rgba(255,255,255,.25);border-top-color:#fff;border-radius:50%;animation:s 1s linear infinite;margin:24px auto}@keyframes s{to{transform:rotate(360deg)}}.small{font-size:14px;opacity:.75;margin-top:12px}.hide{display:none!important}
</style>
</head>
<body>
<div class="wrap">
<h1 id="title">VXP Photo</h1>
<p id="msg">Creating your image. This page will update automatically.</p>
<div id="spin" class="spin"></div>
<div id="grid" class="grid"></div>
<div id="claim" class="claim"><img id="qr" alt="Claim QR"><div class="hint"><b>Claim Your Photo</b><br>Scan to receive it on your phone.</div></div>
<div class="actions"><a id="claimBtn" href="#">📲 Claim Photo</a><a id="again" href="#">📸 Take Another</a><a id="wall" href="#">🖼️ View Wall</a><button id="refresh">Refresh</button></div>
<div class="small" id="brand">Powered by Veytec + Webex</div>
</div>
<script src="../../vxp/config/experiences.js"></script>
<script>
const $=id=>document.getElementById(id),root=window.VXP_CONFIG,p=new URLSearchParams(location.search);
function getExp(){const raw=String(p.get('experience')||p.get('event')||'usa250').toLowerCase();for(const e of Object.values(root.experiences)){if(e.id===raw||(e.aliases||[]).map(a=>String(a).toLowerCase()).includes(raw))return e}return root.experiences.usa250}
const exp=getExp(),AT=root.airtable,recordId=p.get('id'),ts=Number(p.get('ts')||Date.now());
document.title=exp.photoTitle;$('title').textContent=exp.photoTitle;$('msg').textContent=exp.waitingMessage||'Creating your image. This page will update automatically.';$('brand').textContent=exp.label+' · Powered by Veytec + Webex';$('again').href=root.baseUrl+'/VXP/camera/?experience='+encodeURIComponent(exp.id);$('wall').href=root.baseUrl+'/VXP/wall/?experience='+encodeURIComponent(exp.id);document.body.style.setProperty('--bg-img',exp.backgroundImage?`url("${exp.backgroundImage}")`:'none');
function esc(s){return String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
function att(a){return a&&a.thumbnails&&a.thumbnails.large&&a.thumbnails.large.url||a&&a.url||''}
function newest(v){return Array.isArray(v)&&v.length?att(v[v.length-1]):''}
function first(v){return Array.isArray(v)&&v.length?att(v[0]):''}
function imgs(rec){const f=rec.fields||{};return (exp.fields||[]).map((fid,i)=>({url:exp.layout==='single'?newest(f[fid]):first(f[fid]),cap:(exp.captions||[])[i]||exp.label})).filter(x=>x.url)}
function headers(){const h={};h[['Author','ization'].join('')]=['Bear','er '].join('')+AT.token;return h}
async function aget(url){const r=await fetch(url,{headers:headers()});if(!r.ok)throw Error('airtable '+r.status);return r.json()}
async function byId(id){return aget(`https://api.airtable.com/v0/${AT.baseId}/${AT.tableId}/${encodeURIComponent(id)}?returnFieldsByFieldId=true`)}
async function latest(){let all=[],off=null;do{const d=await aget(`https://api.airtable.com/v0/${AT.baseId}/${AT.tableId}?pageSize=100&returnFieldsByFieldId=true`+(off?'&offset='+encodeURIComponent(off):''));all=all.concat(d.records||[]);off=d.offset||null}while(off);const after=new Date(ts-120000);all.sort((a,b)=>new Date(b.createdTime)-new Date(a.createdTime));return all.find(r=>new Date(r.createdTime)>=after&&imgs(r).length)}
function claimUrl(rec){return root.baseUrl+'/claim_my_bobble/?id='+encodeURIComponent(rec.id)+'&experience='+encodeURIComponent(exp.id)}
function render(rec,list){$('spin').classList.add('hide');$('msg').textContent='Your image is ready.';$('grid').innerHTML=list.map(x=>`<div class="card"><img src="${esc(x.url)}"><div class="caption">${esc(x.cap)}</div></div>`).join('');const u=claimUrl(rec);$('claimBtn').href=u;$('qr').src='https://api.qrserver.com/v1/create-qr-code/?size=220x220&data='+encodeURIComponent(u);$('claim').classList.add('show')}
async function load(){try{const rec=recordId?await byId(recordId):await latest();if(rec){const list=imgs(rec);if(list.length){render(rec,list);return}}$('spin').classList.remove('hide');$('msg').textContent=exp.waitingMessage||'Still creating your image.'}catch(e){console.error(e);$('msg').textContent='Still waiting for your photo. Refresh in a few seconds.'}}
$('refresh').onclick=load;load();setInterval(load,8000);
</script>
</body>
</html>
