<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"><title>VXP Photo</title><style>html,body{margin:0;min-height:100%}body{font-family:Arial,sans-serif;background:linear-gradient(rgba(7,17,31,.35),rgba(7,17,31,.8)),var(--bg-img,none) center/cover fixed no-repeat,#07111f;color:#fff;display:flex;align-items:center;justify-content:center;padding:24px;box-sizing:border-box}.wrap{width:min(1500px,100%);text-align:center}h1{font-size:clamp(30px,7vw,58px);margin:0 0 8px;text-shadow:0 4px 22px rgba(0,0,0,.75)}p{font-size:clamp(16px,4vw,24px);opacity:.95;text-shadow:0 3px 14px rgba(0,0,0,.75)}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:28px;margin-top:22px;align-items:start}.card{background:#f4f1e8;color:#111b2c;border-radius:18px;padding:12px 12px 18px;box-shadow:0 18px 50px rgba(0,0,0,.55)}.card img{width:100%;border-radius:12px;display:block;background:#07111f}.caption{font-family:Georgia,serif;font-style:italic;font-weight:900;font-size:22px;margin-top:12px}.actions{margin-top:22px;display:flex;gap:12px;justify-content:center;flex-wrap:wrap}a,button{font-size:20px;font-weight:bold;padding:14px 22px;border:0;border-radius:16px;background:#fff;color:#07111f;text-decoration:none;box-shadow:0 8px 24px rgba(0,0,0,.35);cursor:pointer}.claimbox{margin:22px auto 0;display:none;align-items:center;justify-content:center;gap:16px;flex-wrap:wrap}.claimbox.show{display:flex}.claimbox img{width:132px;height:132px;background:#fff;border-radius:12px;padding:8px;box-shadow:0 8px 24px rgba(0,0,0,.35)}.claimbox .hint{font-size:18px;max-width:320px;text-align:left}.spinner{width:60px;height:60px;border:7px solid rgba(255,255,255,.25);border-top-color:#fff;border-radius:50%;animation:spin 1s linear infinite;margin:26px auto}@keyframes spin{to{transform:rotate(360deg)}}.small{font-size:14px;opacity:.75;margin-top:14px}.hidden{display:none!important}</style></head><body><div class="wrap"><h1 id="title">VXP Photo</h1><p id="message">Creating your image. This page will update automatically.</p><div id="spinner" class="spinner"></div><div id="grid" class="grid"></div><div id="claimBox" class="claimbox"><img id="claimQr" alt="Claim QR"><div class="hint"><b>Want this sent to you?</b><br>Scan the QR or tap Claim Photo.</div></div><div class="actions"><a id="claimLink" href="#">📲 Claim Photo</a><a id="cameraLink" href="#">📸 Take Another</a><a id="wallLink" href="#">🖼️ View Wall</a><button id="refresh">Refresh</button></div><div class="small" id="brand">Powered by Veytec + Webex</div></div><script src="../../vxp/config/experiences.js"></script><script>const $=id=>document.getElementById(id),root=window.VXP_CONFIG,params=new URLSearchParams(location.search);function getExp(){const raw=String(params.get('experience')||params.get('event')||'usa250').toLowerCase();for(const e of Object.values(root.experiences)){if(e.id===raw||(e.aliases||[]).map(x=>String(x).toLowerCase()).includes(raw))return e}return root.experiences.usa250}const exp=getExp(),recordId=params.get('id'),ts=Number(params.get('ts')||Date.now()),AT=root.airtable;function claimUrl(rec){return `${root.baseUrl}/VXP/claim/?experience=${encodeURIComponent(exp.id)}${rec?'&id='+encodeURIComponent(rec.id):recordId?'&id='+encodeURIComponent(recordId):'&ts='+encodeURIComponent(ts)}`}function showClaim(rec){const url=claimUrl(rec);$('claimLink').href=url;$('claimQr').src=`https://api.qrserver.com/v1/create-qr-code/?size=220x220&data=${encodeURIComponent(url)}`;$('claimBox').classList.add('show')}document.title=exp.photoTitle;$('title').textContent=exp.photoTitle;$('message').textContent=exp.waitingMessage||'Creating your image. This page will update automatically.';$('brand').textContent=`${exp.label} · Powered by Veytec + Webex`;$('cameraLink').href=`${root.baseUrl}/VXP/camera/?experience=${encodeURIComponent(exp.id)}`;$('wallLink').href=`${root.baseUrl}/VXP/wall/?experience=${encodeURIComponent(exp.id)}`;$('claimLink').href=claimUrl(null);document.body.style.setProperty('--bg-img',exp.backgroundImage?`url("${exp.backgroundImage}")`:'none');const grid=$('grid'),spinner=$('spinner'),message=$('message');function esc(s){return String(s||'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]))}function attUrl(a){return a&&a.thumbnails&&a.thumbnails.large&&a.thumbnails.large.url||a&&a.url||''}function first(v){return Array.isArray(v)&&v.length?attUrl(v[0]):''}function newest(v){return Array.isArray(v)&&v.length?attUrl(v[v.length-1]):''}function imgsFromRecord(rec){const f=rec.fields||{};return (exp.fields||[]).map((fid,i)=>({url:exp.layout==='single'?newest(f[fid]):first(f[fid]),caption:(exp.captions||[])[i]||exp.label})).filter(x=>x.url)}function authHeaders(){const h={};h[['Author','ization'].join('')]=['Bear','er '].join('')+AT.token;return h}async function airtableGet(url){const res=await fetch(url,{headers:authHeaders()});if(!res.ok)throw new Error('Airtable returned '+res.status);return res.json()}async function fetchRecordById(id){return airtableGet(`https://api.airtable.com/v0/${AT.baseId}/${AT.tableId}/${encodeURIComponent(id)}?returnFieldsByFieldId=true`)}async function fetchLatestAfter(){let records=[],offset=null;do{const url=`https://api.airtable.com/v0/${AT.baseId}/${AT.tableId}?pageSize=100&returnFieldsByFieldId=true`+(offset?`&offset=${encodeURIComponent(offset)}`:'');const data=await airtableGet(url);records=records.concat(data.records||[]);offset=data.offset||null}while(offset);const after=new Date(ts-120000);records.sort((a,b)=>new Date(b.createdTime)-new Date(a.createdTime));return records.find(r=>new Date(r.createdTime)>=after&&imgsFromRecord(r).length)}function render(rec,imgs){spinner.classList.add('hidden');message.textContent='Your image is ready.';grid.innerHTML=imgs.map(x=>`<div class="card"><img src="${esc(x.url)}" alt=""><div class="caption">${esc(x.caption)}</div></div>`).join('');showClaim(rec)}async function load(){try{const rec=recordId?await fetchRecordById(recordId):await fetchLatestAfter();if(rec){const imgs=imgsFromRecord(rec);if(imgs.length){render(rec,imgs);return}}spinner.classList.remove('hidden');message.textContent=exp.waitingMessage||'Still creating your image. This page will update automatically.'}catch(e){console.error(e);spinner.classList.remove('hidden');message.textContent='Still waiting for your photo. Refresh in a few seconds.'}}$('refresh').onclick=load;load();setInterval(load,8000);</script></body></html>
