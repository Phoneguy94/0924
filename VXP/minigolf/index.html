<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Mini Golf Score Keeper</title><style>*{box-sizing:border-box}body{margin:0;font-family:system-ui,-apple-system,Segoe UI,sans-serif;background:linear-gradient(145deg,#09251d,#0d3b2e);min-height:100vh;padding:14px;color:#10231d}.app{max-width:980px;margin:auto}header{text-align:center;color:white;margin:10px 0 16px}h1{font-size:clamp(2rem,8vw,4rem);margin:0}.card{background:white;border-radius:20px;padding:14px;margin:12px 0;box-shadow:0 14px 40px #0005}.players,.leaders{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}label{display:block;font-size:12px;font-weight:900;color:#5f726b;margin-bottom:5px;text-transform:uppercase}input{width:100%;border:2px solid #d6e7dd;border-radius:12px;padding:10px;font-size:16px;font-weight:800}input:focus{outline:0;border-color:#1fbf75}.controls{display:flex;gap:10px;justify-content:space-between;flex-wrap:wrap;align-items:center}.holebox{display:flex;gap:10px;align-items:center;font-weight:900}button{border:0;border-radius:999px;padding:12px 16px;font-weight:900;background:#1fbf75;color:white;font-size:15px}button.secondary{background:#e7f5ee;color:#118452}button.danger{background:#ffecec;color:#d94c4c}.tablewrap{overflow-x:auto;border:1px solid #d6e7dd;border-radius:16px}table{border-collapse:collapse;width:100%;min-width:720px}th,td{border-bottom:1px solid #d6e7dd;border-right:1px solid #d6e7dd;text-align:center;padding:8px}th{background:#e8fff3;color:#118452}th:first-child,td:first-child{position:sticky;left:0;background:white;text-align:left;font-weight:900;min-width:130px}th:first-child{background:#e8fff3}.total{background:#10231d!important;color:white!important;font-weight:1000}.score{width:48px!important;text-align:center;padding:8px!important}.leader{border:2px solid #d6e7dd;border-radius:16px;padding:12px;background:#fbfffd}.place{font-size:12px;color:#5f726b;font-weight:900;text-transform:uppercase}.lname{font-size:18px;font-weight:1000}.lscore{font-size:32px;font-weight:1000;color:#118452}.note{font-weight:700;color:#5f726b;font-size:14px}@media(max-width:760px){.players,.leaders{grid-template-columns:1fr 1fr}.controls>div{width:100%;justify-content:center}button{flex:1}}</style></head><body><main class="app"><header><h1>⛳ Mini Golf</h1><p>4-player score keeper</p></header><section class="card"><div class="players" id="players"></div><p class="note">Lowest score wins. Names and scores save on this device.</p></section><section class="card"><div class="controls"><div class="holebox"><button class="secondary" onclick="changeHoles(-1)">− Hole</button><span><span id="holes">18</span> Holes</span><button class="secondary" onclick="changeHoles(1)">+ Hole</button></div><div style="display:flex;gap:10px;flex-wrap:wrap"><button onclick="fillEmpty()">Fill Empty with 3</button><button class="danger" onclick="resetScores()">Reset Scores</button></div></div></section><section class="card"><div class="leaders" id="leaders"></div></section><section class="card"><div class="tablewrap"><table id="table"></table></div></section></main><script>const KEY='miniGolfScoreKeeper.v3';let state=load();function fresh(){return{holes:18,players:[1,2,3,4].map(n=>({name:'Player '+n,scores:Array(18).fill('')}))}}function load(){try{let s=JSON.parse(localStorage.getItem(KEY));if(s&&s.players&&s.players.length===4)return s}catch(e){}return fresh()}function save(){localStorage.setItem(KEY,JSON.stringify(state))}function total(p){return p.scores.reduce((a,b)=>a+(Number(b)||0),0)}function esc(s){return String(s).replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'",'&#039;')}function suffix(n){return n==1?'st':n==2?'nd':n==3?'rd':'th'}function renderPlayers(){players.innerHTML=state.players.map((p,i)=>`<div><label>Player ${i+1}</label><input value="${esc(p.name)}" oninput="nameIt(${i},this.value)"></div>`).join('')}function renderLeaders(){let r=state.players.map(p=>({name:p.name,total:total(p)})).sort((a,b)=>a.total-b.total);leaders.innerHTML=r.map((p,i)=>`<div class="leader"><div class="place">${i+1}${suffix(i+1)} Place</div><div class="lname">${esc(p.name)}</div><div class="lscore">${p.total}</div></div>`).join('')}function renderTable(){holes.textContent=state.holes;let html='<thead><tr><th>Player</th>';for(let h=1;h<=state.holes;h++)html+=`<th>${h}</th>`;html+='<th class="total">Total</th></tr></thead><tbody>';state.players.forEach((p,pi)=>{html+=`<tr><td>${esc(p.name)}</td>`;for(let h=0;h<state.holes;h++)html+=`<td><input class="score" type="number" min="1" max="20" inputmode="numeric" value="${p.scores[h]||''}" onchange="scoreIt(${pi},${h},this.value)"></td>`;html+=`<td class="total">${total(p)}</td></tr>`});table.innerHTML=html+'</tbody>'}function render(){renderPlayers();renderLeaders();renderTable()}function nameIt(i,v){state.players[i].name=v||'Player '+(i+1);save();renderLeaders();renderTable()}function scoreIt(pi,h,v){state.players[pi].scores[h]=v===''?'':Math.max(1,Math.min(20,Number(v)||1));save();renderLeaders();renderTable()}function changeHoles(d){let n=Math.max(1,Math.min(36,state.holes+d));state.holes=n;state.players.forEach(p=>{while(p.scores.length<n)p.scores.push('');p.scores=p.scores.slice(0,n)});save();render()}function fillEmpty(){state.players.forEach(p=>{for(let i=0;i<state.holes;i++)if(p.scores[i]==='')p.scores[i]=3});save();renderLeaders();renderTable()}function resetScores(){if(!confirm('Reset all scores? Player names will stay.'))return;state.players.forEach(p=>p.scores=Array(state.holes).fill(''));save();renderLeaders();renderTable()}render();</script></body></html>
