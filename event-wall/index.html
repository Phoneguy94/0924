<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Event Wall — Demo Mode</title>
<style>
  :root{
    --ink:#0B1A2B; --chalk:#F4F1E8; --gold:#E8B84B;
    --line:rgba(244,241,232,.14); --accent:#2E86DE;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;overflow:hidden;}
  body{
    background:
      linear-gradient(rgba(8,18,32,.74), rgba(6,15,26,.86)),
      var(--bg-img, none) center center / cover no-repeat,
      #0B1A2B;
    font-family:"Inter","Segoe UI",system-ui,sans-serif;
    color:var(--chalk); height:100vh;
    display:flex; flex-direction:column;
    user-select:none; -webkit-user-select:none;
  }
  body::before{
    content:""; position:fixed; inset:0; pointer-events:none;
    background:
      radial-gradient(60% 40% at 12% 0%, color-mix(in srgb, var(--accent) 20%, transparent), transparent 60%),
      radial-gradient(60% 40% at 88% 0%, color-mix(in srgb, var(--accent) 20%, transparent), transparent 60%);
  }
  header{ flex:0 0 auto; text-align:center; padding:2.1vh 2vw .8vh; position:relative; z-index:3; }
  .eyebrow{ font-size:1.45vh; letter-spacing:.42em; text-transform:uppercase; color:var(--gold); font-weight:700; margin-bottom:.55vh; }
  h1{ font-family:"Georgia","Times New Roman",serif; font-weight:800; font-style:italic; font-size:4vh; line-height:1; text-shadow:0 2px 0 rgba(0,0,0,.35); }
  h1 .accent{ color:var(--accent); }
  .controls{ display:flex; gap:1vw; align-items:center; justify-content:center; margin-top:1vh; }
  .controls.hidden{ display:none; }
  .controls select{ font:inherit; font-size:1.7vh; padding:.6vh 1vw; border-radius:9px; background:rgba(255,255,255,.08); color:var(--chalk); border:1px solid var(--line); cursor:pointer; }
  .controls select option{ color:#111; }
  .controls .toggle{ font-size:1.5vh; padding:.6vh 1vw; border-radius:9px; background:rgba(255,255,255,.06); border:1px solid var(--line); color:var(--chalk); cursor:pointer; }
  .controls .toggle.on{ background:color-mix(in srgb, var(--accent) 30%, transparent); border-color:var(--accent); }

  .stage{ flex:1 1 auto; position:relative; overflow:hidden; display:flex; align-items:center; justify-content:center; }
  .track{ position:absolute; inset:0; }
  .entry{
    position:absolute; left:50%; top:50%; transform-origin:center center;
    transition:transform .5s cubic-bezier(.22,.61,.36,1), opacity .5s ease, filter .5s ease;
    display:flex; align-items:center; gap:1.2vw; will-change:transform,opacity;
  }
  .entry .card{ height:64vh; aspect-ratio:864 / 1320; border-radius:14px; background:var(--chalk); padding:1.1vh; box-shadow:0 24px 48px rgba(0,0,0,.55); overflow:hidden; }
  .entry .card .photo{ width:100%; height:100%; border-radius:8px; object-fit:cover; display:block; background:#0c1722; border:1px solid rgba(0,0,0,.12); }
  .entry .qr{ width:26vh; background:var(--chalk); border-radius:14px; padding:1.8vh; box-shadow:0 24px 48px rgba(0,0,0,.55); display:flex; flex-direction:column; align-items:center; gap:1.2vh; opacity:0; transition:opacity .5s ease; }
  .entry.focus .qr{ opacity:1; }
  .entry .qr img{ width:100%; aspect-ratio:1/1; object-fit:contain; background:#fff; border-radius:8px; }
  .entry .qr .cap{ font-family:"Georgia",serif; font-style:italic; color:var(--ink); font-size:1.6vh; text-align:center; line-height:1.2; }
  .entry .qr.empty{ display:none; }

  /* WebexOne target layout: three premium cards together, no QR beside it */
  .entry.webex{ gap:3.2vw; }
  .entry.webex .card{
    height:70vh; aspect-ratio:660 / 950; padding:1.15vh 1.15vh 2.3vh;
    border-radius:14px; display:flex; flex-direction:column; background:var(--chalk);
  }
  .entry.webex .card .photo{ height:auto; flex:1 1 auto; min-height:0; border-radius:8px; }
  .entry.webex .caption{
    color:#111b2c; font-family:"Georgia","Times New Roman",serif; font-weight:900; font-style:italic;
    font-size:2vh; letter-spacing:.02em; text-align:center; padding:1.1vh .4vh .2vh;
    white-space:nowrap;
  }
  .entry.webex .caption::before,.entry.webex .caption::after{ content:"●"; color:#D45A13; font-family:system-ui,sans-serif; font-style:normal; font-size:1.5vh; margin:0 .7vh; }
  .entry.webex .qr{ display:none; }

  .entry.focus{ z-index:10; }
  .entry.side{ filter:grayscale(.85) brightness(.58); z-index:5; }
  .entry.far{ filter:grayscale(1) brightness(.42); z-index:2; }
  .nav{ position:absolute; top:50%; transform:translateY(-50%); z-index:20; width:6vh; height:6vh; border-radius:50%; display:flex; align-items:center; justify-content:center; background:rgba(0,0,0,.35); border:1px solid var(--line); color:var(--chalk); font-size:3vh; cursor:pointer; backdrop-filter:blur(4px); }
  .nav:hover{ background:rgba(0,0,0,.6); }
  .nav.prev{ left:2.5vw; } .nav.next{ right:2.5vw; }
  .nav.hidden{ display:none; }
  footer{ flex:0 0 auto; display:flex; align-items:center; justify-content:center; gap:1.4vw; padding:1.1vh 2vw 2vh; position:relative; z-index:3; }
  .dots{ display:flex; gap:.7vh; flex-wrap:wrap; max-width:60vw; justify-content:center; }
  .dots i{ width:1.1vh; height:1.1vh; border-radius:50%; background:var(--line); display:block; transition:background .4s,transform .4s; }
  .dots i.on{ background:var(--accent); transform:scale(1.4); }
  .brand{ font-size:1.4vh; letter-spacing:.3em; text-transform:uppercase; color:rgba(244,241,232,.45); font-weight:600; }
  .msg{ position:absolute; inset:0; display:flex; align-items:center; justify-content:center; flex-direction:column; gap:1.2vh; text-align:center; z-index:60; font-size:2.2vh; color:rgba(244,241,232,.7); padding:0 8vw; }
  .msg .big{ font-family:"Georgia",serif; font-style:italic; font-size:3.4vh; color:var(--chalk); }
  .hidden{ display:none !important; }
  @media (prefers-reduced-motion: reduce){ .entry{ transition:opacity .3s ease; } }
</style>
</head>
<body>
  <header>
    <div class="eyebrow" id="eyebrow">Live</div>
    <h1 id="title">Event <span class="accent">Wall</span></h1>
    <div class="controls hidden" id="controls">
      <select id="eventSelect"></select>
      <button class="toggle" id="rotateToggle">Auto-rotate: off</button>
    </div>
  </header>

  <div class="stage" id="stage">
    <div class="nav prev hidden" id="prev">‹</div>
    <div class="track" id="track"></div>
    <div class="nav next hidden" id="next">›</div>
    <div class="msg" id="loading"><div class="big">Loading…</div><div>Fetching the latest demo images</div></div>
    <div class="msg hidden" id="empty"><div class="big">No entries yet</div><div>No populated image fields found for this event</div></div>
  </div>

  <footer>
    <div class="dots" id="dots"></div>
    <div class="brand">Powered by Webex</div>
  </footer>

<script>
/* ============================================================
   DEMO MODE: field-driven routing. The Event field is ignored.
   If a specific image field is populated, that record belongs to
   that event wall. Production event-name filtering comes later.
   ============================================================ */
const BASE_ID  = "appSxuH0GH10rxd5y";
const TABLE_ID = "tblI7llQH93Xkin3O";
const QR_FIELD = "fld2Ehe0YS7e6W6jm";

const F = {
  MLB:        "fldvQvP6xGTCpB71A",
  WebexOne_1: "fld7W7JS6XPIZLoMp",
  WebexOne_2: "fld6ejAJTGpRuztwp",
  WebexOne_3: "fldJ4mNylPdtD8u14",
  NBA_Card:   "fldUDkaG8rZwL4Dk4"
};

const EVENTS = {
  MLB: {
    label:"MLB", accent:"#FDB827", bg:"Kiosk_background.png", type:"single",
    fields:[F.MLB]
  },
  NBA: {
    label:"NBA", accent:"#C8102E", bg:"", type:"single",
    fields:[F.NBA_Card]
  },
  WebexOne: {
    label:"WebexOne Austin 2026", accent:"#FFD400", bg:"", type:"webex3",
    fields:[F.WebexOne_1, F.WebexOne_2, F.WebexOne_3],
    captions:["Drone Show Activated", "DJ Set In-Progress", "Showtime"]
  }
};

const ROTATE_MS = 10000;
const REFRESH_MS = 60000;
const MASTER_EVENT_MS = 20000;
const AIRTABLE_TOKEN = "PASTE_READ_ONLY_AIRTABLE_PAT_HERE";
/* ============================================================ */

const params = new URLSearchParams(location.search);
const rawEvent = (params.get("event") || "ALL").trim();
const normalized = normalizeEvent(rawEvent);
const isMaster = normalized === "ALL";
let currentEvent = normalized;

const trackEl = document.getElementById("track");
const dotsBox = document.getElementById("dots");
const loadingEl = document.getElementById("loading");
const emptyEl = document.getElementById("empty");
const prevBtn = document.getElementById("prev");
const nextBtn = document.getElementById("next");
const controls = document.getElementById("controls");
const eventSel = document.getElementById("eventSelect");
const rotToggle = document.getElementById("rotateToggle");
const titleEl = document.getElementById("title");
const eyebrowEl = document.getElementById("eyebrow");

let people = [];
let cur = 0;
let rotateTimer = null, masterTimer = null, masterRotateOn = false;
const API = `https://api.airtable.com/v0/${BASE_ID}/${TABLE_ID}?pageSize=100&returnFieldsByFieldId=true`;

function normalizeEvent(value){
  const v = String(value || "").toLowerCase();
  if(!v || v === "all") return "ALL";
  if(v.includes("webex")) return "WebexOne";
  if(v.includes("nba") || v.includes("basketball") || v.includes("magic")) return "NBA";
  if(v.includes("mlb") || v.includes("baseball") || v.includes("pirates") || v.includes("pittsburgh")) return "MLB";
  return "ALL";
}
function esc(s){ return String(s || "").replace(/[&<>'"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;","'":"&#39;","\"":"&quot;"}[c])); }
function attUrl(a){ return (a && a.thumbnails && a.thumbnails.large && a.thumbnails.large.url) || (a && a.url) || ""; }
function newestAttachmentUrl(fieldValue){
  if(!Array.isArray(fieldValue) || !fieldValue.length) return "";
  return attUrl(fieldValue[fieldValue.length - 1]);
}
function firstAttachmentUrl(fieldValue){
  if(!Array.isArray(fieldValue) || !fieldValue.length) return "";
  return attUrl(fieldValue[0]);
}
function themeFor(key){ return key === "ALL" ? {label:"All Events", accent:"#2E86DE", bg:""} : EVENTS[key]; }
function applyTheme(key){
  const c = themeFor(key) || themeFor("ALL");
  document.documentElement.style.setProperty("--accent", c.accent);
  document.body.style.setProperty("--bg-img", c.bg ? `url("${c.bg}")` : "none");
  eyebrowEl.textContent = `${c.label} · Live`;
  titleEl.innerHTML = key === "ALL" ? `All <span class="accent">Events</span>` : `${esc(c.label)} <span class="accent">Wall</span>`;
}

function entryFromRecord(rec, eventKey){
  const cfg = EVENTS[eventKey];
  const f = rec.fields || {};
  const qr = typeof f[QR_FIELD] === "string" ? f[QR_FIELD] : "";

  if(cfg.type === "webex3"){
    const imgs = cfg.fields.map(fid => firstAttachmentUrl(f[fid])).filter(Boolean);
    if(!imgs.length) return null;
    return { eventKey, layout:"webex", imgs, captions:cfg.captions, qr, createdTime:rec.createdTime };
  }

  const img = newestAttachmentUrl(f[cfg.fields[0]]);
  if(!img) return null;
  return { eventKey, layout:"single", imgs:[img], captions:[], qr, createdTime:rec.createdTime };
}

function entriesForRecord(rec){
  if(currentEvent !== "ALL"){
    const one = entryFromRecord(rec, currentEvent);
    return one ? [one] : [];
  }
  const out = [];
  for(const key of Object.keys(EVENTS)){
    const one = entryFromRecord(rec, key);
    if(one) out.push(one);
  }
  return out;
}

async function fetchPeople(){
  try{
    if(!AIRTABLE_TOKEN || AIRTABLE_TOKEN.includes("PASTE_READ_ONLY")){
      throw new Error("Missing Airtable token. Paste your read-only PAT into AIRTABLE_TOKEN.");
    }
    let records = [], offset = null;
    do{
      const url = API + (offset ? `&offset=${encodeURIComponent(offset)}` : "");
      const res = await fetch(url, { headers:{ Authorization:`Bearer ${AIRTABLE_TOKEN}` }});
      if(!res.ok) throw new Error(`Airtable returned ${res.status}`);
      const data = await res.json();
      records = records.concat(data.records || []);
      offset = data.offset || null;
    } while(offset);

    records.sort((a,b)=> new Date(b.createdTime) - new Date(a.createdTime));
    const out = [];
    for(const rec of records) out.push(...entriesForRecord(rec));
    return out;
  }catch(e){ console.error(e); return { error:e.message || String(e) }; }
}

function singleEntryHTML(p){
  const cards = p.imgs.map(u=>`<div class="card"><img class="photo" src="${esc(u)}" alt="" loading="eager"></div>`).join("");
  const qr = p.qr ? `<div class="qr"><img src="${esc(p.qr)}" alt="QR"><div class="cap">Scan to get yours</div></div>` : `<div class="qr empty"></div>`;
  return cards + qr;
}
function webexEntryHTML(p){
  return p.imgs.map((u,i)=>{
    const cap = p.captions[i] || "WebexOne Experience";
    return `<div class="card"><img class="photo" src="${esc(u)}" alt="" loading="eager"><div class="caption">${esc(cap)}</div></div>`;
  }).join("");
}
function entryHTML(p){ return p.layout === "webex" ? webexEntryHTML(p) : singleEntryHTML(p); }

function layout(){
  const nodes = [...trackEl.children];
  const n = people.length;
  nodes.forEach((node,i)=>{
    let d = i - cur;
    if(n > 2){ if(d > n/2) d -= n; if(d < -n/2) d += n; }
    const ad = Math.abs(d);
    node.classList.remove("focus","side","far");
    if(d===0) node.classList.add("focus");
    else if(ad===1) node.classList.add("side");
    else node.classList.add("far");
    const x = d * 24;
    const scale = d===0 ? 1 : (ad===1 ? .78 : .62);
    node.style.transform = `translate(-50%,-50%) translateX(${x}vw) scale(${scale})`;
    node.style.opacity = ad>2 ? 0 : 1;
  });
  [...dotsBox.children].forEach((dot,i)=>dot.classList.toggle("on", i===cur));
}
function renderAll(){
  trackEl.innerHTML = people.map(p=>`<div class="entry ${p.layout === "webex" ? "webex" : "single"}">${entryHTML(p)}</div>`).join("");
  [...trackEl.children].forEach((node,i)=> node.addEventListener("click", ()=>{ if(i!==cur){ cur=i; layout(); restartRotation(); }}));
  layout();
}
function buildDots(){ dotsBox.innerHTML=""; people.forEach(()=>dotsBox.appendChild(document.createElement("i"))); }
function advance(){ if(people.length<=1) return; cur=(cur+1)%people.length; layout(); }
function go(dir){ if(people.length<=1) return; const n=people.length; cur=(cur+dir+n)%n; layout(); restartRotation(); }
function restartRotation(){ clearInterval(rotateTimer); if(people.length>1) rotateTimer=setInterval(advance, ROTATE_MS); }

document.addEventListener("keydown",(e)=>{ if(e.key==="ArrowRight"){ go(1); e.preventDefault(); } else if(e.key==="ArrowLeft"){ go(-1); e.preventDefault(); }});
(function(){
  const stage=document.getElementById("stage"); let x0=null,y0=null; const T=40;
  stage.addEventListener("touchstart",(e)=>{const t=e.changedTouches[0];x0=t.clientX;y0=t.clientY;},{passive:true});
  stage.addEventListener("touchend",(e)=>{ if(x0===null)return; const t=e.changedTouches[0]; const dx=t.clientX-x0, dy=t.clientY-y0; if(Math.abs(dx)>T && Math.abs(dx)>Math.abs(dy)) go(dx<0?1:-1); x0=y0=null; },{passive:true});
})();
prevBtn.addEventListener("click",()=>go(-1));
nextBtn.addEventListener("click",()=>go(1));

function showStage(){
  loadingEl.classList.add("hidden");
  emptyEl.classList.toggle("hidden", people.length>0);
  const many = people.length>1;
  prevBtn.classList.toggle("hidden", !many);
  nextBtn.classList.toggle("hidden", !many);
}
async function load(initial){
  const next = await fetchPeople();
  if(next && next.error){
    if(initial) loadingEl.innerHTML = `<div class="big">Can’t reach Airtable</div><div>${esc(next.error)}</div>`;
    return;
  }
  people = next || [];
  if(cur >= people.length) cur = 0;
  buildDots(); renderAll(); restartRotation(); showStage();
}
function setupMaster(){
  controls.classList.remove("hidden");
  const keys = Object.keys(EVENTS);
  eventSel.innerHTML = [`<option value="ALL">All Events</option>`].concat(keys.map(k=>`<option value="${k}">${EVENTS[k].label}</option>`)).join("");
  eventSel.value = currentEvent;
  eventSel.addEventListener("change",()=>{ currentEvent = eventSel.value; applyTheme(currentEvent); cur=0; loadingEl.classList.remove("hidden"); load(false); });
  rotToggle.addEventListener("click",()=>{
    masterRotateOn = !masterRotateOn;
    rotToggle.classList.toggle("on", masterRotateOn);
    rotToggle.textContent = `Auto-rotate: ${masterRotateOn?"on":"off"}`;
    clearInterval(masterTimer);
    if(masterRotateOn){
      const order = ["ALL", ...keys];
      masterTimer = setInterval(()=>{ let i = order.indexOf(currentEvent); currentEvent = order[(i+1)%order.length]; eventSel.value = currentEvent; applyTheme(currentEvent); cur=0; load(false); }, MASTER_EVENT_MS);
    }
  });
}
applyTheme(currentEvent);
if(isMaster) setupMaster();
load(true);
setInterval(()=>load(false), REFRESH_MS);
</script>
</body>
</html>
