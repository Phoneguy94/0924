<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Event Wall</title><style>:root{--ink:#0B1A2B;--chalk:#F4F1E8;--gold:#E8B84B;--line:rgba(244,241,232,.14);--accent:#2E86DE}*{box-sizing:border-box;margin:0;padding:0}html,body{height:100%;overflow:hidden}body{background:linear-gradient(rgba(8,18,32,.74),rgba(6,15,26,.86)),var(--bg-img,none) center/cover no-repeat,#0B1A2B;font-family:Inter,Segoe UI,system-ui,sans-serif;color:var(--chalk);height:100vh;display:flex;flex-direction:column;user-select:none}body:before{content:"";position:fixed;inset:0;pointer-events:none;background:radial-gradient(60% 40% at 12% 0%,color-mix(in srgb,var(--accent) 20%,transparent),transparent 60%),radial-gradient(60% 40% at 88% 0%,color-mix(in srgb,var(--accent) 20%,transparent),transparent 60%)}header{flex:0 0 auto;text-align:center;padding:2.1vh 2vw .8vh;position:relative;z-index:3}.eyebrow{font-size:1.45vh;letter-spacing:.42em;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:.55vh}h1{font-family:Georgia,serif;font-weight:800;font-style:italic;font-size:4vh;line-height:1;text-shadow:0 2px 0 rgba(0,0,0,.35)}h1 .accent{color:var(--accent)}.controls{display:flex;gap:1vw;align-items:center;justify-content:center;margin-top:1vh}.controls.hidden{display:none}.controls select,.controls .toggle{font:inherit;font-size:1.7vh;padding:.6vh 1vw;border-radius:9px;background:rgba(255,255,255,.08);color:var(--chalk);border:1px solid var(--line);cursor:pointer}.controls select option{color:#111}.controls .toggle{font-size:1.5vh}.controls .toggle.on{background:color-mix(in srgb,var(--accent) 30%,transparent);border-color:var(--accent)}.stage{flex:1 1 auto;position:relative;overflow:hidden}.track{position:absolute;inset:0}.entry{position:absolute;left:50%;top:50%;transform-origin:center;transition:transform .5s cubic-bezier(.22,.61,.36,1),opacity .5s ease,filter .5s ease;display:flex;align-items:center;gap:1.2vw}.entry .card{height:68vh;aspect-ratio:864/1320;border-radius:14px;background:var(--chalk);padding:1.1vh;box-shadow:0 24px 48px rgba(0,0,0,.55);overflow:hidden}.entry .photo{width:100%;height:100%;border-radius:8px;object-fit:cover;display:block;background:#0c1722;border:1px solid rgba(0,0,0,.12)}.qr{width:28vh;background:var(--chalk);border-radius:14px;padding:1.8vh;box-shadow:0 24px 48px rgba(0,0,0,.55);display:flex;flex-direction:column;align-items:center;gap:1.2vh;opacity:0;transition:opacity .5s}.focus .qr{opacity:1;width:30vh}.qr img{width:100%;aspect-ratio:1/1;object-fit:contain;background:#fff;border-radius:8px}.qr .cap{font-family:Georgia,serif;font-style:italic;color:var(--ink);font-size:1.6vh;text-align:center}.qr.empty{display:none}.focus{z-index:10}.side{filter:grayscale(.85) brightness(.58);z-index:5}.far{filter:grayscale(1) brightness(.42);z-index:2}.nav{position:absolute;top:50%;transform:translateY(-50%);z-index:20;width:6vh;height:6vh;border-radius:50%;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.35);border:1px solid var(--line);color:var(--chalk);font-size:3vh;cursor:pointer}.nav.prev{left:2.5vw}.nav.next{right:2.5vw}.nav.hidden{display:none}footer{flex:0 0 auto;display:flex;align-items:center;justify-content:center;gap:1.4vw;padding:1.1vh 2vw 2vh;position:relative;z-index:3}.dots{display:flex;gap:.7vh;flex-wrap:wrap;max-width:60vw;justify-content:center}.dots i{width:1.1vh;height:1.1vh;border-radius:50%;background:var(--line);display:block}.dots i.on{background:var(--accent);transform:scale(1.4)}.brand{font-size:1.4vh;letter-spacing:.3em;text-transform:uppercase;color:rgba(244,241,232,.45);font-weight:600}.msg{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:1.2vh;text-align:center;z-index:60;font-size:2.2vh;color:rgba(244,241,232,.7);padding:0 8vw}.msg .big{font-family:Georgia,serif;font-style:italic;font-size:3.4vh;color:var(--chalk)}.hidden{display:none!important}@media(max-width:700px),(max-height:520px) and (orientation:landscape){html,body{position:fixed;inset:0;width:100%;min-height:100%;overflow:hidden}body{height:100svh}.entry{gap:0;flex-direction:column}.entry .card{height:auto;width:min(74vw,39svh);max-height:58svh;aspect-ratio:864/1320;padding:.75svh}.entry.single .qr{position:absolute;right:calc(50% - min(74vw,39svh)/2 + .7svh);bottom:calc(50% - 58svh/2 + .8svh);width:min(24vw,9.5svh);padding:.45svh;border-radius:8px;gap:.25svh;opacity:0}.entry.single.focus .qr{width:min(24vw,9.5svh);opacity:1}.entry.single .qr .cap{font-size:.75svh;white-space:nowrap}header{padding:1.25svh 4vw .55svh}.eyebrow{font-size:1.15svh;letter-spacing:.26em}h1{font-size:2.65svh}.controls select,.controls .toggle{font-size:1.25svh;padding:.55svh 2vw}.nav{width:4.8svh;height:4.8svh;font-size:2.8svh}.brand{font-size:1.05svh;letter-spacing:.18em}}</style></head><body><header><div class="eyebrow" id="eyebrow">Live</div><h1 id="title">Event <span class="accent">Wall</span></h1><div class="controls hidden" id="controls"><select id="eventSelect"></select><button class="toggle" id="rotateToggle">Auto-rotate: off</button></div></header><div class="stage" id="stage"><div class="nav prev hidden" id="prev">‹</div><div class="track" id="track"></div><div class="nav next hidden" id="next">›</div><div class="msg" id="loading"><div class="big">Loading…</div><div>Fetching the latest demo images</div></div><div class="msg hidden" id="empty"><div class="big">No entries yet</div><div>No populated image fields found for this event</div></div></div><footer><div class="dots" id="dots"></div><div class="brand">Powered by Webex</div></footer><script>const BASE_ID="appSxuH0GH10rxd5y",TABLE_ID="tblI7llQH93Xkin3O",QR_FIELD="fld2Ehe0YS7e6W6jm";const F={MLB:"fldvQvP6xGTCpB71A",WebexOne:"fld7W7JS6XPIZLoMp",NBA_Card:"fldUDkaG8rZwL4Dk4",FLGISA:"fldgormjiaZzb2amU",USA250:"fldoj4Im2cUcxua5D"};const EVENTS={MLB:{label:"MLB",accent:"#2E86DE",bg:"https://phoneguy94.github.io/0924/VXP/assets/backgrounds/mlb.png",fields:[F.MLB]},NBA:{label:"NBA",accent:"#C8102E",bg:"https://phoneguy94.github.io/0924/VXP/assets/backgrounds/nba.png",fields:[F.NBA_Card]},FLGISA:{label:"FLGISA Florida Hero",accent:"#2ECC71",bg:"https://phoneguy94.github.io/0924/VXP/assets/backgrounds/flgisa.png",fields:[F.FLGISA]},WebexOne:{label:"WebexOne Austin 2026",accent:"#FFD400",bg:"https://phoneguy94.github.io/0924/VXP/assets/backgrounds/webexone.png",fields:[F.WebexOne]},USA250:{label:"USA250",accent:"#B23A48",bg:"https://phoneguy94.github.io/0924/VXP/assets/backgrounds/usa250.png",fields:[F.USA250]}};const ROTATE_MS=10000,MAX_WALL_ENTRIES=500,REFRESH_MS=30000,MASTER_EVENT_MS=20000,OLD="https://raw.githubusercontent.com/Phoneguy94/0924/1f7e0430f3b5655cb27dde308e47851495ed2005/event-wall/index.html";let AIRTABLE_TOKEN="",people=[],cur=0,rotateTimer=null,masterTimer=null,masterRotateOn=false;const params=new URLSearchParams(location.search),rawEvent=(params.get("event")||"ALL").trim(),normalized=normalizeEvent(rawEvent),isMaster=normalized==="ALL";let currentEvent=normalized;const trackEl=document.getElementById("track"),dotsBox=document.getElementById("dots"),loadingEl=document.getElementById("loading"),emptyEl=document.getElementById("empty"),prevBtn=document.getElementById("prev"),nextBtn=document.getElementById("next"),controls=document.getElementById("controls"),eventSel=document.getElementById("eventSelect"),rotToggle=document.getElementById("rotateToggle"),titleEl=document.getElementById("title"),eyebrowEl=document.getElementById("eyebrow");function normalizeEvent(v){v=String(v||"").toLowerCase();if(!v||v==="all")return"ALL";if(v.includes("flgisa")||v.includes("florida")||v.includes("gisa"))return"FLGISA";if(v.includes("webex"))return"WebexOne";if(v.includes("usa250")||v.includes("usa")||v.includes("america250")||v.includes("july4")||v.includes("fourth"))return"USA250";if(v.includes("nba")||v.includes("basketball")||v.includes("magic"))return"NBA";if(v.includes("mlb")||v.includes("baseball")||v.includes("pirates")||v.includes("pittsburgh"))return"MLB";return"ALL"}function esc(s){return String(s||"").replace(/[&<>'"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","'":"&#39;","\"":"&quot;"}[c]))}function attUrl(a){return a&&a.thumbnails&&a.thumbnails.large&&a.thumbnails.large.url||a&&a.url||""}function newestAttachmentUrl(v){return Array.isArray(v)&&v.length?attUrl(v[v.length-1]):""}async function getToken(){const txt=await(await fetch(OLD)).text();const m=txt.match(/AIRTABLE_TOKEN\s*=\s*"([^"]+)"/);if(!m)throw new Error("Missing token");AIRTABLE_TOKEN=m[1]}function applyTheme(k){const c=k==="ALL"?{label:"All Events",accent:"#2E86DE",bg:""}:EVENTS[k];document.documentElement.style.setProperty("--accent",c.accent);document.body.style.setProperty("--bg-img",c.bg?`url("${c.bg}")`:"none");eyebrowEl.textContent=`${c.label} · Live`;titleEl.innerHTML=k==="ALL"?`All <span class="accent">Events</span>`:`${esc(c.label)} <span class="accent">Wall</span>`}function entryFromRecord(rec,k){const cfg=EVENTS[k],f=rec.fields||{},qr=typeof f[QR_FIELD]==="string"?f[QR_FIELD]:"",img=newestAttachmentUrl(f[cfg.fields[0]]);return img?{eventKey:k,imgs:[img],qr,createdTime:rec.createdTime}:null}function entriesForRecord(rec){if(currentEvent!=="ALL"){const one=entryFromRecord(rec,currentEvent);return one?[one]:[]}const out=[];for(const k of Object.keys(EVENTS)){const one=entryFromRecord(rec,k);if(one)out.push(one)}return out}async function fetchPeople(){try{let records=[],offset=null,API=`https://api.airtable.com/v0/${BASE_ID}/${TABLE_ID}?pageSize=100&returnFieldsByFieldId=true`;do{const url=API+(offset?`&offset=${encodeURIComponent(offset)}`:"");const res=await fetch(url,{headers:{Authorization:`Bearer ${AIRTABLE_TOKEN}`}});if(!res.ok)throw new Error(`Airtable returned ${res.status}`);const data=await res.json();records=records.concat(data.records||[]);offset=data.offset||null}while(offset);records.sort((a,b)=>new Date(b.createdTime)-new Date(a.createdTime));const out=[];for(const rec of records)out.push(...entriesForRecord(rec));out.sort((a,b)=>new Date(b.createdTime)-new Date(a.createdTime));return out.slice(0,MAX_WALL_ENTRIES)}catch(e){console.error(e);return{error:e.message||String(e)}}}function entryHTML(p){return p.imgs.map(u=>`<div class="card"><img class="photo" src="${esc(u)}" alt=""></div>`).join("")+(p.qr?`<div class="qr"><img src="${esc(p.qr)}"><div class="cap">Scan to claim your image</div></div>`:`<div class="qr empty"></div>`)}function mobile(){return matchMedia("(max-width:700px),(max-height:520px) and (orientation:landscape)").matches}function layout(){const nodes=[...trackEl.children],n=people.length,m=mobile();nodes.forEach((node,i)=>{let d=i-cur;if(n>2){if(d>n/2)d-=n;if(d<-n/2)d+=n}const ad=Math.abs(d);node.className="entry single "+(d===0?"focus":ad===1?"side":"far");const x=m?d*96:d*27,scale=m?(d===0?1:ad===1?.30:.18):(d===0?1.12:ad===1?.58:.38);node.style.transform=`translate(-50%,-50%) translateX(${x}vw) scale(${scale})`;node.style.opacity=m?(ad>1?0:d===0?1:.22):(ad>2?0:1)});[...dotsBox.children].forEach((dot,i)=>dot.classList.toggle("on",i===cur))}function render(){trackEl.innerHTML=people.map(p=>`<div class="entry single">${entryHTML(p)}</div>`).join("");[...trackEl.children].forEach((node,i)=>node.onclick=()=>{if(i!==cur){cur=i;layout();restart()}});layout()}function dots(){dotsBox.innerHTML="";people.forEach(()=>dotsBox.appendChild(document.createElement("i")))}function advance(){if(people.length>1){cur=(cur+1)%people.length;layout()}}function go(dir){if(people.length>1){cur=(cur+dir+people.length)%people.length;layout();restart()}}function restart(){clearInterval(rotateTimer);if(people.length>1)rotateTimer=setInterval(advance,ROTATE_MS)}prevBtn.onclick=()=>go(-1);nextBtn.onclick=()=>go(1);addEventListener("resize",layout);function show(){loadingEl.classList.add("hidden");emptyEl.classList.toggle("hidden",people.length>0);prevBtn.classList.toggle("hidden",people.length<=1);nextBtn.classList.toggle("hidden",people.length<=1)}function sig(list){return(list||[]).map(p=>`${p.eventKey}|${p.createdTime}|${p.imgs.join("|")}`).join("||")}async function load(initial){const old=sig(people),next=await fetchPeople();if(next&&next.error){if(initial)loadingEl.innerHTML=`<div class="big">Can’t reach Airtable</div><div>${esc(next.error)}</div>`;return}if(!initial&&sig(next)===old){show();return}people=next||[];cur=0;dots();render();restart();show()}function setupMaster(){controls.classList.remove("hidden");const keys=Object.keys(EVENTS);eventSel.innerHTML=[`<option value="ALL">All Events</option>`].concat(keys.map(k=>`<option value="${k}">${EVENTS[k].label}</option>`)).join("");eventSel.value=currentEvent;eventSel.onchange=()=>{currentEvent=eventSel.value;applyTheme(currentEvent);cur=0;loadingEl.classList.remove("hidden");load(false)};rotToggle.onclick=()=>{masterRotateOn=!masterRotateOn;rotToggle.classList.toggle("on",masterRotateOn);rotToggle.textContent=`Auto-rotate: ${masterRotateOn?"on":"off"}`;clearInterval(masterTimer);if(masterRotateOn){const order=["ALL",...keys];masterTimer=setInterval(()=>{let i=order.indexOf(currentEvent);currentEvent=order[(i+1)%order.length];eventSel.value=currentEvent;applyTheme(currentEvent);cur=0;load(false)},MASTER_EVENT_MS)}}}applyTheme(currentEvent);if(isMaster)setupMaster();getToken().then(()=>{load(true);setInterval(()=>load(false),REFRESH_MS)}).catch(e=>{loadingEl.innerHTML=`<div class="big">Can’t start wall</div><div>${esc(e.message)}</div>`});</script></body></html>
