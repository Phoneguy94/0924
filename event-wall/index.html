<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>VXP Wall</title><style>:root{--accent:#58F2A6;--stage-w:min(100vw,calc(100vh * 16 / 9));--stage-h:min(100vh,calc(100vw * 9 / 16));--stage-left:calc((100vw - var(--stage-w))/2);--stage-top:calc((100vh - var(--stage-h))/2);--chalk:#F4F1E8;--ink:#061326}*{box-sizing:border-box;margin:0;padding:0}html,body{width:100%;height:100%;overflow:hidden;background:#061326;font-family:Inter,"Segoe UI",system-ui,sans-serif;color:var(--chalk);user-select:none}body:before{content:"";position:fixed;left:var(--stage-left);top:var(--stage-top);width:var(--stage-w);height:var(--stage-h);background:url("../assets/backgrounds/flgisa-kiosk-main.png") center/100% 100% no-repeat;z-index:0;pointer-events:none}.wall{position:fixed;left:var(--stage-left);top:var(--stage-top);width:var(--stage-w);height:var(--stage-h);overflow:hidden;z-index:1}.slot{position:absolute;transform:translate(-50%,-50%);transition:opacity .55s ease,filter .55s ease,transform .72s cubic-bezier(.19,1,.22,1);display:flex;align-items:center;justify-content:center}.slot.hero{left:50%;top:54%;z-index:20}.slot.tl{left:18%;top:31%;z-index:8}.slot.tr{left:82%;top:31%;z-index:8}.slot.bl{left:18%;top:80%;z-index:8}.slot.br{left:82%;top:80%;z-index:8}.slot.side-left{left:24%;top:54%;z-index:8}.slot.side-right{left:76%;top:54%;z-index:8}.card{position:relative;width:calc(var(--stage-w) * .278);aspect-ratio:864/1320;border-radius:calc(var(--stage-w) * .011);background:#f4f1e8;padding:calc(var(--stage-w) * .006);box-shadow:0 calc(var(--stage-w) * .018) calc(var(--stage-w) * .040) rgba(0,0,0,.58),0 0 calc(var(--stage-w) * .017) rgba(88,242,166,.22);overflow:hidden}.hero .card{width:calc(var(--stage-w) * .300);box-shadow:0 calc(var(--stage-w) * .022) calc(var(--stage-w) * .052) rgba(0,0,0,.68),0 0 calc(var(--stage-w) * .032) rgba(88,242,166,.44),0 0 0 1px rgba(255,255,255,.12);will-change:opacity,transform}.corner .card{width:calc(var(--stage-w) * .138);filter:grayscale(.58) brightness(.70) saturate(.82);opacity:.76}.side .card{width:calc(var(--stage-w) * .173);filter:grayscale(.68) brightness(.62);opacity:.78}.photo{width:100%;height:100%;display:block;object-fit:cover;border-radius:calc(var(--stage-w) * .007);background:#071827}.nav{position:absolute;top:54.5%;transform:translateY(-50%);z-index:30;width:calc(var(--stage-w) * .04);height:calc(var(--stage-w) * .04);border-radius:50%;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.18);border:1px solid rgba(88,242,166,.18);color:rgba(244,241,232,.55);font-size:calc(var(--stage-w) * .024);cursor:pointer;backdrop-filter:blur(4px);transition:opacity .4s ease,background .25s ease,color .25s ease}.nav:hover{background:rgba(0,0,0,.4);color:#fff}.nav.prev{left:calc(var(--stage-w) * .030)}.nav.next{right:calc(var(--stage-w) * .030)}.nav.hidden{display:none}.dots{position:absolute;left:50%;bottom:calc(var(--stage-h) * .045);transform:translateX(-50%);display:flex;gap:calc(var(--stage-w) * .005);z-index:25;max-width:55%;flex-wrap:wrap;justify-content:center}.dots i{width:calc(var(--stage-w) * .0065);height:calc(var(--stage-w) * .0065);border-radius:50%;background:rgba(244,241,232,.20);transition:background .3s,transform .3s}.dots i.on{background:var(--accent);transform:scale(1.35)}.badge{position:absolute;right:calc(var(--stage-w) * .055);bottom:calc(var(--stage-h) * .080);z-index:25;font-size:clamp(13px,calc(var(--stage-w) * .011),22px);letter-spacing:.12em;text-transform:uppercase;color:rgba(244,241,232,.58)}.status{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:70%;text-align:center;padding:2.5vh 3vw;border:1px solid rgba(88,242,166,.32);border-radius:18px;background:rgba(3,10,22,.62);box-shadow:0 20px 70px rgba(0,0,0,.5);color:rgba(244,241,232,.82);font-size:clamp(16px,calc(var(--stage-w) * .018),32px);line-height:1.35;z-index:50}.status .big{font-family:Georgia,serif;font-style:italic;font-weight:800;color:#fff;font-size:1.6em;margin-bottom:.35em}.hidden{display:none!important}#sourceFrame{position:fixed;left:-9999px;top:-9999px;width:1px;height:1px;border:0;opacity:0;pointer-events:none}.hero.pop .card{animation:glowPulse 1.15s ease-out both}.hero.fade-out .card{animation:heroFadeOut .24s ease-in both}.hero.fade-in .card{animation:heroFadeIn .52s cubic-bezier(.19,1,.22,1) both}.card.is-new{animation:newCardPop 1.15s cubic-bezier(.19,1,.22,1) both}.new-ribbon{position:absolute;left:calc(var(--stage-w) * .006);top:calc(var(--stage-w) * .006);z-index:4;background:linear-gradient(135deg,#58F2A6,#B9FFD9);color:#061326;border-radius:999px;padding:.42em .72em;font-weight:900;font-size:clamp(10px,calc(var(--stage-w) * .008),16px);letter-spacing:.14em;text-transform:uppercase;box-shadow:0 0 calc(var(--stage-w) * .018) rgba(88,242,166,.55)}.hero .new-ribbon{font-size:clamp(12px,calc(var(--stage-w) * .010),20px)}@keyframes glowPulse{0%{box-shadow:0 0 calc(var(--stage-w) * .055) rgba(88,242,166,.78),0 calc(var(--stage-w) * .022) calc(var(--stage-w) * .052) rgba(0,0,0,.68)}100%{box-shadow:0 calc(var(--stage-w) * .022) calc(var(--stage-w) * .052) rgba(0,0,0,.68),0 0 calc(var(--stage-w) * .032) rgba(88,242,166,.44),0 0 0 1px rgba(255,255,255,.12)}}@keyframes heroFadeOut{to{opacity:.08;transform:scale(.965)}}@keyframes heroFadeIn{0%{opacity:.05;transform:scale(1.045)}100%{opacity:1;transform:scale(1)}}@keyframes newCardPop{0%{opacity:0;transform:scale(.82) translateY(calc(var(--stage-h) * .035));box-shadow:0 0 calc(var(--stage-w) * .060) rgba(88,242,166,.85),0 calc(var(--stage-w) * .018) calc(var(--stage-w) * .040) rgba(0,0,0,.58)}58%{opacity:1;transform:scale(1.045) translateY(0)}100%{opacity:1;transform:scale(1) translateY(0)}}@media(max-width:900px),(max-height:520px) and (orientation:landscape){.hero .card{width:calc(var(--stage-w) * .34)}.side .card{width:calc(var(--stage-w) * .20)}.slot.tl,.slot.tr,.slot.bl,.slot.br{display:none}.slot.side-left{left:22%;top:55%}.slot.side-right{left:78%;top:55%}.nav{width:calc(var(--stage-w) * .07);height:calc(var(--stage-w) * .07);font-size:calc(var(--stage-w) * .045)}}</style></head><body><main class="wall"><div class="slot hero" id="heroSlot"></div><div class="slot corner tl" id="tlSlot"></div><div class="slot corner tr" id="trSlot"></div><div class="slot corner bl" id="blSlot"></div><div class="slot corner br" id="brSlot"></div><div class="slot side side-left hidden" id="leftSlot"></div><div class="slot side side-right hidden" id="rightSlot"></div><button class="nav prev hidden" id="prev" aria-label="Previous">‹</button><button class="nav next hidden" id="next" aria-label="Next">›</button><div class="dots" id="dots"></div><div class="badge" id="badge">FLGISA Wall</div><div class="status" id="status"><div class="big">Loading…</div><div>Fetching the latest FLGISA images</div></div></main><iframe id="sourceFrame" src="../../event-wall/?event=FLGISA&limit=500"></iframe><script>const ROTATE_MS=7600,NEW_BADGE_MS=22000,PRELOAD_AHEAD=8;let items=[],cur=0,timer=null,lastHero="",loadedOnce=false,pendingNew=[],isChanging=false;const heroSlot=document.getElementById("heroSlot"),tlSlot=document.getElementById("tlSlot"),trSlot=document.getElementById("trSlot"),blSlot=document.getElementById("blSlot"),brSlot=document.getElementById("brSlot"),leftSlot=document.getElementById("leftSlot"),rightSlot=document.getElementById("rightSlot"),dots=document.getElementById("dots"),statusEl=document.getElementById("status"),prev=document.getElementById("prev"),next=document.getElementById("next"),badge=document.getElementById("badge"),sourceFrame=document.getElementById("sourceFrame");function esc(s){return String(s||"").replace(/[&<>'"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","'":"&#39;","\"":"&quot;"}[c]))}function signature(list){return(list||[]).map(x=>x.img).join("||")}function scrapeSource(){try{const doc=sourceFrame.contentDocument;if(!doc)return[];const imgs=[...doc.querySelectorAll("img.photo")].map(img=>img.currentSrc||img.src).filter(Boolean),seen=new Set;return imgs.filter(u=>!seen.has(u)&&seen.add(u)).map(img=>({img}))}catch(e){console.error(e);return[]}}function isNew(item){return item&&item.newUntil&&Date.now()<item.newUntil}function imgCard(item){return item?`<div class="card${isNew(item)?" is-new":""}"><img class="photo" src="${esc(item.img)}" alt="">${isNew(item)?'<div class="new-ribbon">NEW</div>':""}</div>`:""}function idx(offset){return((cur+offset)%items.length+items.length)%items.length}function useHeroFive(){return document.querySelector(".wall").getBoundingClientRect().width>=900&&items.length>=5}function preloadAround(){if(!items.length)return;for(let i=-2;i<=PRELOAD_AHEAD;i++){const item=items[idx(i)];if(item&&item.img){const im=new Image;im.src=item.img}}}function renderSlots(){if(!items.length)return;const five=useHeroFive();heroSlot.innerHTML=imgCard(items[cur]);if(five){tlSlot.classList.remove("hidden");trSlot.classList.remove("hidden");blSlot.classList.remove("hidden");brSlot.classList.remove("hidden");leftSlot.classList.add("hidden");rightSlot.classList.add("hidden");tlSlot.innerHTML=imgCard(items[idx(-1)]);trSlot.innerHTML=imgCard(items[idx(1)]);blSlot.innerHTML=imgCard(items[idx(-2)]);brSlot.innerHTML=imgCard(items[idx(2)])}else{tlSlot.classList.add("hidden");trSlot.classList.add("hidden");blSlot.classList.add("hidden");brSlot.classList.add("hidden");leftSlot.classList.toggle("hidden",items.length<2);rightSlot.classList.toggle("hidden",items.length<3);leftSlot.innerHTML=items.length>1?imgCard(items[idx(-1)]):"";rightSlot.innerHTML=items.length>2?imgCard(items[idx(1)]):""}[...dots.children].forEach((dot,i)=>dot.classList.toggle("on",i===cur));const hero=items[cur]&&items[cur].img;if(hero&&hero!==lastHero){lastHero=hero;heroSlot.classList.add("pop");setTimeout(()=>heroSlot.classList.remove("pop"),1150)}preloadAround()}function render(){dots.innerHTML="";items.forEach(()=>dots.appendChild(document.createElement("i")));badge.textContent=`FLGISA Hero Wall · ${items.length} Image${items.length===1?"":"s"}`;renderSlots()}function show(){statusEl.classList.toggle("hidden",items.length>0);const many=items.length>1;prev.classList.toggle("hidden",!many);next.classList.toggle("hidden",!many)}function mergeItems(nextItems){const now=Date.now(),oldByImg=new Map(items.map(x=>[x.img,x])),oldImgs=new Set(items.map(x=>x.img));const merged=nextItems.map(x=>{const old=oldByImg.get(x.img);if(old)return{...x,newUntil:old.newUntil||0};const shouldMark=loadedOnce;return{...x,newUntil:shouldMark?now+NEW_BADGE_MS:0}});if(loadedOnce){const fresh=merged.filter(x=>!oldImgs.has(x.img)).map(x=>x.img);if(fresh.length){pendingNew=[...fresh,...pendingNew.filter(u=>!fresh.includes(u))]}}return merged}function refresh(){const scraped=scrapeSource();if(!scraped.length){statusEl.classList.remove("hidden");statusEl.innerHTML="<div class='big'>Waiting for images…</div><div>The FLGISA source wall is still loading.</div>";return}const oldSig=signature(items),oldHero=items[cur]&&items[cur].img,nextItems=mergeItems(scraped),nextSig=signature(nextItems);if(nextSig===oldSig){items=nextItems;show();renderSlots();return}items=nextItems;if(oldHero){const keep=items.findIndex(x=>x.img===oldHero);cur=keep>=0?keep:0}else cur=0;loadedOnce=true;render();restart();show()}function changeTo(nextCur){if(!items.length||isChanging)return;if(nextCur===cur){renderSlots();return}isChanging=true;heroSlot.classList.add("fade-out");setTimeout(()=>{cur=((nextCur%items.length)+items.length)%items.length;renderSlots();heroSlot.classList.remove("fade-out");heroSlot.classList.add("fade-in");setTimeout(()=>{heroSlot.classList.remove("fade-in");isChanging=false},540)},230)}function advance(){if(items.length>1){let target=null;while(pendingNew.length&&target===null){const img=pendingNew.shift(),i=items.findIndex(x=>x.img===img);if(i>=0)target=i}changeTo(target!==null?target:(cur+1)%items.length)}}function go(dir){if(items.length>1){pendingNew=[];changeTo(cur+dir);restart()}}function restart(){clearInterval(timer);if(items.length>1)timer=setInterval(advance,ROTATE_MS)}prev.addEventListener("click",()=>go(-1));next.addEventListener("click",()=>go(1));window.addEventListener("resize",renderSlots);document.addEventListener("keydown",e=>{if(e.key==="ArrowRight")go(1);if(e.key==="ArrowLeft")go(-1)});sourceFrame.addEventListener("load",()=>setTimeout(refresh,2000));setInterval(refresh,3000);</script></body></html>
